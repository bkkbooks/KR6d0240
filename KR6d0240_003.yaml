body:
  text: 觀法餘論下論曰明觀法者必辨乎祖承蓋本諸止觀示觀有所傳則不迷宗緒故也或問今論觀法而不言祖承何邪曰此直以例論文祖承其文既略無得而明也若欲知者按止觀凡明二種祖承謂金口則本付法藏傳文列二十四祖自迦葉而下以次傳至師子尊者遇難而絕法藏無傳焉今師則始由北齊探論悟旨因宗龍猛即前第十三祖自此推而上之亦本金口推而下之得有今九祖故曰云云此其大略爾今原祖承所以付法者非直付法付其能任持法藏者耳然則法藏何以任持必其內有實證外通經論德為時宗緣與物合世傳一人以掌其任如是則可以任持此道至於來世久而不失其正使無異端澆漓之患故曰苟非其人道不虗行此之謂也抑所當論者三說而已一曰所傳法二曰傳法處三曰禪教異論所傳法者按止觀云始鹿苑中鷲頭後鶴林法付摩訶大迦葉而記有以法驗證以處顯法即所傳之法正指於斯又曰己心所行法者即章安密說從大師得所行之法故舉所行以顯所傳自昔於是有傳教傳觀之論或謂三乘教外別傳心法者今謂所傳之法未易輙定若即言教是所傳法又何假云以法驗證若捨言教別有所傳則又不可故知所傳言教無在不在要必契悟得旨師資道合始可言傳是則傳者傳其自心所得之妙必與經論合者故一代能詮教法莫非所傳如其不然則教迹行門而已矣世舉知之又安在其次第相傳邪故知苟得其妙謂之別傳可也謂之傳教傳觀亦可也若夫教外之心心外之法皆非今所謂傳也雖然若謂實有法有心為所傳者又安得乎唯通見者必能訂之傳法處者舊亦言之不同云云今謂若如來異時親傳密付迦葉法藏則不可得而知所可知者即付衣時是付法之時文見西域記五乃將涅槃時也云云其涅槃會上付囑之言對告大眾耳迦葉不預也若論此事何必親傳然後為付況迦葉後至佛現雙足自可表之不在苦諍也所謂禪教異論者其略亦有三一則彼以世尊拈花迦葉微笑為付法之說二則七佛相傳各有偈句云云三則所傳人數此但二十四祖彼則二十八祖者並出寶林傳教家評之以謂無據今謂苟有其理何必求文若直以文而相攻者殆無窮已抑彼此皆祖也在彼與此同在此與彼同又何禪教之間而㸦相譏毀哉今姑以理折中之庶兩家之難解夫道一而已矣禪教二門也道不一不足以為道門不異不足以為門故道非門不通門非道不會以一道而統二門禪教所以兩得以二門而蔽一道禪教所以兩失夫是則何彼何此孰是孰非哉但彼尚機用故或以花笑示或以句偈傳苟從之而會道或徒傳而無得吾不知其果虗果實也而此尚論實故或以衣法傳或以雙足表苟因之而契理或徒傳而無得吾不知其孰當孰否也至於列祖或言二十四或言二十八則自師子之後四祖在所取舍之間以今言之亦不必定論使此四人者果可以繼祖雖絕而復傳可也使不足以繼祖政令相續謂之絕傳可也要知傳不傳在乎得人可否政不必以世系論也但傳尚實錄故止於師子遇難而絕而寶林傳等必於授受相繼乃巧為之說至以年代論者或以歲曆考之則反致譏評見北山錄等文故莫若今論人不論世之愈也抑六祖之前未唱別傳之說猶得以經教印心雖謂絕而復傳無害也自別傳之說行經教不得以印心固當授受相繼或不得其傳則遂絕無及矣嗚呼其殆哉由是言之凡論是非當道之為尚不當門之為尚門之為尚則或未免以私情諍道之為尚則庶幾乎以通見明通見明則是非得以定亦得以絕也或問凡觀必有境故一家明觀境有真妄陰有立否三科辨揀境之要二境分內外之殊是皆觀境邊事自昔議論多矣此特不言何邪曰據理合明今此不言亦順乎集者之意以謂此名觀法則觀正境傍故所類文略雖有觀陰揀境及心等文相帶來耳非委出正文也自來多不知此例汎明之殆非集者之意若欲委知則余甞著真妄十篇揀境十䇿此不復論也或問其真妄等固已論著二境之說義復如何曰此本無它直以諸師各定內外法相不同今謂得其全者當如四明會釋可也如觀音玄記云一家明境不出二境四念處心對陰色而分內外此文心對生佛而分自它荊溪特會兩處之文立外境云外謂託彼依正色心等則其義約而周簡而當也然則輔行有曰迷謂內外悟唯一心豈今順迷耶曰今之內外非彼之內外彼以迷情而言則成定有內外今約法相乃於非內非外言內外耳如曰祇一非內非外之三千隨乎觀慧趣內趣外是也故知悟一心後不妨總別宛然終日同趣終日不失即其理也或問止觀初乘不思議境輔行有所謂三境者云云修相可否頗多異論今若何示之曰此亦不易曉至下二空正出其文別以例論云云或問止觀云天台傳南岳三種止觀而輔行曰南岳唯授圓頓之理約行須以漸不定助如是則果三果一耶曰縱云三一亦不相違三言其行一言其理一理通三行三行顯一理但圓理與行為一餘二則理與行異故輔行一往以圓理對二行言之然言圓理則行在其間故知三種皆為所授而曰唯者蓋對餘理而言非從行說也助之為言猶曰助顯第一義之謂也或問修漸次者還解頓理否解則何以文曰圓頓難解漸次易行故說漸爾豈非漸人有所不解故邪曰非也須知文意一往以難解顯其難行解且尚難行尤不易故為其人說漸次也後刪定止觀特以難至易之深有旨哉政恐學者作此疑故云云或問妙記云中論四句觀法但被末代鈍根此何四句耶曰或云是因緣所生法之四句非也豈有一家所傳觀法但被末代鈍根者乎正言不自它生等四句爾然則何以知其為彼四句蓋本文所自則可知也此因敘古釋見寶塔品有為根見識見之說故曰云云又如妙疏釋知法常無性作性相二空解記因問云今文何故不立斯觀答經從利根者開然經為利根不須斯觀則知論文性相四句專為鈍根明矣此本易曉比見人或固昧紊亂為甚因得以正之或問山家觀門既以龍樹為師宗何以玄云天竺大論尚非其類震旦人師何勞及語曰此記固簡之矣如曰但承觀法不承論所破勢然則所破勢者蓋論釋般若唯得以衍破小故不同天台宗自法華徧破徧立之勢使不以論所破勢而妨所傳觀法則文不為難矣餘有文義𤨏𤨏疑難苟無妨觀門大體雖略之可也二空論第六總篇上論曰甚矣眾生情著之難離也不唯著實亦著假名則生與法俱執不著於有則著於空則性與相俱病出彼入此舍一取一未始暫離也惟其未始暫離是故不能與畢竟空理相應矧乎末代根鈍情執尤堅縱自它之轉推猶共無而起計觸境生著更執名相故入道所以尤難也非夫佛祖為物心切示以破性破相之要其孰能使之忘情蕩執契無生之至理哉抑有以見觀法之極至乎以四性推撿不可有加也苟於是又不能入則亦已矣雖有深慈痛悲亦無如之何故二空之道尤切於末代修門然不可不了觀相通別教門進否對諦破顯之旨用觀同異之相至於圓論性相兼涉三境總彼諸文而有餘義者是必待論而明例而顯也然則論之者罔象也由象罔而得玄珠其在乎人而已矣別例中右二空類文總五十有四示性相生法觀相通別者十八對教明觀進否者九約觀對諦破顯不同者六圓論性相兼涉三境者九總明二空餘義者十二凡五例示性相生法觀相通別例七八十十八二十一二十六三十三十一三十六三十七三十八四十二四十七四十八四十九五十二五十三五十四論曰空一而已言則有廣略焉略唯二空廣則無量然皆從所破有境言之故曰空無十八十八自境耳今置其諸姑準經論以明二空先別次總別明又二曰性相曰生法性相本乎大品及中智等論云云言其觀相則不自生等四句破性也或有無等四句或內外等四句其義大同不不自等四句破相也性謂性實之執相謂名字之相又性者情也有也病也相則假也無也藥也苟為不破皆惑也惑不破則理無從顯故善修空者是句非句皆離而一無所住著故性相所以皆空也故曰如前火木等云云然則大體雖爾而修者有利鈍焉利者或推一句二句得入鈍者轉計極至無因至有推而不入更約續待三假推之兼修萬行以助之皆不失其為二空也雖有利有鈍有性有相言之次第而修必同時所以離則俱離破相必破性破性未必破相若但破性而相不破者雖性亦未也於是應知有善用不善用者若善用性空於觀無著斯即相空無別有也其不善用者雖相猶性豈真所謂相空哉何則蓋空非至言也觀亦方便耳觀可因之破惑入理非可守而不忘觀而不忘猶情而已矣直須此空亦空情無所寄忘情則證理此先德所以有云無一法當情而吾宗則曰境觀雙絕之處是已然若實謂有理可證還成未忘何由證理故諸文處處點示俱時之意政恐學者失旨於此而或者固迷作異時說其不足與議也亦明矣抑甞深求其旨而又得餘意焉所以於空見不空而得進於中道者由此故也又離相似法愛而得入於真證者亦其理也是皆能空其空不住於觀故然爾所謂生法者其文本光明而亦兼出釋論等文云云其言觀相要亦不過以一空觀空其假實假破即生空實破即法空而生空亦曰人空我空等推言之凡十六我人知見皆生空境實法雖局五陰通言凡陰界入皆法空境此等假實皆空使計我我所情忘由情忘故惑破惑破故會理此則生法二空觀成之相也論其同異則小教或有前後大教決無異時縱有始終之言亦非次第之觀餘如類文此其大略爾云云次總明者然則性相生法觀門修相為一向別為亦通乎謂通則乖於名相謂別則妨乎文旨故自來所以異論今謂兩者既難定一是應從容論之要不出二義謂佛世被機觀門末代示觀用與所以初義則性相生法名相不同有如光明大品文各異出而不相濫也若末代示觀用與則文旨互通如光明本示生法而疏約性相推之止觀元明性相而乃推於生法又如妙樂正釋生法乃引性相結顯皆其例也四明得是意故會彼諸文合而明之則曰觀性相二空破生法二執顯真俗二諦是則性相生法雖各有境觀及所顯等以相對故偏得其名用文之巧也由是言之佛世生法未必性相所以立門不同末代觀空必推四性所以義必相有夫惟必相有則生法之空即性相空也性相所執即生法境也雖或異同大率如此故曰中論四句觀法但被末代鈍根佛世當機何勞設此又曰經從利根者開是故不立斯觀然而佛世不無鈍根末代非無利者且一往耳不然其於此等文相凡興幾疑難如費幾答釋矣對教明觀進否例二十一十二廿七廿八三十二三十九四十四十三論曰教觀之道未始不相符也故教有以詮乎觀觀有以印乎教兩者並明而進否於是異焉或以小乘唯說性空大唯相空又小唯說生空不明法空此固偏局之說已為今家所被云云又如光明引空有二論明生法二空有同時異時者此乃宗計之論不在所破亦不須和會也而玄文又附空有二門約真俗以明生法者此亦一往從便為言其實二空必須俱得也若復的以一家教門判者則生法通四性相局衍何者蓋不出二義故一以經部判則光明通大品局故也二以觀智論則曰觀所生心與前不別能觀觀知即空為異何以即空四性撿故既觀與前藏異則知性相唯局衍門明矣然而輔行有破性通四之文故說者於是謂境通觀局今謂一往通文則可境觀相從則或未然夫境觀之義必也相從由觀有體析故境有幻實則境與觀俱異安有性相之境通乎以觀從境境既通矣安得觀自局乎雖文有曰觀所生心與前不別但言不別而已然亦不云是性相境也其立言似徑庭故今所不用要之輔行之文約義經論未妨大途亦猶圓論四句觀法而曰若四句對教自是別途亦其義也所以義云者文約所離通言之爾即文曰既破生滅亦無自它共等三計是也其實還為析觀所破破已任運離於性計非謂推性破執故知性相局衍本無異途也然於衍門自論其亦有異旨乎不異則何以辨三教之別曰此固不同也如自昔教門論幻有三種所謂四性無生幻一理隨緣幻以性奪修幻云云由是言之則今衍門所推性相其言雖同所以不自生等則隨教旨別義推可知也又如光明文句約喻明生法體析觀別稍異常途不可不知也如常途則約小衍以論體析云云今約拳指以推生法本是析觀而曰通菩薩亦然文以鏡像喻其體空本似通觀而曰別菩薩體空者此義自非四明記主斷以偏圓體析有合輔行所謂云云則機教異轍殆於難明委如彼文尋之可了也云云約觀對諦破顯不同例十九二十二十二二十五二十九三十五論曰二空所以對諦者以空必約諦觀成則諦顯又觀所以破執執破則理明故一家二空皆得約破顯以明對諦義也然則大教二空本無前後雖對二諦實匪異時為對所破及辨性相故分真俗前後說耳然約不分而分諸文對之或異按妙記云真諦即法空俗諦即生空蓋約俗假真實義便故也及引玄文為證則假實殆於相互然亦無違但玄約所破故一往世諦之名屬假假以破性真諦之名屬實實以破假則宜反對為言而記約所顯故法空顯即真諦生空顯即俗諦故云俗假真實然則記引以為證者乃以其所破顯其所顯爾若淨名玄云世諦破性立假真諦破假即相則破顯兼之要之文相隨義取與不必定論也至於玄文有曰得人空成真諦智焰得法空成俗諦智焰等義與妙記文敵反者莫不以為對諦之難釋者雖多未見其能解紛者今為析之斯乃迷於名同便謂義是之失也曾不知玄文法空之言非所謂實法空按文本明破三我義謂人我法我真如我此三次第義當三惑假實言之並生空所破然則言法空者文略具言得法我空可也假實既其不類難何從生乎夫如是正應以次對於三諦故曰得人空成真諦等其義宛順亦何反之有以今言之玄文既明三種我義而淨名記復有法空義長之說合準其文竪論三種二空義適相當若以之會妙記則玄文分而不分記乃不分而分假實雖分不分三異分而不分例反可見舊說無此學者宜知圓論性相兼涉三境例三四五六十三十四十五十六十七論曰三教俱推性相而圓頓特異者盖圓門性相中實即空該於修性攝於自它泯絕無寄情智雙亡故也夫惟該於修性此法華所以只一知法常無性之言而疏有一實理上性相二空之釋故曰故於實道須閑修性夫惟攝於自它此止觀所以有三境之義故曰以三諦法不出自它修性故也然則修性旨如常明三境義當今論夫境有修性自它之分者始於記主節釋爾其實本一不思議境柰何自昔於此強生分別言修不修或俱可修者是皆隨文生解之見非所以玄覽得旨之說以今言之苟於性境文中善達心具三千不可思議任運亡離當下契證雖無文可也然則二境之設特是吾祖為人心切惟恐未然故以二意更各言之所以修德境者以二意故一約修門顯性德故二為未了恐生計故故有修德之文若據性德亡泯寂滅祇此離計之言亦不可得但今以修顯性云爾若論本具理心本來妙離何必徧推四句然後方入是亦為未了者至於化它一境亦兼二意一則自離亡離若欲化它非四不可為示化它之方故須四說二則理若專亡還成定法一向無說則又不可況經論凡有所說要不出四為示即亡而照無說而說故有化它一文文雖有二於理莫非共成不思議觀故並以境言非實境有三也故曰說時如上次第行時一心一切心抑又圓論修性未始暫離故性所以性修修所以修性若於性中離性過者於性了修也若因推撿達性德者以修顯性也是則性修修也修性亦修也若以所顯言之則修性性也性修亦性也雖所因入之異而具德不殊其致一也故曰又此理具變為修具一一修具無非理具此言於性了修也又曰所以將理對修料揀令識修具全是理具乃達理具即空即中此言以修顯性也今更以一文表發之如妙記曰故於實道須閑修性本自二空即是性德推檢入空即是修德故知修性理無異途安得於中強分修否此既一意也如彼又曰若推性者袪滯達理若推修者離著行成惟得彼文使今說益顯何者彼之推性袪滯達理豈非今於性了修乎彼之推修離著行成豈非今以修顯性乎然則袪滯所以離著行成所以達理盖其旨一也但彼從開說今約合明開合互彰圓旨彌顯且曰以性本亡泯於修始則彼此修性未始不合也又曰兩照同明隻惑俱遣則又約開言之雖然又何嘗果有兩照隻惑之殊哉學者當於非修非性非開非合非一非三處求之乃見此意爾總明二空餘義倒一九二十三二十四三十三三十四四十一四十四四十五四十六五十五十一論曰二空大例論之如上然有異義者則隨文用與約義無方之談是皆不得不略明之一如玄文以三觀而破四性者據圓以論一往約義對之其實三觀既即一心四性應非前後而破然非前教所得言也又如輔行歷惡明性相此亦約圓而論故觀貪欲即法性達理無性即性空義正同妙疏實相常住無自性等合是實觀而亦曰世諦破性者蓋世諦之言有通有別對真名俗實不乖真如曰破性執已乃名世諦故知即俗而諦真還是實觀也又如法界次第明性相之文據所釋義但是十八空之二耳況本名自相而注以體識內外辨其名體俱異故知與凡性相別也集者槩類之誤矣然則其文不出性相何也要知性相與十八空俱總別廣略之異彼但出別故不言總如必以義求亦可以內空等為性空畢竟空等為相空如曰以空破諸法若無諸法亦無畢竟空等豈非相空義餘以意配之非無其義也又如輔行約中理以明生法常無常者若論破四句執未必會中此云爾者是亦約圓明義故也然言離性而云生法空者已見上例云云又如維摩疏明二空總別相此異常途者二常途不分總別此為明菩薩化眾生邊故須分別假實別相此一異也又常途明二空聲聞容有前後而菩薩一時今則反之為明此經觀眾生品入空在前而佛道品入假居次有涉通相次第故云雖前觀眾生入空而猶須更起法想此二異也又如光明疏約體空明達三諦之文此亦異上次不次義上約當分明空則不言三諦圓雖三諦而境智非空至於竪論三種則假實各有淺深此並不然獨於即空境智體其三諦所以為異也又如光明於圓位約悟不悟以明斷見得空有前後者疏記凡三文要言不出悟者先斷見惑得眾生空後仍此觀破於法執即斷思惑對位如常其未悟者雖作上觀未能斷見復度入實法計我須於實法上作觀等此並約不次而次麤惑先除仍小以說其實圓頓未必常然又如別行玄記釋有門人空法不空有前後兩途之說全同上義故知仍小之言其有旨哉至於釋二空即緣了種者此亦約義對之的顯圓論二空若觀若智無非本具性德故也由是言之則知教無定法人無定機理無定體文無定論惟義而已矣學者無得專守而使文理不通然亦非無常論焉餘論下論曰觀門貴乎行用而不在於文義苟善用之雖略文義可也然文義之不通於觀或有壅此餘論所以明也或問考性相所自經教非無如大品言常性空等即其文也又向明十八空等亦其義焉而妙記云若不了今家依於智論止云諸無可準何也又兼言中智二論而曰準理準義此又何邪又曰非用法相者之所逮且云自有傳說此義者來少有曉此等將非抑它之過乎曰今準性相云者非直名義而已葢委明觀相莫若中論推性四句觀法論復委釋是今一家所本觀門故曰諸無可準也然而兼言智論且並準理義者此又言二空兼三假而推故一準中論二空之理一準智論三假之義共成一家之二空也亦如妙樂云云未撿又它家縱有準用多用其法相觀門則未聞也政使傳其名相亦未若天台以一實三假等義徧於諸文推廣其說荊溪之言信不誣矣或問若論修性各有自它以無明為它必以法性為自何以文曰以此兩它共推一自則自何故一它何故二曰修性各論自它理則然矣今此云者蓋顯修性自它非一非異故以兩它而顯一自則一而非一還以一身而顯兩它則二而非二非一非二開合之旨彰矣但在性則無明為所具法性為本有在修則法性為本具無明為所起是則法性修性恒一無明起具不同故一往自唯是一它則有二反而言之何往不可但從強耳或問理性境中一念三千已極圓妙何故文云前雖結成理性境竟若不推撿何殊鳥空安以鳥空同妙境邪曰若於性境達圓具者不當此斥今云鳥空有言無旨是約修境須推撿者言之其於性境但聞具言不識其所以具故斥不了之人非言其法也或問世諦破性之言為真為俗二俱有妨曰自非記釋意亦難明如輔行云云然則世諦之言名雖同俗而實空觀良由空觀方能破性故也而曰世諦者盖從所諦得名一往對真成二諦故又言真諦破相者從所觀理亦是證真諦時破相故也或問向云竪論三種二空當如何分別曰以實從假還約玄文三種我義以明三種法空即玄文人我空故則二乘所證涅槃為法空以法我空故即菩薩恒沙佛法為法空以真如我空故即佛界所證畢竟涅槃為法空故淨名記云分別法者祇是陰界入耳亦是十法界法後四祇是六中空假中故知法空義長又輔行云若諸菩薩以空涅槃恒沙佛法名為法空是也然則菩薩凡空二法何邪此應分偏圓異故云云或問據論生法通性相局則三藏生法不通性相此為利為鈍鈍則不待性相利豈勝於通邪曰利鈍之名不可槩論然則妙記以推性四句為被鈍者此以佛世滅後須不須為利鈍也藏通則以體析為利鈍今三藏雖不推性還以析觀復劣於通耳或問凡言體觀為須推撿故空為不推撿故空按文云大乘明相自性是空不須撿己為空又曰此之名字本來自空非撿後空是皆不須推撿也然則何以修性相空者又言推撿耶抑本來自空之言與圓頓所謂本自二空何以異耶曰推言其情不推言其理何者良以通論幻化當體即空依之而修是為體觀據此則本來自空不待撿已方空如曰本自不生今則無滅是也教理雖爾其如情謂自它等計非推撿不破故須推之及既推破會本性空亦不待滅色故對藏為異而本空之言復與圓不同者蓋圓頓則以中實為空乃成性具之德通則始末俱空以教道言終歸灰斷是也或問性相生法並一假實而名次敵反何耶曰亦各從其輕重爾如生法則計我為重故假先而實後如曰蓋由初心人執障道故先對治性相則性執為重故性前而相後其理可知也或問今推四性與楞嚴所推本非因緣及自然性一一皆顯本如來藏同邪異邪曰推性義同通局則異所以推性義同者楞嚴所謂本非因緣即今不自等三性是已及自然性即不無因性是已但開合詳略耳所以通局異者今四性則通衍門彼如來藏多從圓說故局也或問楞嚴之文既同推性與請觀音云地無堅性乃至風性無礙一一皆入如實之際同異義復云何曰大約亦同但如實際與如來藏約教門論復通局異如光明記云前之二教以空為如實後之二教以中為如實若取圓中實際為正則與如來藏同也然則此特同異之辨若夫所謂皆如來藏入如實際之旨學者要當盡心自得也被接論第七總篇上論曰教必被機非如來無以達物機之差會言則有旨非四依無以見經旨之殊途故天台之善申通猶吾佛之窮設化可謂善巧而曲盡矣佛乎祖乎異世而同道也原夫教之始興其本一理機有小大從實出權由能詮之教殊故即離之斯別其為偏圓小大各逗之說亦以備矣苟唯如是則機緣各住當教各致其極何由捨偏入圓從漸之頓抑根性多途所發前後凡四正所不攝者則宜以餘途接之夫接之云者為夫偏教菩薩之機於法華前次第入實令不失時者設也惟其佛世有是機教布列諸經故吾祖於是建四教之外申以三接焉謂別接通圓接通別機應相入接義斯在然則以教從機機雖有七以機從教教不出四以無過乎已未接正能所之間故也此義具在玄義等文今所不論然所當論者一家被接以含中為發源以點示為機要以發習為根性以止觀一接為關節以涅槃七二為所憑辨者其來尚矣故於是論焉別例中右被接類文總三十通示被接有含中點示發習義者六言有接不接并接會同異者十一對明玄及止觀三接一接者九因辨涅槃被接可否者一旁出被接餘義者三凡五例通示接義有含中點示發習例二七八九十三十論曰教以被下為言接以承上為義通言莫非被接也然今於四正之外而有三接者蓋其本出於含中其機始於發習其應因以點示此被接所以成也何謂含中良以四教各有詮理唯通得有含中之義故稟是教證是理者由是深觀得見不空故受後教接者其發源於此昔人有謂含中為被接之本者是矣而或者因論以教含理含又曰其所以含義者為當教為被接以今言之理教偏者非也兼教理而不善其說者亦未為得也因法舊來但中義教權故但理實故中為之說曰教巧故含理即故中由教談幻化即空故祇一幻字性空而相假含在其中矣既言即空反而即之中在其中矣若以當教被接論之彼偏定者亦非也今謂含中雖本當教而不專當教以被接者亦得言之故雖通被接而接則非也以開真出中成顯中故所以諸文或從當教說如輔行曰通教真諦發二眼二智者含中故也正如向約教旨示含中是也或約別接說如曰體法二智體法含中二智體法顯中二智一往約名言次第別異也或兼二接說如曰別圓接通名曰含中此正從本而言發源於此故也或通約五二諦說則又約合而言含也此等進否若為偏定乎雖不可偏要各有義所以點示者盖凡論被接必也機教感應合而後成缺一則無接也故機以深觀為因而教以含中為本以深觀故機解將發故如來以點示應之夫點示云者即真而示中之謂也由即直示中故開真所以出中此其為被接爾使有是機而無是應其發機也必失時有是應而無是機其點示也必虗設惟其機應一際啐同時故荊溪由是有根生待接接候機成之說是安得不以點示為機要乎但其相難明如玄文約三法示之謂漏無漏空不空趣非趣一一皆言雙非而三人各解不同是也故記主則曰漏無漏本是通法為成接義故立雙非又曰故約漏等以示解源即其相也得是之意方知經曰八地聞中聞此者也祖曰為說真內之中如是而說也然以意求亦未必一一悉須點示但發端於此即此為示爾又在佛世為點示則滅後謂之印定可也但有如是機解即可印定知其不謬此點示所以亦通滅後而言之或異雖有是二若非機緣發昔所習亦何由因教而點示乎故曰由根利鈍發習不同故有三接之異又有三根之殊其所接入則有賢聖真似按位升進之別並明之如常云云此皆由於習有淺深根有利鈍發有前後故使所接差降不同究言根性莫非發習人也得是三意則所以被接之說盡之矣言接不接并接會同異例三四五六十二十四十五十六十七十八十九二十論曰夫約機教以言被接而有接者有不接者接者如上其不接者義復多途如止觀及記凡約諸義以明即其文也今兼接義率而論之不出三義一曰理異教近二曰名義兩得三曰機別不別所以初義理異真者空中之別也教隣近者通別交際也然則理異未必教近教近未必理異即圓接通別是也二義兼之者其唯別接通耳如文曰今言別接者應具二義是也其次義則如輔行四義所明有可接者有不可接者有不須接者名義兩得即第二第四文是義當可接之例故異不可不須接者亦如別接通義是已又其次義約理論機故唯在通別接義方成如曰通教須用別接以機別故是也由是言之則接者三理異教近機別也不接者亦三義皆反上故名義於是有得不得也然則三義兼全者唯別接通而已餘則或得其一不得其二或得其二不得其全故在可否之間若乃三藏菩薩兩教二乘於法華前一向不接雖菩薩有轉衍之機仍成後教初心通教二乘有前進之義猶是密論故至法華但有會義而非接義縱有云接者名會接引之接非交際之接也至於文曰餘六是摩訶衍亦可得去則通當教亦言被接者此復進否不同若以教道言之則通亦有鈍根菩薩不受接者此為當教之機如四念處明通有三種亦得有因果俱通是也而曰餘六得去者盖二義故一約教門通說如曰通是衍教初門觀境俱巧堪入不空故也二約根定必接是故無有終至果者如曰經從下根其位定故既曰定矣故知此外必無有不接者然以勝劣論之則接者為勝不接為劣而四念處又以接者如土石為基豈若從下純累金剛則不接為最此亦不可槩論如念處則直以圓頓始終俱妙故形偏接如累土基若俱圓頓尚不如彼漸頓雙流況並從漸來寧得不以接者為勝故知教門進否未易一途言也對明玄及止觀三接一接例一十二十三二十二二十四二十五二十六二十七二十八論曰玄文三接止觀一接自昔所以論也於此應知有通意別意焉通則彼此對論別則隨彼當文各有其旨今所論者通而非別然以玄及止觀對明而接有三一何也抑為廣略之殊乎開合之異乎曰此記主固言之數矣但昔人莫能用如釋籤以理觀教道二義對明兩文之旨又輔行曰玄文分於教證行位別故今不云者約證約觀故又約教理辨云彼約教道或以權教接權今但約教所詮理故以權理被實理接於義略足此諸文義明若皎日何莫之用而反為它說邪今總言之通意不出三義曰教理曰教證曰觀位觀言則屬於理行位乃當於教則唯二義而已要知祇一教義對乎理證以成二別但此二義有對論有通局對論則彼教此理通局則彼通教證此唯證道以約證故地即是住不須更論圓接通也由不約教道則無地前三十心位故亦不須圓接別也約觀等例爾彼通而具論者可知故三一所以異也此猶部旨之說未為尅論之義若約三一而尅論者又不如別接通義之全也亦不出三義如前論云云由是明之則止觀但論一接雖略而足故云略足然足於理而未足於教故略足之言施於止觀可也若望彼玄仍為未足則知二文廣略之義明矣所以廣略者由向通意故若夫別意則隨文用與如以教例觀通塞之相等文各有意尋之自得固宜置之苟必存通而論別者如玄文淨名亦各有一接之文何獨論此然自昔所以云云而不能歸一蓋皆以別而混通意抑不分於部旨克論之義故也苟得今意則止觀一接若履坦然異論於是乎決矣因辨涅槃被接可否例十一論曰被接本教道之說法華之後宜無所施也故曰今前六重仍存教道於法華前逗彼權機大經既同部類而被接之義猶見於二文何耶一如輔行所引三十六文末即今所類是也二如玄籤所指七二諦之文謂接則妨乎部旨謂不接則如文相何因得以論之曰涅槃部教既異常途被接之義有可有否夫惟異於常途則雖談四教而與方等不同雖顯圓常而與法華有異以其四教皆知常住則餘三接自爾殊途以其用偏助圓則不可謂有正無接況涅槃所說莫非追說結撮前事故使七種二諦四正三接獨見斯經而與前文亦同亦異有可有否此其大旨爾而又須論文相焉按疏初文本無被接之言直云三乘同觀第一義諦智解不同有若被接故輔行因之且取一生實相二生法界之文故曰云云乃約義用文作被接釋也然法界實相本一圓理同出異名而文分二理者曰理固無殊名言似異故取其破一品者為接入別破二品為接入圓以別證道但有破一品無明之義二地已去仍是教道故今二品即屬圓住此二理所以分也其次文七二諦者按記者釋謂是接行不接解也而評者以異常途約解論接非之故多所不取今謂記亦未甚失且有得於文焉如釋籤曰涅槃解即而行不即豈非政以解即知常故不須接由行不即故亦得論之但不與常途對明同異為未盡善今為圓其說夫由向大旨言之既有可否則固已異於餘之接正然言行接而亦不違約解論接之義何則葢解通淺深接則從深夫解通淺深則雖行證亦可言之故不違也但對知常約解義便故偏言爾夫接則從深故待證真方論點示若直聞解之位何接之有如必約解者試以解行證三位考之則得失可知今於記者之說可謂死生而骨肉也不猶愈於習非而勝是乎凡於先德之義可取則取何必務為己說之勝或有所否者蓋不得已非矯異也兼出被接餘義例二十一二十三二十九論曰凡諸文義有專指者有不專指者如八地聞中七種二諦等則專於被接不可作餘義釋之其不專者如三種意生十地如佛通教彈呵等雖不專被接而亦得約接義釋之以其徧通諸教諸位故也故今明被接而有涉意生義其義如下四土委明今直言通位三種意生若接入別則隨位接入名十住等而並云地者仍本為名兼不接者言爾準此以明意生之說既通諸教釋義若約被接亦不止於別接通而已今約止觀從別說耳所以如佛之義言被接者蓋通教地位若準常途第十名佛地而大品十地又皆菩薩地故十地者即如佛也所以如佛者二義一約別為菩薩立忍名者則當教菩薩如當教之佛而曰佛地邊有菩薩位者此約同位言之非邊際之邊也彼不知此遂多曲說若取被接者則八地門中九地修十地證既破無明即是後教地住能八相化還如本教之佛而曰十地者亦仍本言之但取八相是同不問能所勝劣也又如淨名料揀通呵之文該於接義者是亦機教理所當然有正必有接故通釋不妨別也且曰今存三釋為順接入圓接別教者盖自偏入圓圓接前教亦部旨然也苟不於通先存接義何以得有圓接別乎而又曰此文前後少明接義者則又言當文不正明接義所以也惟其文少明之且得含容而說據此以言通相雖通被接而不得正以接義申者由此故也孤山盖失此意云云餘論下論曰被接出於含中其義不可不悉略明如上然有一二餘疑論之或問文云後之五意義已含三此雖約合言含然亦關於接義而云但觀名中空合在何諦斯言何也曰言名中空者即上三名中之空也但觀此空或合在俗則成別教空有併名為俗所謂複俗是也或合入真則是別圓接通真中自合併名為真是也餘當可了或問別非含中而亦被接何邪曰別既知中故無含中之說但於教道隨發圓解則受接耳然則與得意人於三十心能破無明成十地位者何以異邪曰不同也得意不須點示彼接則猶須故也故知根性不可槩論或問通既接真不接俗而曰一俗隨三真轉何也曰接通既云待證真已方論點示豈非接真乎但此教機緣同觀幻有之俗而契真各異故有接不接殊此一俗所以隨三真轉也既隨真轉俗亦不同玄文所謂三人入真不同複局照俗亦異是也或問別接通人升進入者為以圓中點示為但中乎二皆有妨曰必也但中方名別接由根猛利故破無明然能破惑至於初地而不以圓者無它亦機宜而已宿種而已矣或問玄明感應妙一接之文與止觀一接何別曰得向通別之意義甚易明必欲言者同其別意不同其通意所以別意者玄文為明四教感應則二麤二妙若別接通則教道為麤證道為妙有此進否故明一接正如止觀明四教上觀權實若約正論則三權一實以別接通亦教證有異故籤釋云不云接別者意如止觀正會此等別文意也或者不曉遂致差殊或問止觀明別接通不以地住不以妙覺而特以破一品無明八相之果為能接何邪況此適自所接中來何以便為能接此皆文義不可曉者曰作此疑者是猶以教難其理證不本止觀接之所以然則止觀既約理證續接之接故以十地八相為果用接前教二觀之因若論此果在別名因仍舊名果以在別故名為別接以名果故得接於因亦可以空中異故方自此分以因果便故還從此接是故不可全同常接為難也或問約理可爾若約教論別接通者為何教佛而點示邪曰既云別接還是別佛爾然則別教果頭有教無人何邪曰非此之意也所以有教無人者此據無行人實證云爾若以佛垂三迹豈無迹佛而說別乎或問文云接別地前自用圓教妙覺之果或用別教妙覺之果等且用圓果可爾而復用別何無定準邪曰據圓接別實是圓果而或指別佛者盖顯不離當教果佛而以圓接豈別有圓佛來為點示例此以明如圓接通等亦應可見或問四念處三通之義以初炎焦炷言之位在乾慧性地的屬何通謂屬初義此本利根何以反鈍謂屬次義曾未被接況據教門未聞初地而受接者固非第三此何通邪曰若據初地雖非接位然以此人既利於真豈不利中是亦義當被接句攝況初因果俱通教道雖有據理實無縱至下根亦須受接故知唯屬次義可也或曰焦炷在前接不接在後者此猶存兩可之說但得一邊耳或問通別通圓即所謂藉通開導是也此於三教為始終在通為自歸別圓據昔說者始藉通法終歸別圓而拾遺記曰以別圓觀同於二乘歷乾慧等十地何邪曰據舊說雖爾蓋是相傳唯四明之言始為定論意謂通教自具三通故有因果俱通乃至通別通圓者所以第三義同歷十地但觀智不同耳然則輔行有謂但成別圓因果人者此亦不相違既是始終用別圓觀故雖在通謂之別圓因果可也或問玄文既曰接非會義輔行又曰名會為接二乘在昔本無接義何以又曰彈斥洮汰此意正當別理接之又復法華祇應論會止觀何以又言於接此皆接會多途進否莫辨何邪曰文各有意義有通別所謂接義非會義者別義也又曰名會為接接不妨會者通義也又亦不出二意謂交際之接名接則一向在昔接引之接名會則義通今昔正唯在今究而言之理歸一致前異後同良有以也以此會文可以意得云云或問文明接位或自四地以去以對三根則八九為下如輔行或自三地以去則七八為下如四教儀既同接位而進否不齊何邪曰通位進否不止一途祇由斷見義涉兩楹故使諸文言之或異抑輔行為取經從下根者說故自四地以去四教為順當途斷見之位故以三四為上耳教證論第八總篇上論曰從聞入道之謂教修成自得之謂證行也者進此者也說也者示此者也是則教證為別名說行為通義總之則四別則各二焉但教有淺深證有權實故一家四教莫不具乎教證等義而有權實進否異矣故曰前之兩教教證俱權圓教教證俱皆是實別教教權證實故人多迷之且教必有證證必教所詮理宜無異途何獨至於別教教權而證實乎此別教證所以難也又約行常定約說或不同蓋以位次則有地向通局以文相則有三四缺具以所說則有圓融隔別此約說所以為教證尤難者至於初心知中十行橫學十向圓修六種性習之說此皆涉於教證圓但之義位次同異之旨自昔雖有辨者皆未能革舊難以直其說唯相㳂襲區區文相之論而欲夷教門梗塞者難矣非敢抑彼先達誠有見其弊焉耳是紛紛者何足與議得失之正乎今直以教旨論之而已別例中右教證類文總四十通言教證大體者十二別明別教四種教證者五言初心知中者三言別向圓修附橫學者八言六種性習涉教證者一散出諸文明教證餘義者十一凡六例教證大體例一十一八九十九二十廿三廿六廿七廿八廿九三十三論曰夫教證者聖人設化之始終也故化物莫先乎教入理莫近乎證言教證則聖人能事畢矣抑教以化它則為權證以自行則為實為權故非聖人無以極其用為實故非如來無以臻其體是故語教證之極者唯佛由教證之道者在機此教證之義所以大有所關而不一途者也如曰前之兩教教證俱權等是教證之該乎四教也又曰今前六重仍存教道於法花前逗彼權機是教證之攝乎五時也故玄文以地持所謂地相地實證權實部者良有以也但約五時竪論則前四時雖有教證並屬教道今法華唯實則屬於證若約四教橫論則隨教權實不同故通則四教俱論別則正唯別圓以實證唯中故也雖通別圓正約別教以四種義備故故曰本在別教今則通用是也又文或兼行言者開合之異也如前三教果佛有教無人者以證而奪教也言融不融而有先後者別圓地位於是所以見也抑言之有相反者隨文旨別也故證融而教行不融者正取登地證道言也教融而行證不融者約同詮義且與融名其實不同證融之融故雖證融從教道義略不言耳而文又言教與果皆不融者教從所因次第為拙故與上同詮義異故曰雖說中道因於通門而成兩智故不融也此教說果因果隔越義當不融是則若果與因皆教道義故曰教門之所說也至於約教證以言斷不斷者於此應知有通論形對之義若約通論則教道言斷證道不言斷此固理所當然亦可約教道則言有斷不斷證道為言尚不當不斷況言必斷乎如文例小乘方便論斷證真不論斷不斷者即其義也然則教證既通別圓故斷不斷亦各有之但約別圓對說別既證道同圓故從地前教道唯斷圓若對別本唯證道今約真似以論故圓具二義雖通教證並皆圓實故判權實與別不同也若約德障相即兼六即義以論斷不斷者此自一途置之可也云云又復約別自論教權證實而與教權理實異者不唯兩實義殊而亦教權稍別所以兩實義殊者理實則唯中通於一教不分圓但證實則登地唯局圓中抑證實之教權唯三十心位理實之教權通一教始終所以亦異也苟得此意不特同異義明抑亦教旨斯顯若夫所以教權理實之說則隨緣類己論之矣大體略爾豈曰盡之四種教證例二三十十二十四論曰教以從機故可權證必自行故須實此別門教權證實所以異餘三教者如是而已何則良以別圓同詮而赴機有異惟其詮與圓同故必以中為論雖亦證空假教道行位非正證也惟其赴機自異故有次第之說漸行既極證必同圓雖復初地圓融而後地隔歷仍是約說教道非自行也故以行從位則教證局於向地以位從說則地上分於二途教通始終證唯局終此別所以論乎四種教證而約說教證少復不同然必為地前人說異而非異也或謂約說有不同者非實不同擾之故異夫約說豈它道哉示其約行而已約行且定豈約說不同乎請試以二文明之如釋籤曰說佛自證名為地實且曰約佛自行故云證道得非祇佛自證約說行以分二義又如初地即初住句釋籤以為約行輔行引於約說加故云為異耳故知祇是證道同圓約機教以分說行豈復異指哉然則兩種教證既而不異三四缺具孰云異乎今得以會之如輔行約說文下有云入地自證權門自開故云初地即是初住入證道也此非證道而何餘三故不待言以此會彼文相泯齊何謂缺具邪若猶執迷未喻更當驗以三文蓋映於前文則有豈存隔歷之說望於籤釋則彼有十地已證之言已音紀即今自證是也顯於搜要而有親證名證之語是皆彼此照映文義相當其孰曰非乎不然反上三義則文旨繁重同名異實廣略碩乖彰記主迷謬之失過莫甚焉然必於此申以被機判教之說其融別之難無自而入則向說行矣何也蓋此四者以如來被機設教言之則唯教道而已故曰此之玄文凡判別義未開顯邊多順教道是也雖正用教道亦不言其意況說證道乎其約行證道據機緣證入則固有之既不顯言地即是住雖置之可也然則文曰悉是權施為引下凡為入地方便者此說出教道意也又曰初地即是初住此正言約說證道也是皆滅後判教家云爾何關被機之說而以佛世所說為妨乎使佛世言此則權方教道有所不行苟判教不言學者又將蔽權壅實矣故一言一否各有所當豈可混而不分又復應曉一家所說未必一向融別以分教證如寄次第而說圓融謂之教道可也若約通方而言高下謂之證道可也故輔行又曰初地不知二地舉足下足因有別圓之覈云云惟其別在十地不知所以為教道耳又如釋籤引華嚴八地入無功用道現十種身一一互現離曰圓融是亦教道而已以於八地始得故也記主於此覈示其端不無深旨故曰未必融別以分教證良在此也所以借云者蓋今教證居乎權實兩楹之間義頗難曉故借彼證此非義有所不同也若以之證權實部是固約異義云爾學者要當舉隅而反固不俟乎悉疏也嗚呼使教門利害不在是則已果有在也而古今擾焉如是豈不深可悲夫初心知中例四十七十八論曰教為能詮理為所詮則理與教未始不同也然則文曰從一實理施出權理權實二理能詮教殊故有四種差別教起則理二而教四何也曰理所以二者然理本無二從機設教教有權實故理亦二焉但所被之機迷有輕重而根有利鈍故能詮之教說有即離而門有巧拙此教所以四也然則中有圓但猶真有體析舉一知二不可誣也而或者於是無它論獨於所謂別教初心知中有異之之說或言圓中葢據文曰初心知中故名亦頓頓則是圓但不得意故成別爾或言但中亦文有曰二聞但中之方便或言直聞一中不分圓但云云今謂是三說者皆不本機教之實直以文義各據一端為說要先本其實正其說始得以規矩定其文焉何者凡言知本於聞聞從於教教分別圓故詮有圓但今從教權以聞謂知但中可也故玄文引地人云中道乃是果頭能顯至云此中但理不具諸法即其證也而曰初心知中故名亦頓者此約理論頓漸乃真中之義非教之頓漸也然則文曰二聞但中之方便自是涉方便入之義今何報定以為知中曰要知此意須知亦之所以且文言亦頓亦漸者不出一法二義正由所聞但中以中故亦頓以但故亦漸非謂知中之外別有所謂涉方便入也若作二義離隔而說何亦之云邪此義頗奧人罕能通如謂直聞一中者此說理實則可若據知中正從教權可也使中不分圓但則真亦不分體析乎但此考之義當有歸耳圓修橫學例二十一三十四三十五三十六三十七三十八三十九四十論曰文固有主意義必存大體苟善用之雖有餘文異義不足惑也如一家論橫學之說大率不過以十行位中未宜出無作四門假者而輔行有曰若不全兼文之元意如何出假位中即能授它圓教四門此所謂文之主意也又如示圓修之義亦不過以十向教道之位如何即能圓修三觀者而輔行則曰別教回向言修中者亦寄次第實而言之三觀圓修此所謂義之大體也然則大體既正主意既明夫何論焉今為未明者復申其說如輔行橫學一文可謂折中之論盡矣其所謂元意即止觀所明可思議等皆為顯於不思議故是一文之元意凡相待次第教道等元意亦然豈非即彼元意是今於假位授圓門之所以乎不然則但中而已矣故曰如何等於此應知有佛世滅後之異若約佛世十行位人修假觀者離則橫學一十六門但教道未融縱須無作亦止但中而已是亦約無量之無作即今四教義等文是也以但中故不妨教道以無作故還成徧學此則佛世之論也以滅後言之出於判教故若圓若但義無不可所以玄文於別明四四諦則曰各附彼教而為相狀又曰依於證道預說何妨此皆判教之言故無妨耳反顯佛世言則有妨也所以兼文元意者即今滅後判教之說也假位不可以授圓門者即今佛世但中之義但以此意而曉諸文其旨煥然故向曰文有主意者此也其圓修之義而自昔持論者是皆守於教門一定之說不善大體通變故也殊不知位極則通久習成巧即寂而照智轉行融三觀所以一心初地於是圓證本不由教門所示也若據佛世教道之說直次第而已機緣至此自爾圓修所以四念處云別向圓修者正示此修也而輔行則曰以二觀心修於中道四明乃云方便既立圓觀可修此皆行極智融自應爾也不於此位而論圓修更何所修乎無修則無證又何由登地證此中道乎故曰言修中者亦寄次第實而言之三觀圓修祇此一文亦足見圓修之大體也所以亦寄次第者佛世教道之說也實言圓修者約機通變而示也由是言之凡諸文於此或云次第或云但中或云無量或縱云無作非圓教之無作者此皆教道之義對證道言之或帶前位而說或約初心所期而言非智轉行融而修之謂也言其位則進退不同通則十向皆修別則極於第十無不圓者亦猶下根無不被接但不可與被接同耳而自昔或論以教證真緣所屬者今謂二道二修是教門一往之定者也圓修實道則大體通變之不定者也故不可以彼此致妨然以通變言之而真緣教證亦何局乎昔人有謂證道之先容者蓋亦無方通變之論然此二義霅川有謂十向圓修可由實道止不應以實難權以它妨自舊莫不以為然以今言之烏得為然哉但以今說考之必有高明自知是否不待詳論也六種性習文涉教證例二十四論曰瓔珞明六種性次第對位本無難者唯戒疏有所謂引例教證及性習生佛之文若有妨者三焉何者且教證二道本約真似分之此性習則住行相對位既前後安得引例一也又約行教證灼然前後此云據行同時抑若性習同時則於別教修性體用之義巨有所違二也又約體用而論教證此於一家二種教證若何判屬或同或異皆所未可三也今釋之曰一往引例未必泯齊但取據位前後義同不問位次淺深之異是則初妨不足通也所以據行同時有異常途者今謂雖俱約行所對義別是以不同何則彼以約行對約說則以行從位乃約真似而分教證此以約行對位則據行自論不妨對位前後約不定云同時非必一時之同時也而科家節之為二非也不然何云性習同時故前後不定則故之言何謂乎夫既約體用而論教證又據約行而說同時此則通於始終故與以行從位局分教證者不可同日而語通局既殊二種教證自不須會亦猶義例所謂教證本在別教今則通用是也豈必強以二種而會同乎故知祖意常通人情自局㳂襲之弊致有斯疑今既釋通無勞定執也其次生佛之難者云云還是以位而妨行也然約位竪論雖則如常今據行橫辨故約性習以論生佛而對義如彼者以體用修性義便故也故文曰盡三十心皆名解行就解行中復有四種一名解行二名發心三名回向四名道種此釋道種之文故云當分之中如觀道立故名為道望後佛果能生曰種習種性能生報佛性種性能生法佛豈非約行橫辨乎而科者於此節之便見文旨斷絕竝由不尋文相源流祖意用與徒以教相局促竟何益於大體乎學者苟能通變其說盖不止了此一端而已散出諸文明教證餘義例五六七十三十五十六二十二二十五三十三十一三十二論曰教門進否信不一途約機異解彌復難曉況名同義異淺深懸殊約位約觀之分開教開理之別至於義涉兩楹文非一槩此餘義所以不可不論而論之尤難者也如一別教而具三諦約始終而言也或用空假兩觀攝則地前伏惑教道之意也或純假觀攝則四教對論別教義當假名句故亦約證道奪言之也或屬中觀攝據佛本意約得意者言也或前三教併屬於俗則偏圓對論約隨情智以分真俗也如向明教證二道本通別圓今以說有情無情為教道不分二別為證道則有偏圓之義也故曰教門進否信不一途然則教門如是已自難明況約機解尤為不易故有得意不得意者則不可以位次定其前後也又如十住位一而有發中空二般若者其發中解即名一品相似中道論其所斷還是界內通惑故知祗是上根被接機也至於三根出假二種傍修十向修中此等機緣尤難定論故曰約機異解彌復難曉又如明善財入法界皆破無明而名下惑異若所參知識唯是別聖據云我唯知此法門則所破之惑但是無知若所參圓聖則破障中微細無明也又如等覺邊際智滿之言亦復不同在別則以居妙覺邊名之在圓則以觀達無始無明源底名之故曰名同義異深淺懸殊苟非一家教門何以判其同異至於地論師明真緣之義約位言之義當今家教證二道而又約觀明者緣修位在空假真修屬中則不局於向地如淨名疏明別教意或但開教而不開理約理實言也或亦開理以示圓中約教權言也故曰約位約觀之分開教開理之別其玄文曰別教菩薩約修中道者期心說也行次第觀者則如常所明不然義涉兩楹頗亦難曉然且據見文略論如此其所不集如地前非不圓修登地非無有別等文是皆教證綱格之義類推可知不可槩論也餘論下論曰明大節者無俟於名相昧名相者或壅乎大節故今不得不以名相為餘論焉或問四種通義正名約說約行釋籤何云兩番意者約行約教而義例又曰乃分兩意約證約說何名言之各異邪曰此有通別通言說亦名教行亦名證無不可者但言教證復濫別名故不可耳然於釋籤不言約說而言約教者盖帖玄文教門方便之義故以教名之其義例文者意則全別按文既云準義用例則在止觀用之準證道而有約證準教道而有約說非所謂教證之說證也亦如準望三觀立三止等皆其例也人不見此遂多鑿說或問教道本在地前而又約說復通地上何通局之不齊邪曰若據教道之說本通一教始終而或局地前者兼行言之故少殊也或問今既以初地即初住句便為約說證道則止於登地而已而釋籤何以通指十地為證道邪曰各有所以彼以已證而言故通指十地此以後地猶帶教道故止初地而已或問十地已證之言與釋籤所引輔行所指何以異邪曰政自不同故以已證言之若今所引華嚴十地之文正如釋籤所謂依教道義以四悉檀說登地法故與已證者不同然已證之法復如何說邪曰無別它說但言此等法門證於十地一證一切證不容前後者斯即已證耳或問玄云初心學者仰信此理如藕絲懸山此為但中為圓中乎若曰圓中非彼所聞若曰但中正適其宜何謂其難信之如是邪曰亦但中而已既曰仰信此理非不信之謂也但以別人望此中道修於後地顯在果頭於初心望崖故喻云爾故輔行曰解但知於頓理而已行必經歷恒沙劫數要必由空假方能進此中也或問玄文傍修之說信如觀法所明而文又曰十向始正修中此中但理不具諸法將非十向所修但中邪曰非也此特帶前望後言之如曰十住正修空傍修假中等文帶此中必以但中為言可也又曰登地智破無明為妙則望後證道故一往教道成但中耳或問輔行曰若不曉者初心明理兩說不同乃至云教相不說推與何邪然則文何所屬而云乎或云破古者其說然否曰不然也所以言者祇由教證二道在諸經論不易理曉故有初心明理兩途之說如云初心知理即是或云理有不用諸法此一途也或云理具萬德待行或云解圓行須漸次此雖該二意而實歸一途凡如此例若不以教權證實或教權理實申之則固非藏通而亦非別圓何者蓋若直別圓則各一途而已今既該二途故知義兼教證故也反覈之意良在於此或問四教義明別十向正修中觀有云從無量四諦學無作四諦義云無作其實無量雖約得果名為無作亦非圓教之無作是則始終皆約別教言無量何邪曰此恐以四四諦竪對四教故無量義當別教故也或約一教始終並以教道言之則自一途之說並未詳更檢或問輔行明別教滅諦位在初地祇一滅理而已至明道諦乃具迃直二通因以料揀答中乃以教證二道為說文頗難明且無作四諦即所期中道而四念處特異其說何邪又文雖以教證為答而猶未見其意請試言之曰所以初意者若論果不通因何但不緣無作雖中理亦不可緣之若遠期中理雖無作亦緣可也但中道是理之緣無量無作是行之緣今約別教正從行說故曰正意是緣無量發心至於初地無作由之而得非所緣之正者雖然其如教證一答猶自未明故云若爾等意言在教道時但云地上則迂通寶所也若入證道地前即成住前諸位則直通寶所也不作此釋幾乎難曉或問籤釋無作四諦有云發心來等此謂教道非無作四諦也又云但此教意等則是無作諦意言其位次則回向薄知登地少證而與上四教義文進退不同何邪曰此正別教常途之說以此驗彼知自一途而曰但此教意者則又約佛本意取證道言之正如輔行有曰事不獲已施設教道權接物機非佛本意意在初地中道實相由是言之惟其有所其進必有所其退惟其有所進退必有處中之說是則諸文雖各一途同歸大體故知教門誠難槩論或問妙樂釋佛慧之文是固涉一家部教之說義如別論今見此類意彰何旨曰文本非正特以三教果頭相帶來爾其實此文所謂果頭與止觀別學者宜知云云
