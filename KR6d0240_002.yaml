body:
  text: 習氣論第四總篇上論曰惑亦多名矣習氣蓋其一也習本非正而有名正使言者有對正使言者有與正使互言之者今論則後二例也夫既對正使言之則本無自體從正惑而為氣分亦習續於前之謂也故曰數習煩惱所成氣分習之氣故即其義焉譬之如久鎖腳如乳母衣如盛香之器或而無則如微煙如少鹽投於大河其為習氣亦然原一真理性本明本淨尚何惑染之有惟其理雖本明而實未嘗明性雖本淨而實未嘗淨故於是有惑染焉有習氣焉所以竪言之有三曰見思曰塵沙曰無明橫言之亦三曰貪曰瞋曰癡總言之亦三曰煩惱曰障曰惑至於曰蓋曰纏曰流曰結曰使曰塵勞等皆惑染之出開合之異名也然則理之有惑雖多不同虗妄而已矣惑之有習雖多不同餘分而已矣苟知虗妄非實必達所以破妄之要若知餘分難除則識所以斷習之本此其一家論習惑之微意也但惑有通別則名相不可不辨習有小大則其義不可不分圓位論斷而有有無進否之異文相所指而有好惡見愛之殊至於教門關涉有如扶習侵習之說俱斷圓斷等義是皆自昔所議而不可不明者故於是論之別例中右習氣類文總四十有六言三惑正使名相者九約大小乘言習氣不同者十二明圓位斷習有無進否者八文指結習有通別同異者七示正習斷破文涉餘義者十凡五例三惑正使名相例六九十十三十四十六十七十八二十論曰習氣正使本末之異也苟不先明詣本則末何所云所謂正使則三惑也夫惑本不定三約所障諦理法相中當而云三爾故曰見思阻乎空寂等又曰通別見思障畢竟空等此復稍異後當揀之今還約三惑從諸名相義例非一凡十義明之一從得名則有從解從體從所障以名者如見惑兼體解思惑唯從解准例無明則從體塵沙從所障又亦三惑通名無明而有枝本之異通名無知而有染汙不染汙之別通名見思而有通別之殊則所從得名可以例推亦不一槩也二從惑相則界內外各有相應獨頭謂相應則與諸使合者獨頭則直爾障理而已三從所起前後則先無明後見思如起信所謂三細六粗次第生起塵沙既本非惑故不預焉四從所斷次第義則反上塵沙雖不潤生而以障化導故故次見思而斷若望真化方便則與無明自為枝本故也五從所障事理則見思無明障理塵沙障事又約見思自論則見障理思障事如曰違理由見感報由思六從能斷人則見思通三乘斷故曰通惑塵沙無明唯菩薩斷故曰別惑七從所依界則見思為界內惑故共為四住塵沙無明為界外惑故自為一住若以外準內各立三界則四住之名隨教分別故通唯界內別唯界外若別接通界外唯一無明不可更開四住也八從潤生不潤生則見思無明能潤界內外生塵沙則不潤生又正使潤習則不潤九從通別開合則有四句謂開通合別如上五住開別合通如三惑通別俱開則各有品數通別俱合如前二惑以此束之無不盡也十從喻者如曰見惑如四十里水思惑如一滴水又見思如水上油無明如水中乳若以三惑從教融別則文有切葱剝葱之喻即次不次也然則相雖已明而體猶未顯舊亦多說今謂此有同有異同唯一妄心而有三惑之別故無明以不了心著二邊為體塵沙以劣慧不了諸法為體見思以有漏心取著六塵為體雖有它說要不出此也約大小乘言習氣不同例四八十一十二十九二十三二十四二十九三十二四十二四十五四十六論曰凡諸經教言習氣者多矣如小乘正習其說常定縱聞大教習氣之說據彼當分但謂習氣而已不知其為塵沙為無明為家為即惟其以小覆大或以大指小則正習互陳約大教明或言斷習或不斷習然皆隨文用與各當其義未始有定論也惟其未始定論故知習氣之說不可槩言亦不應執一文一義以相矢石何者使正若果正何容復指為習氣習若果習何容復指為正使若定有習可斷則不應說無斷者若定無習亦不應說有斷者苟以其所斷考其所不斷以其所無核其所有則言有未必有言無未必無言習氣未必非正使言正使未必不習氣以是知其文相本通莫得而一雖然名可通而體不可混文可異而理不可易要必約教旨以正大途則其說固得定也何則如無明塵沙大乘教詮本是正使而以覆小乘相不可言是別惑使知有別惑則須知有別理之妨故云習氣苟不覆相據大實說還歸正使矣故曰云云又如圓人根利障輕觀行復勝豈容斷正之外復有習氣如小乘耶但以隨文用與故有時亦言斷習如曰云云今故為之說曰順文或有據理則無何以言之如小教三乘習有盡否侵不侵之異得非三乘根有利鈍觀有勝劣故聲聞但斷正使習氣全在緣覺習氣稍薄於前故云侵習非有分齊而言侵也至於菩薩根利觀勝無復存者仍前以說故云頓斷約是以分三乘之別然在菩薩實無兩異以小況大圓頓無習其理明矣且圓論正使三惑尚不容有異安有正習而體別乎孤山之言是也如曰界外見思既無異體正使習氣安得兩殊今於此說誠有取焉而自昔先達以三家二即言者又復於中紛紜異指去取失當是皆不究教旨本末徒以名相分別而已以今言之見思家習據小乘說則固有之別惑家習以大教言未必有也其如即習祇應約大小教翻覆言之不必他說也而或以懶化導心為塵沙習數起著邊之心為無明習是皆相㳂承襲之說未必其然也圓位斷習進否有無例二十一二十六二十七二十八三十六三十七三十八四十一論曰議習氣之大者唯圓有所謂斷位進否有無習氣之說是不可不決擇而取正者如四明光明記有曰通惑正使圓七信盡習氣至佛同別習盡後人評之以謂橫竪不收者云云今謂此正得圓斷橫竪之意而反謂不收何也若但云通惑圓七信盡此知有竪而已故以習氣同別習盡成之則顯竪而非竪若止如後說此知有橫而已還以前義成之則顯橫而非橫非橫非竪圓斷之旨彰矣抑又為釋正習俱盡之文故須通別各有正習可也但圓無家習之說故以塵沙義為通習則曰以今家於小乘習氣分別四四十六門故此則全准輔行而說別習即指後品無明故曰十地斷愛習等而曰若別惑者四十二品斷位如常正言圓無習氣也又曰習氣具如淨名疏說乃取彼所引文以為證也故知一往名言通別各有正習明矣然則別習既指十地所斷知無別體還指無明為習爾不然有習而無正又非其理也所以塵沙同別習盡者蓋塵沙障事無明障理圓頓事理不可異故若理未究顯事亦未盡明事若盡明理必究顯此塵沙所以盡於別理究顯之時也此義旨微意密宜非泛學者所知因得以示之其光明文句有若通若別究竟盡在於佛之文孤山以謂望前總說四明則曰若至佛地不唯別盡通亦窮邊今謂徇文者易見孤山之說非也究理者難曉四明之說是也今但顯其是則其非可知何者良以圓論見思必該始終有橫有竪所障之理是畢竟空遍一切處故使能障亦遍十方是則因地所斷者不唯未盡後位之見思抑亦未窮十方之通惑故曰蓋由見思等然則遍十方界者約橫言也因地未盡者約竪說也且曰六道衆生等者仍約見思分齊以說則通不妨別也故至佛地通別橫竪方究盡者不虗語矣又如止觀明華嚴初發心時正習俱盡文有過界內牟尼之說然彼所過者既兼正習故以八九十信所斷塵沙義為習盡非必塵沙為習氣也又如淨名居等覺之位而經歎德有無復餘習之言大師從容釋之以謂雖有如無惟其雖有言之故事等微烟則不可謂全無猶須入重玄門以破此習惟其如無言之故無復鹹味則不可謂全有以如無故故曰無復餘習是則兩不相違也至於九地斷見習等是皆順釋經文彰教道義故以後地無明為習氣若不為釋此等文相則還歸常途無習可斷矣故向曰四十二品斷位如常信如其說即無習義也文指結習通別同異例二十五三十三十一三十三三十四三十五四十四論曰迦葉聞琴而起舞身子畏色而却花二者有涉乎大乘習氣之說而有愛惡之異簡之已如妙宗鈔云云亦可謂盡善矣而猶有餘說者大師會之為一如淨名疏曰別惑未除故為界外色聲之所染汙故呵言結習未盡花則著身如大論迦葉聞琴等而四明離之為二乃曰云云此自來所以不能無疑至有或非之者故今論於是辨明也曰時人但知四明離之為二殊不知大師亦離之也文不云乎故天女呵云若於佛法中有分別者為不如法既有分別則是見惑入云結習未盡花則著身故有思惑等故知大師文中自該兩說何獨疑四明耶由是言之則迦葉聞琴固唯一意而身子畏花乃分二途而有著有去者取著身之義則是別思別思即無明也故淨名兩處皆指結習未盡花著身句以對思惑即其義也若取去花則是別見別見即塵沙也故妙宗通引呵斥之文而特取畏生死義故指塵沙為結習耳所以然者蓋對起舞之愛則去花為惡約此對分二惑故也是不唯四明有此偏指雖大師亦云爾如曰二乘厭世五欲而取涅槃故見菩薩果報五欲亦謂為不如法捨離推却而不得去乃至云天以無分別心感還以無分別心散而身子分別生死涅槃有異即是別見惑也豈非其說一致雖然此特以教門節目言之而未知其有同者焉故復更以通論圓其說於此應知愛惡二心雖分二惑取捨二性本同一機初無二法有愛必有惡有愛惡則有諸心𮨇隨事所發如何是則以身子去花之心或遇迦葉之琴則舞以迦葉起舞之心遇身子之花則却而不受其實本一機也但所從言異從動心染著而言謂之思從分別起愛而言謂之見政恐學者因其所異而異之故特以同者成之庶其說之圓也然則聲色亦有同乎曰同是界外上妙色聲則不異也苟為不異何以好惡之別曰好惡云者非其勝劣之謂也直以欲之大者莫若於色故以花為不如法而力去之非以弊劣言也亦猶持世云無以此非法之物是已抑色鈍而聲利如琴則屈曲巧妙故動人也易感人也深有況菩薩勝妙者乎所以好惡不同也然而身子直去花耳何由知其分別生死涅槃之異而為別見耶曰以微而知著也尺迦葉聞琴起舞正報可爾而須彌低昂亦復不安何耶曰此是何人境界乃以依正致詰然極有意宜深思之示正習斷破文涉餘義例一二三五七十五二十九四十四十三二十二論曰昔人但知執說以難文而不知即文以為說夫執說以難文則文無不壅即文以為說則理無不通何也如通教明留習潤生之說或曰扶習者而約位有從因果之別或因斷果留或因留果斷使執一說為難則文有所不通故各隨其義焉然在通必言留習者蓋此教不詮真如變造至果則無中道應本凡所受生必由業惑業惑若盡終歸灰斷此其教旨也故單習不能潤生要由誓願扶之而後生獨誓亦不能牽生必順教旨資習而後生則又曰扶習焉所以因斷果留者本非一文然因既已斷而果何所留以是知其不然也而曰從空入假觀進斷色心無知者此約斷位分齊言也其實利生必也固留勿斷故至果位還扶此習而起化也如妙樂文示果位而有近從七地留習潤生之言即其義也若因留果斷則又約因果增勝而說雖然此皆教道之論實道則不然也又如支佛侵習議者莫不以謂正前習後而支佛不唯斷正亦侵習氣信如其言則別行玄記預侵之說非耶云云今謂是亦執說以害文也應先核舊說未為至論而後隨文通變其說何者祇如舊言侵習約何分齊抑盡不盡否盡則何異菩薩不盡則何云支佛理在習外是知文本一往以示淺深所以隨文通變者據玄正約侵習以明支佛淺處而記復對極果彼岸言之則已不同常途由是記中順文消釋特取因中伏斷而說伏謂伏其正使使重者不起斷謂輕者先去則微念不生此所以為預侵爾而不曰正使者由不制果且復俱斷故以二習言之如曰支佛修行不立分果蓋先示其意也然則先習而後正可乎曰今以伏斷言之還不失其次亦猶三藏菩薩先伏見思後斷塵沙是也或者必曰至果還更斷習否此人因中微念尚已不生況後習耶抑今明侵習無定分齊亦何須致疑以是言之習氣之說信不一途也又如玄明不動三昧有業及見思同入俗諦所破之說妙樂示六心退有恐是爾前見思俱斷之文是皆日本嘗所致難而四明已有成說云云苟不以其常途為妨而即文以為說茲復何論哉至於一家所明圓斷次不次之義圓斷直說已明與夫諸文違異之論皆得以觸類通之則文無難者苟循習一定之論而固執之吾將奈何餘論下論曰習氣本乎正使正使始於無明然則無明孰為始乎是必曰無明之始始於法性而法性無明體元不二故知其始始實非始若對萬法而言則萬法始無明非無明始於萬法也故曰無明是迷真之始是也然則無明自有始乎其無始乎抑有其始而不可得知耶曰此無始義論之尚矣如唐復禮法師嘗以偈問天下學者自昔答者不一如宗鏡假名林間草庵諸録備出云云今不暇評之姑直以二義示其說曰一以不可知故故云無始二以知本無故故云無始何謂也蓋無明乃不覺之初以不覺故情生智隔天雲鏡塵要有其始但迷者不知此即初義也若究竟離念最後際斷亦不得知後相如初初相如後其理不二故雖有知而實無始究竟叵得此即次義也又亦不出事理之義以理言之本無始終以事言之有始有終事即理故雖有始終而無始終理即事故約無始終而言始終抑亦可云始終若極與無始終更無異轍此皆起信及淨名疏記文意檢之可知也云云余亦嘗以偈答云廓然寂體虗寂照非起起起處未全彰何礙不止止此如睡初困正夢安求始初義也要有大覺人達之亦何理次義也不患爾不知所患不能死云云抑入以性計言之無始為有始以離性言之有始為無始雖即今舉心動念亦曰無始可也如曰若定計自它能生諸法法則有始是也故復有偈曰有念同無念無初喚作初要知空劫始元不離今時思之或問玄文障理與心要之文如何同異曰不同也玄文唯約圓論故得通別俱障畢竟空等心要義通故在圓則圓在偏則偏然於別見思外而又言根本無明何耶曰此約相應獨頭言之異耳然言通別見思既盡之矣何容復有所謂直爾障理惑耶曰一往雖爾不可敻異但所從言不同非謂體別也例如報智一也而論上冥下契云云或問塵沙諸文或分三品或言界內外以二合三殊不相當亦可對會否曰此亦隨教盈縮不定如通教唯斷界內故亦不分品別既該於內外且塵沙位長故十住界內既當下品是則中上義當界外明矣圓教十信例亦應爾但位短不分耳或問塵沙若不潤生何以文曰若無塵沙方便不生又曰無量塵沙招無量果報此何意耶曰記主自斷之矣文云塵沙實不潤界外生牽報並由無漏業為因無漏業者著空之心也以著空故不了諸法故從所不了法一往對土亦得以塵沙當之即此初文是也次文亦為成三惑各有招集果報之意故以它機塵沙之病即見思是得有招報義皆一往言爾或問妙宗有云見思重數如塵若沙此於見思塵沙的屬何惑曰塵沙也而言見思重數者即彼見思是菩薩假觀所知之病凡有若干重數云爾兼識藥等知即為假觀不知則為塵沙故曰塵沙不是障是障障塵沙即其義也或問二乘塵沙何處斷耶不斷豈能將來教化衆生曰亦有時處如般若加被二人轉教領業說者聽者是即義當破塵沙也如文云云或問圓十信位所斷塵沙合該內外何云初發心時正習俱盡此乃界內正習盡耳曰若約三惑竪斷此塵沙惑合十信盡今以塵沙通至後地故約真似相望分內外耳或問四明所謂習氣同別習盡說理雖通還亦有文證否曰非無文據如上明八九十信止斷界內習盡而輔行云習通界外塵沙無明豈非塵沙亦通後位耶又如大論云十地菩薩猶有習在以於諸法有所不知故豈非正指塵沙通十地乎然則塵沙十信已斷何容至此有所不知曰不知之言非特學知而已正言位未究極故理與事皆未究顯方知向說其義符焉或問結習未盡之文本出淨名而大論指云於聲聞經說為習氣何耶又如順正理論及俱舍明二種無知本出小乘而云塵沙即是習氣何耶曰淨名之文雖非小乘然對二乘覆相而說是亦義當於聲聞經非謂小教也其二論之文蓋約教意通論本非正為二乘人說故不妨云也或問淨名料揀去花結習之文如迦葉等本是別結何得指為通結之習曰以實言之此雖別惑然於二乘亦只謂是通習可也或問觀音玄記釋三十四心正習俱盡有云一言於習有見思習及塵沙習等然此一文可疑者三常途祇應言是見思正習今兼塵沙釋之一可疑也若據菩薩所斷為化衆生本先斷塵沙今言二習俱時而盡二可疑也凡言塵沙法門與四真諦本自不同今合言之三可疑也今以次釋之曰諸文常途至果但言斷見思正習而已正以塵沙先盡故也而此文亦云菩薩修學塵沙法門治其劣慧豈非先斷乎而曰俱時而盡者蓋以塵沙法合真諦言之彰二諦同時究顯果位故云也是亦小教當分正習俱盡究竟在佛之意故知四明凡所釋義必不徒爾不然何時異於它文學者更試詳之觀法論第五總篇上論曰明理莫先乎教法會道莫近乎觀門非教則理無以彰舍觀則道何由契故一家宗趣實以二者為涉道之津蓋教以詮顯為功必由於言說觀以契悟為本乃在於忘言然非言無以顯忘言之至非忘言無以達言說之妙故如說而證則教亦忘言從聞而修則觀亦有說今姑置教而論觀焉夫觀始於北齊得之中論四句觀法因祖千龍猛傳之南嶽南嶽授之天台方是之時其為觀法至簡且要師資授受之際可謂嚴矣得其旨而默契者亦多矣惟其外適時宜附會經論因裨以時教之說而間有進修者或不得其門或有壅乎觀藥病萬殊妨障非一則又廣以乘境之道一觀一行莫不有法由是一宗教觀從容悉備而大明于時者其來尚矣然而四句三觀之宗亦因以滋蔓泛濫往往失根源者有之非不知守是道以嚴其傳亦時有不得已焉耳然猶遞相祖述宗承有在元元本本傳至乎四明極矣自是分宗列派異說橫生偏見曲學亂于其中紛紛藉藉莫可紀極逮至于今不勝其斃是以觀法之道日衰宗承之說益病間有言焉亦多不得其旨是非失當何敢造次取信於其間此論之不可已矣然觀有多門行亦不一於是乎以一念三千為觀法大體三種觀法為教行樞機十乘四行之殊事理教觀等別殆不一端能盡今略舉數例以示焉庶幾乎簡易之道條理可觀也別例中右觀法類文總六十有五言三千大旨者九言三種觀法者十言十乘觀相者二言四種三昧者七言事理二觀者八言起教觀通初心所修者一言觀心觀佛者一言勝別三觀兼餘觀相者三言通相三觀者十七明境觀不二附餘義者七凡十例三千大旨例之上十六十八十九二十二十一二十六三十六四十一四十三論曰夫三千者諸法之總名圓具之殊稱吾佛以之為所證境界法華以之為開顯大綱天台以之為所行法門止觀以之為指南極說是以言其法則界如世間無法而不具本其理則三諦妙性無理而不彰示其文則出自於法華建其言則功推於智者非圓心莫之能攝舍妙悟其孰能明融萬法而歸一心即一心而達三諦者其唯三千乎夫三千之道理固高深苟得其源本自明白今略以四義論之其一曰元意唯觀具其二曰三諦在所顯其三曰事理本一體其四曰即具無異途得是四意則三千宗旨思過半矣且不為異論所汩也何謂元意唯觀具蓋一家觀道圓論諸法必本一性一性之妙三諦天然此摩訶止觀不思議境所以明百界千如三千世間在一念心不前不後者宗在觀具故也故曰一家觀門良由觀具云云陳了翁三千有門頌益得此意云云若有一法從心外得不由性起則法成偏邪體非常住故今以三千之妙為觀法指南終窮究竟極說者良有以也故知不明三千無以示性具不明三千無以了唯心不明三千無以達法妙不明三千無以知體一不明三千無以顯性融不明三千無以見體量不明三千無以彰果德不明三千無以識圓心不明三千無以異偏乘不明三千無以顯宗旨然則三千之說所顯若此昔人云何乃以三千為定幻假為非道為差別法為因緣生為無明故有斯妄可破者一何反祖違宗之甚乎縱有一二文義憑據要各有意安得不究其所以然而直以妄為說耶其文後當知之何謂三諦在所顯良以三千雖法相之廣數法之多要其大體不出三諦亦由三諦得有三千所以非空無以遍相則由空故得以相三千也非假無以顯具則由假故得以具三千也非中無以融攝則由中故得以攝三千也是則三諦各當其義以成三千不然則三千之法尚不能有況能盡其妙乎然則三千非三千體是三諦三諦非三諦不出一性故自一性而觀三諦則三諦非三還以三諦而顯三千則三千本一以其三千本一則數而非數以其三諦非三則名而非名名而非名數而非數則所顯一性不定空假中不離空假中言有相無相亦未始有無故曰唯一實性無空假中又曰三諦無形俱不可見即三諦所顯之旨也故以是而為境其境妙以是而為觀其觀融以是而顯性其性彰以是而成德其德備至於曰然即假法可寄事辨等則又約名言以辨相耳非所謂的顯體性也夫約名言以辨相者則必有形對等義故一往名相不得不爾又何足為定論乎而或者不達不究所顯是何道理乃於能顯名相競以有相無相之論遂將三諦乖離而說又以三千偏於俗諦以是而立宗者固非其異是而扶宗者亦未為得是皆不本根源徒事名相之末其不足與議此道也亦明矣何謂事理本一體夫事理之義固非一途今於三千而言事理不過輔行曰一者約理云云所謂理造者性具也事造者緣生所造十界之事也然理無所存遍在於事良由理具方有事用則理無事無依事無理無本以理融事以事攝理此圓頓事理所以其本一致其體不二也故曰圓見事理一念具足趣舉一法事理具焉祇一三千趣事趣理乍分二義故自性具言之即三千是理造自變造言之即三千是事造事理雖異一體元同抑又雖彰二義正顯性德若知事中三千全理而造不唯顯性具之德亦顯所造無非心性故今以事理三千並為所顯良在此也事理既然修性體用莫不皆然如曰鏡明性十界像生修十界形像修性鏡內外一又曰三千竝常俱體俱用皆其旨也云云而或者槩以空中對俗諦而為事理又謂理體定無差別事用定有差別且曰勿謂相即之故矯亂而談今謂一往義門分別文固有之若執為定論則失之偏局全乖法體矯亂而談尚且不可離隔而說又安得乎何謂即具無異途夫談即談具起自一家要必兼明始為得旨何者如止觀明一念具三千又曰三千即一念一念即三千不前不後此為即具之大者仍須了知即不可無具具不可無即即而不具非圓即具而不即非頓具頓具則無法不即圓即則無法不具若即具各明而不相成顯者雖前偏教亦得言之惟即具兼明方曰圓詮故曰即具唯圓及別後位是也所以言即即具而論即言具約即而論具夫惟即具而論即故雖性德三千不唯具性亦即事中之相也夫惟約即而論具故雖修中三千即於理性而不妨諸相宛然是則祇一三千而論修性祇一三千而論即具理無異途也而或者乃以理具三千具性而不具相即性之際一法不存又言即則事為能即理為所即言具反是云云今謂彼說一往與之得形對偏強之義二往不然豈有圓頓即具之旨而以局限偏執能明乎然霅川之說信如所格是否可知而四明宗旨曾不言之何耶曰四明無別宗旨但是能明之爾故四明宗旨即荊溪天台之宗旨也但取彼此文旨而會釋之無不泯合者故不別出耳不思議假非偏假此假本具一切法真空不空非但空圓中圓滿非但中是故四元作三門之初門即是不可思議假初門即三三即一略一句猶如四指元作一二三四指一月四點似別唯一空門門一一為法界略一句不以妙假有門觀誰知法界具足法聞元作見思修證無不妙心能觀此體具故若祇觀心不觀具則於一觀分二家一家觀門異諸說諸說雖元作自異觀自一彼迷一心具諸法落在通別次第中次第而生次第斷豈知十界本常一三千本一亦如是皆非世數可分別此下略八句意似未安故也妙境元作古珠元無空假中而元作今亦不離空假中空即是心元作空假是色元作心非色非心名曰中色心絶處元作體絶中體現於一一法體皆具凡夫心具即佛具取著不圓則不具唯一具字顯今宗入此宗者甚元作十希有右陳了翁三千有門偈今附於此微加刪治或易一二字庶存顯要三千論文例中會宗附論曰明大旨者固達於文義暗文義者必大旨未通故次大旨而論文義焉然三千之文多矣見於斯類者九文而已今括而論之兼對他文以辨同異凡為五例一論三千所出按輔行所指一念三千唯在止觀以為究竟極說他文所未嘗言然所出文一而對者三一約偏圓則說唯在圓別則不說如輔行明凡夫心中具三千有曰別既破九顯一界如漸減不言三千明矣奈何觀心論疏有曰云云豈非別亦說耶曰不然祇如淨名疏記云若凡夫人迷中三千豈亦謂說耶因為之說曰言凡夫具三千則可言凡夫迷中解三千則不可例別教體具三千則可言別教說三千則不可以此拆之斷可知矣雖然而觀心論疏之文灼然此云何耶曰彼雖似言三千而不即心而具且曰是如來藏具足等故知在果不在因還屬教道之義況滅後釋文言亦無咎二約今昔則昔圓不可說今圓可說以昔未開二乘作佛故三千之旨有虧唯至今經開權顯實一道無偏故曰指的妙境出自法華即十如是文也然則十如直因果法何指的之有耶或據金錍十如必十界等故也今謂此不必然應別指本末究竟等一句始是妙境所出云云三約三部則止觀說也玄句不說也此有通別通言界如莫非三千故知玄句亦應可說但教觀殊途三千之旨或須不須故言有詳略爾二論二造釋文若以指的妙境出自法華何得却以二造釋華嚴文耶曰文各有致旨實相成何者十如既約開顯言究竟等則無法不妙故言妙境出自法華心造既該事理二義故得引造證具則以二造釋華嚴文宜矣若論相成則法華妙境非無二造之旨華嚴心造何妨妙境之談但部旨不便一往從別釋爾並示之如別云云三論取著具否如止觀以取著心不具三千而輔行又以圓人有不知互遍者此何意耶曰若論無心而已介爾具足何有取著而不具乎然此云者須知二意謂約體通收據情的揀以初義言之尚無無心可揀安有心而不具以次義言之自別教道已還皆在所揀之例況取著妄念乎雖然苟達妄念無一異相則當處三千具足不在遠求也如次文者祇是寄不得意以示具遍爾故曰苟順凡情生內外見故雖圓人亦有不得意者應照理體本無四性等則以理泯情妙斯達矣四論三千情法如向論三千即所顯之德而淨名復以之配非道何耶曰若論圓頓教中法法稱性若事若理善惡淨穢無可捨法所可離者情病而已故淨名云但除其病不除其法其病若亡體自復本而諸文中情亦名事故使自來因以事為所破殊不知有理具之事有情染之事於是有即離具不具焉情染之事須離故亦可破理具之事則是法門何離之有離尚不可況言破乎然以三千為非道者正顯真妄不二情不離理故此對之亦猶四明以修善惡對於事造豈亦破事造耶故知文各有意若槩言則失之矣五論三諦義門然約三諦而論三千有相無相則義門進否文復不同如以亡照言之亡則三諦俱泯空中尚皆叵得況言三千乎照則空中尚是假名況三千乎如曰三諦無形等又曰空中尚無等是也且三諦既皆假立何妨約空而言三千以能遍相故約假而言三千以能顯具故約中而言三千以能融攝故然以中邊言之空假雖有遍相體具之德其如融攝三千還須空假即中功歸中道如金錍之文是也故余義解又有言各有當義存互形之說云云若以遮照言之則一往三千屬假空中則即假亡泯如曰照故三千恆具等又曰境據假邊且存其數等皆其旨也分別雖爾克論心性不動何嘗定異哉若聞空假隨語生解斯即動也何謂不動乎至於約真俗以論自他體用事理等義例可知也然亦分而不分不分而分如曰理性三德三諦三千故指要有先例自他本同之釋便見自行唯在空中之文乃不分而分既約自他以分三諦而鈔又曰然今所辨自他俱在妙假又曰欲約三諦論不二故乃分而不分也由是明之凡向所謂有相無相之說皆其名言論之而已若乃其旨則正言似反言乖趣合也要須究其所以有相所以無相可也有相無相當作一句一法會之惟其實相無相所以三千皆實惟其遍相一切所以相相宛然是則相即無相也無相即相也相即無相謂之有相可乎無相即相謂之無相可乎一有一無既皆不可雙亦雙非自然亡離此有以知荊溪四明其說符契抑有以見四明霅川不當矢石也而時人專以四明說三千為有相者亦誤矣偏於有相尚且不可偏於無相及亦有無等其又可得即抑又以法相言之不出單復之異所以單明則空破假立中為絶待復則俱破俱立俱絶之謂也言有單復理實無殊所以為四明宗旨不異荊溪天台之正傳也霅川直知單義而已故未免乖離要之兩家所以異者無他法相單復而已耳三千釋疑例下論曰三千文旨雖已明白然有餘義與夫昔論而決擇未定者更試略釋之或問舊以四明謂三千通乎三諦則曰三諦各有三千如義編所敘其說果四明之說乎曰非然也直霅川以己見定之爾彼因四明有事理各論三千之說乃以自所立義約三諦對分事理言之豈非理體空中亦有三千乎殊不知四明所謂事理乃三千俱體俱用之事理正不約三諦論蓋厚誣爾然則以四明言空中為有無邪曰以義言之亦無而已如曰空中名遮一相不立豈不然乎但四明言三諦一體故有不定有無不定無由是言之謂四明三千通三諦則可謂三諦各有三千則不可彼併作一說殆於相反也或問昔論三千體相者或以三千為通體三諦為別相或反是以為說其孰為正論曰通言各有其義但別從正意莫若以三諦為體三千為相斯得其正論惟其三千體是三諦故應於名言如十法界離合十如是三轉通對別對莫非三諦者良有以也或問霅川定約事理言差無差相且難四明事理體用各有差別以為迷理為事本為末者其說孰是孰非曰此亦不可槩論須知有相對相即形奪體性等義云云而後得以論其是非何也如霅川但得形對義而失體性相即故得在一往失於至當而四明為格舊弊且申圓旨專以體性相即為說故得在至論其名言形對之義得以略也今引一文以證理非一向無差事非一向差別如輔行曰生之與佛無復界別數量之異以理等故數類亦等據此足以折中兩家之說且云勿執事義而互相妨斯言殆為彼發聞之能無慚乎其又以理所具性如地具桃李不可求其枝葉者今謂非全無相但事理形奪故在理則全相成性在事則全性成相非謂於理全無在事別有也抑四明為彰圓具故曰相相宛然而或者以十如中如是相當之蓋不知十如皆性皆相故也或問本末究竟等一如固是所本妙境亦九如之總相然亦有別相乎有則未見指的無則三千數虧耶曰自來罕究此亦難明若此一如尚昧則前九如特未定耳按妙玄云所歸趣處為究竟等此應有事理通別二義約理通論固以三諦為相不離前九如從事別說則十界各有歸趣如止觀明地獄界以癡為究竟等文以一字開其義端類說可知也云云或問正報一千可爾依報假名約何以論亦各一千耶曰但知正報一千則以依從正以假從實自應爾許所謂依報非直國土而已亦有性相體力等十法所謂假名非直十界總名而已祇於實法一千從而名之即假名一千也然則依報亦應有假實耶曰例亦應爾但從正報為正亦假名則同故從略從合耳或問三千攝法足乎曰足也亦有餘數乎曰有之如曰百界中之千如如如十如等又曰世諦心中尚具無量法等然有餘數安在其為足乎曰於法則足數則容有廣略也然則法足而數廣略何也曰無他亦隨文義而已若乃彰圓融之旨示該攝之相則三千足以蔽之惑問諸文凡示觀境或言三千即空假中或但言百界千如即空即中四明則曰三觀相成霅川乃云說有詳略故假有單復二說得失相去如何曰大意略同但霅川於略說無相成之義差不及耳而四明言境有結成未結之異所以假觀得以略否不然則文之缺剩也至於曰又準內體三千即空假中三千已是妙假猶尚更立三觀此則與霅川意同然則止觀三千妙境既是正明觀法何以不云即空假中曰非不言之但文相稍廣不即言耳至下結顯文曰若解一心一切心等始以三諦三觀及諸三法共結顯之非不昭著人見文不即言遂謂妙境不言三觀一何疏略乎或問止觀引三譬喻以示心具三千而霅川以初二喻謂以生顯具喻理造三千後一指夢所見事喻變造三千意以後喻驗三千無明故有者若為疏理耶曰若論喻旨固各有意總言不出譬於前文理性自他橫竪結成等相即記文所示者如此又曰若自若他不出三諦下之二喻擬此可知曾不聞以二造帖釋者況皆譬喻自不應執譬難法然則文以三千屬無明者蓋對一念法性故一往順譬且以三千屬於諸法諸法本於無明其實三千之妙必合三者方盡其理故曰無明與一念不出法性故非多非少安得專以無明為言耶或問以對會四土六即總別等義余既別章示之得以略也或問子向以三千為終窮究竟極說未易以語言文字盡其妙政恐學者昧於自得有不說三千之言今何遽說耶曰誠有之然今說者亦不得已焉耳雖然且道祇今是說耶不說耶任彼自答云云三種觀法例一二三四五六草八草九卅一四十論曰明觀行之總攝被根性之多途而無遺者莫若三種觀法焉故曰夫三觀者義唯三種云云夫圓觀一而已矣何容有所謂二三耶究其所以立者蓋有多義故以意則順機入道約義則從行從法從事之別又從行則正示行門餘二則義立成觀若各論其意則復隨文用與不同所以從行觀者是固止觀專為觀行之機立以乘境從於四行俾惑滅理顯功成入位至清涼池而後已亦謂之約行觀其如事法觀門蓋本於玄句赴法行之機使專觀則有所不待令尋文則彼且不暇故示無方之說約義作觀託附而修亦足以入故有茲二觀之設觀相修法備諸本文不可具盡通言不過以三觀之心觀五陰等境一也而所以論者就今類文大約不出四說其一曰事法修否其二曰不待觀境其三曰歷託同異其四曰兼互修相何謂事法修否蓋其說始因山外一宗以事法二觀為不可修意以文中乘境不委及不簡示識心且據文云若此一句足得修行十境十乘便成煩芿故也及示立觀凡有二意故云云四明則異是說乃以三種觀法皆為行立俱可造修略有三義一據文立行示修意二觀陰揀境示修相三以廣決略示修法此復多途有於事法二觀不待修習而自深證者有於略觀修之即入者有於觀道有壅即須決通者此又二向大師在世咨稟口訣人師後代懸取決通並顯事法但可修也此皆義書等文旨云云後有霅川師者亦嘗論之彼固與四明而亦不奪山外蓋傍宗立義而已今謂彼不可修者是不必難之以它宜直問之汝將何以為修耶豈必同事行而為修乎抑布列乘境然後以為修乎不然則既略有境觀可以安心矣若何不可修耶果不可修則一家所傳四句觀法與夫經教一觀一行例無用耶彼徒見喻疑一文執為定論故也殊不知彼因僻解師以十二部經觀心為頓頓觀形今止觀以為漸頓故一往斥奪云爾以今言之彼略此廣既無異途得以決通豈全不可依耶亦如義書所解也云云文既非據則所立二意任運成非然則四明既約諸義申其可修之說有符文合旨之得曲盡機教之相其與山外得失遠矣何謂不待觀境良以玄文示立觀心意云即聞即修起精進心於是籤釋云云故有所謂不待觀境之論彼山外宗既以事法不可修則不待之言任當自失但傳述四明者復有異同之說此不可不論也一曰言不待者即不待專講止觀及自尋文必須師氏口訣懸取乘境以廣決略方可修者一曰若謂以廣決略與專講等異者此知二五而不知十也其自說曰義書明事法觀正不必以廣決略於事法有壅者方稟決之今亦不暇評其是否姑約四義述正其說而扶顯之四義者何謂約觀定文旨隨機示決通對舊言不待成觀論所歸此並義書文旨云云然則不待之言意有所屬蓋正以事法之略對彼止觀故修略觀者則不待彼約行之境觀也一是不唯不待專講自尋亦不待決通此其修事法之正者但於觀道有壅者方決之耳況所決通還通事法之壅信非他觀也二而又曰不待等者此因他計有是之斥未必的意也三是則雖曰不待而妨修入縱有決通仍歸事法四非謂才言決通便與止觀同科亦非不待專講而必須咨決等評者雖知事法不必專在決通未審決者復是何觀抑義書之文將如何通苟得今論庶幾盡善矣何謂歷託同異按義例有云如方等普賢其例可識文本明託事而却以歷事例之又輔行引大經等文本屬歷事而乃以託事結者舊約託事即歷事等四句收判亦多承用今獨謂不然立句煩而無當指文乖而有失無足取者直以二義斷之曰約觀正名則一向有異據名論義則有通有別如山城等觀既約依觀正以外表內還就心論觀則正名託事故與歷事直以外境表對觀門者異也若據名論義歷事得名託事以莫非託事見理故也此則名通而觀別如輔行云云託事不得名歷事但是約事表託未必歷境用觀則名與觀俱別然則義例文者蓋因託事兼示歷事同是借事為觀故也故云若以導執情等非謂以例託事也亦是以理體事之義同故義書云且大林精舍是依報色又以理智體之正同方等普賢歷尊容道具此其證也若辨異者則歷境內觀之殊正觀導情之別故知同異不易研詳但此區分觀道可識矣何謂兼互修相此因續遺明附法有含託事之文故有三種兼修之相云云或者以謂投足淆混決略有妨今謂不然是皆隨文約義而作非必修者亦若是交牙也文相雖爾據實用觀還各有歸何淆混之有如以廣決略謂之兼修者以十乘不出約行之旨故也至於光明附法有推運之釋者是亦順文乘義而已未必便約起心觀也故文有性既具運之言還是理觀耳餘如別論十乘觀相例十七卅七論曰一家觀門入道所以乘必至十者蓋入道之要始於照本照本而後善修善修而後盡法盡法而後離謬此十乘所以次第生起彼上中下根深諳妨障大備法藥也故有不照照則達矣有不善善則至矣有不盡盡則得矣有不離離則入矣然則不思議境者照本之謂也發菩提心巧安止觀破法遍識通塞者善修之謂也調道品對治助開者盡法之謂也知次位修安忍離法愛者難謬之謂也四者既備然後圓實之道可階而升也此其大略而已然所當論者有三其一對根進否夫觀法匪十對根有殊雖復根殊但是一不思議觀觀不思議境而對根之說文或進否此自來所以論也大意云上根唯用一中根二至七下根具用十此則由三根故有十乘也然則輔行何以又曰前之四乘用無前後苟無前後何容分配二根又曰行人觀法極至正助正助則七乘耳何得又以後三對下根耶曰文各異義母得守一以妨諸也故或以一人具用十乘或可十乘被多根性以至一乘自對三根如曰前四用無前後者此約一人具用說也故文續云通塞等三成就前四次位等三以判前七能善用者十如指掌是豈得以大意對根難乎又曰觀法極於正助者車體具度義備故也後三乘之所涉雖正非觀法若下根非此則不足以離謬或難於入道故用對之其二前導缺具凡論乘體必三法具足若法若喻莫不皆然所謂三軌和合為一大乘者法也其車高廣駕以白牛衆寶莊嚴者喻也故義例曰云云此則大體之說也至於玄文歷四教以釋乘義其藏別二教乃以觀照為體如文云云然則觀照既當前導若以為體應缺其一耶抑亦具而或有說乎曰一法兩用何必他求蓋觀照體是智性取其照用即前導也約其破惑顯理從始至終有運進之義即車體也故文曰三藏以無為智慧名觀照觀照豈非前導乎且曰正為車體豈非一法而兩用乎別教例之云云然以法例喻是應以白牛為車耶曰正由昔人以喻蔽法故不能通不可以喻喻真解脫故知以喻難非也然則藏別不以真性為體者玄文固言之矣在藏則真不能運故證非乘於別則理不破惑故用智為體爾又如籤釋云云即其意也其三指體同異按義例曰若無十境乘則無體若無十法名壞驢車是則陰等十境圓人體之無非乘體而釋籤又曰以火宅為寶渚必為所焚指煩惑為能乘義須傾䨱何也曰祇一障體而取捨或異者蓋體有當體有所依然則義例指為體者是所依也籤斥為非者非當體也若夫當體則十乘雖異當以一不思議境為體可也雖然圓論所依依而復即則此二體義異體一也故曰能觀觀智即無明是豈得敻別乎而釋籤非之抑又有旨焉文意乃由別顯一科正約不思議三法真性而說恐世濫行猶迷此故故約車體對餘莊校與奪言之意言若迷一家不思議旨寧缺莊嚴缺莊嚴則徒乘而已車體猶存昧斯旨則自行何依一切皆廢然則所至苟迷於寶渚斯火宅耳能乘不達於妙境斯煩惑耳故云也其有餘義尋讀可了不俟多端四種三昧行法例八九十十四十三草五卅一論曰諸經三昧固不一途而天台以身儀四句束之故有常坐等四三昧焉是為五略之大行三種觀法之一也其行門方法備諸止觀今所論者三義而已一曰一行所本二曰得名所從三曰二觀通別所謂一行所本者按止觀云出文殊問文殊說兩般若經其文殊說般若文凡三出並同本異譯今所引者正出三藏曼陀羅仙所譯云云明一行三昧其文顯矣考經三昧本亦觀佛如文云云況三道之文前後散出本不一處而一家有云直觀三道者蓋一往為成今止觀端坐觀陰界入之意直以義用文不以文用文且欲簡異般舟三昧觀佛故專從三道理性言也立門投足雖爾究言觀理不離事觀事必顯理觀心與佛同觀佛與生等其歸則一也而言文殊同般若者經直名所問經恐從前本通目之也據經有云於九十日修無我想端坐專念不雜思惟即今行相所以兼本者一則期限如所問經一則觀法如說般若合二者成一三昧之法焉而四明云問菩提經者未詳指意置之可也所謂得名所從者尋經一行之名該通諸義故或從理從法從身儀等隨文用義皆得名之如經云繫緣法界是名一行三昧大意據此以理顯行豈非從理乎又云欲入一行三昧當先聞般若輔行約此對常坐等名以示所本豈非從法乎又曰應處空間捨諸亂意不取相貌繫心一佛專稱名字隨佛方所端身正向能於一佛念念相續等記文約此正名釋義揀異餘儀豈非從身儀乎故知經祖文義常通而惑者執之成難爾所謂二觀通別者夫行必有觀雖四行不同其所修觀二途而已而說者不一或曰四行通修二觀者或曰上三三昧理觀第四三昧事觀者或曰第四通事理者各據文說義云云今謂論空言者不如正以行相如止觀修大行文非不明白何莫之用而自臆斷耶其所謂理觀者莫過常坐直觀三道等者是而事觀者豈非第四三昧縱任三性於四運推撿四性者是若諸經行法則同上三三昧矣故文釋四運之文則曰是隨自意中從末從事而修觀法又以諸經行法例上三三昧則曰如常坐等惑唯觀理豈非正言除三性外餘皆理觀故也然則文曰二途不可廢者約四三昧通言之爾何關別對義耶抑彼謂之通乃以運性混而為一兼彼歷事謂莫非事觀者曾不知推性本通雖止觀十乘上三三昧亦嘗約四句推之如修德境三昧儀等皆是也豈以此等例為事觀乎其所以異者推性而不推運猶理觀而已即運而推性者斯事觀爾得斯同異夫何惑焉雖然常坐觀三道等輔行例為歷事而妙宗特以為理何耶如曰常坐一種縱直觀理等又復如上配觀有事有理而止觀又曰方法各異理觀則同何耶曰各有所以義不苟然何者如初文為釋四行方法各異故各從事出其異相又顯四行理觀則同故理觀之名不專常坐此則止觀之意也其妙宗文者正顯從行必兼歷事意明十六觀經是從行歷事觀故以常坐對餘三昧縱奪言之而輔行又以理稱通於四行者蓋對所歷事別故若事若理莫非三諦之理觀也然則事觀本推運性而亦曰一心三觀何耶曰若得義例文旨此不足疑云云其餘文義在文可知無俟別論也事理二觀例十三卅二卅三卅四四十二四十六四十七四十八論曰人皆可以入道而有靜散利鈍之殊法皆可以成觀而有事理本末之異惟以其法適彼之機故有所謂事理二觀也故義例曰觀有二種一者實相二者唯識實相觀理唯識歷事又曰夫觀心法有事有理云云然則二觀明文本於占察觀門行相備諸止觀從事從理之旨斷自於荊溪三觀四運之要復符乎大士所以成一家觀門為入道之要夫何論哉特由昔之說者以非說為至當至於境觀用與乖謬頗多因恐後學習非勝是混亂觀門投心罔措是不可不辨而正者如論事理之名則以起心不起心為說承其說者多矣今獨謂不然且心之起否皆事而已矣若以不起心為理正同山外以一念為真性四明闢之非不切著今為四明說者可復蹈其轍乎況修事觀者固正照起心亦不專起心蓋亦觀於已未心故而理觀者雖正從不起心然亦通起心如觀九境心等故知不以此的分事理更有約寂照制縱推運不推運等為說是皆見其末而不得其本者也以今言之不必他求當據諸本文可也即義例有曰事理亦名本末本末相映事理不二豈非正約本末言事理乎然則何謂本末即現前一念識心推而極之根乎一性此之謂本亦即此念變而通之至於起心此之謂末末即是事變造十界也本即是理本寂三千也四明則曰事理二造既其不分事理二觀從何而得此之謂也所以同觀一念識心隨其根性從本從末之異從本故直達一念體是三諦則宜以三觀觀之顯其性本寂滅從末故即於起心推以四運則宜以四性撿之了其性本無生然則無生即寂滅也寂滅即無生也其成功顯理則一而已由是言之三諦三觀者本也理也四運四性者末也事也所以相映不二者蓋相映則自異而同不二則自同而同自異而同者即本末之言約觀所以三觀四性彼此牙顯卒歸於同也自同而同者即事理之言約體所以兩種三千本唯一理終無二致也是不唯事理義明抑亦二觀之相顯然可從而自來混為一說故未盡理然據義例等文正以起心對不起心而分事理何謂非邪曰一往似爾究論不然如向評舊可知若更言者今不問起與不起但直達法性者為理觀推撿性運者為事觀即昔人所謂起起皆寂是也其義例文蓋約便宜云爾如霅川有曰未起分別即與真如內體彌近其用觀者如伐樹得根起心既是根塵所生之法其用觀者如尋條得本在理或當今有取焉但彼以識心對餘陰分之為未善耳於此應論四三昧對觀之義如上例至於歷事之事與今事觀固所不同但義例有云實相觀理唯識歷事事理不二頗若難明者今究其文略得他通皆屬教止觀雖有教行通皆屬行夫惟皆教故並是所成皆行故並是能成以能成故若教若行皆可論修方彰解由行成之意此其可修之大旨也更有餘義此不詳出但其修相難明同異莫辨政使示之亦莫不以若人善用止觀觀心之文為說然則與乘境何異哉謂異不異皆未免乎有妨今先示其修相而後同異得以辨之原其旨者本由一心具足諸法諸佛證此按心說教四依先覺覽教成行還將此行而修一心此心若開全顯諸法夫觀既由教而成則教必由觀而顯教觀相循迭相為用起教之觀蘊乎是矣言其修相必皆妙境妙觀妙定妙慧亦莫不以不思議三觀而照之圓頓十乘而運之是則善用十乘乃所以善修起教善修起教乃所以善用十乘不善用修者反是雖然此知同一圓觀而已未見其異也今示其所以異者所從不同其說有三一者從本以此十乘元依教立從所依本得名起教二者從用由修妙觀慧性通達一切佛法皆自心顯從所發用故名起教三者從果復由十乘觀成理顯破惑入位則能果後起教益物從果名因故名起教非此三義則直從觀體名曰十乘故不二門從相異說乃以別對自他而止觀等文還約十乘以示起教理無異致故也由是言之彼謂但修十乘果用自顯不必修起教者蓋不得今同異之義故也且以旨同言之則修十乘固已修起教而攝果用矣雖謂不別修可也而彼以別修難之妄也以其相異言之雖謂修起教可也而彼謂之不必修非也既非且妄安得而取乎然則四明有曰若不修起教則不能成就應機說法之用者非直言修而已深求其旨蓋推本要終意如前從果義中示且有所自而云故義例曰若無大悲熏於法性理藏不開止云後時則無能利之法是也若乃證其必修之說則如止觀示心攝法今文明自他皆通初心所修顯然可據何固昧耶其又以輔行所謂起教唯尊果後故與初心化他境異者是猶以泛論生起而蔽文旨本通文意政由起教通於初心有同依理生解化他境者故一往取此果後對彼初心以辨異爾若專果後任當自異何須此論以是知其義有同異故也觀心觀佛例二十論曰觀心所以觀佛觀佛所以觀心其理本一孰云異途然則論之所由興者其始於十六觀經疏題稱觀佛而宗曰心觀苟宗題相稱何心佛偏言於是論之不一也或曰觀心固違於觀佛或曰觀佛終妨乎心觀故莫若妙宗約心觀佛為兩得之也但不善其旨者猶以義涉兩途未能泯一且謂定內外難易乖違者今謂四明之說無非是者請試申述其說而後通昔之非扶以文旨焉何謂也然論心佛同源本自融攝各從一境豈不相收故妙宗始有心佛一體之說此則大體之論也但今明觀境異乎兩者之間蓋小乘觀佛不能即心大教觀心未必託佛皆不得有約心觀佛之言唯是此經與彼般舟同託彼佛而修圓觀既託彼佛故不同餘直觀心者既曰圓觀故雖觀佛不離自心故有必不必一段之義此則今文之旨也所以特曰心觀而不言觀心者非謂能觀亦非直所觀正顯此經即心為觀也然而率觀彼文凡曰託曰據曰就曰即者約義云爾其旨則一也由是論之政使不因今文宗題之妨但是圓觀色等外境亦必須曰約心觀色可也是知四明之說得之有本故雖通今文亦不失大旨所以為至當之說若得一而違諸又安得為善說乎其所定內外難易者蓋以其旨不以其類也何則然此內外之言非有方所直約心佛法相言之故以佛為外以心為內今既觀佛豈非外乎此乃非內非外而論內外若以方所而言內外者正同迷為內外又安得悟唯一心乎至於難易之義亦以法相言之故一往觀佛為難觀心則易今既約心而觀得不曰易乎此亦無差而差約非難非易而論難易故曰以旨不以類也人不見之直以類言便謂所定失當者誠不足與議也然復須知此非四明臆說蓋亦有所自而言一如本疏釋是心是佛之文凡為二解云云二如輔行釋般舟三昧之境則有二佛云云夫惟感應道交即所謂西方從因感果佛也解入相應即所謂自心三昧佛也故文曰以此二佛共為一境為順理故從初義釋豈非今約心觀佛之意乎又如妙疏記有曰稱理起想但觀一念妙理即足何須土想答曰云云乃至若唯觀他遮那之土必迷自境若了心觀自即他故他即自故不了此境自尚成他況觀他耶觀土既爾佛身心然以彼格此其理一致豈非文旨的有所自乎苟如他家以觀佛三昧為宗而不即心而具者幾何而不向心外觀耶故此一說尤所當知勝別三觀兼餘觀相例十二草二草三論曰三觀之義造修者所急故一家所傳宗旨繫焉是不可不論而明習而察也但隨宜異習觀相多途率而明之凡略有四曰一心曰次第曰勝別曰通相通言莫非三觀而名相本乎瓔珞於是有次第焉有圓觀焉云云而所謂一心勝別者其皆圓觀之所自出通相則涉乎兩間而復別途者也故曰三觀本宗瓔珞若別措所自唯次第三觀專本彼經以其文顯故也餘則各有文旨如一心則本乎中智二論此正今家所傳勝別文相獨見止觀餘所未聞唯圓覺有所謂奢摩他靜空止三摩鉢提幻假觀禪那寂中止觀等於中隨舉一觀為首今以偈括之謂單三復具四單復對成三三八并一圓漸頓二十五故有所謂二十五輪似今勝別者大師暗合爾通相則本於淨名也此復別例今以次論之夫一心三觀言之甚易體之實難抑三句言則易一句道則難其始本乎中論四句觀法云云然則觀出於論論本於經經有淺深次不次異故一家對教有通別焉北齊則悟一心之深者而天台復取智論三智在一心中得以成顯之會通之旨歸之故一心三觀之道始盛傳於時其言曰因緣所生法即空即假即中略釋如止觀第一云云又曰一空一切空等備在諸文不可悉具而義例以一心三觀三觀一心破橫竪者蓋以義言也又曰空也者蕩一切法等又曰一念無相謂之空等四明則曰於一心中宛有三用皆其旨也而所當論者蕩立之說耳蓋止觀有曰天竺注論凡七十餘家不應是青目而非諸師霅川扶宗引之曰唯青目最劣尚云一蕩三立荊溪云盡理言之俱蕩俱立以其言出未背宗時故使流輩後學信而承用之今考其文理有大不然者此不得不是正之按文一蕩三立正一家所承宗旨若青目則專蕩故不可依也故記曰云云曾不聞荊溪有俱蕩俱立之言不知霅川何從得此苟如彼示且責以斯文不意獨擅之宗翻為最劣之說一何誣甚乎雖然使以四句析為蕩立何如二俱之極於理圓於義耶曰固有是理亦不害義若達一句即三則二俱之旨斯在何必遍彰其名而後始顯邪必爾則不唯一句蕩立互形抑彰四句離而不即言欲融而反離其得為善宗旨乎斯說也蓋有之矣如說六即即即具六之類是皆過於圓說之敝也其次第三觀如瓔珞所明云云即今別機所用如曰十住修空等此如常說而所當論者傍修之相耳按玄文曰十住正修空傍修假中等然別非一心且無並慮何以為傍修邪曰昔人以期心示之蓋雖期心在中若非空假中無由入如曰以二觀故得入中道第一義觀故知祇修空時便是傍修假中後位例之非兼傍而修也雖然此有名無實未為至論今以二義疏之謂據位論觀則如常所明約人示修則進否有異良以別門根性多途故有利鈍得意不得意者其得意者尚於三十心能破三道成十地位又有上根於十信位而出假者豈不能於十住修假中邪但利者常少且非正修假中位故云傍耳是則二義兼得也故妙宗示先修空觀位云設欲修中能所不絶故修空為正中觀為傍即其例也然特見於此文者是固隨文用與抑又有說焉蓋文於十信已言仰信此理故十住等位義當依信起修而有傍正云爾所謂勝別三觀者本是圓人以圓解心修不一觀故有多入中少入二等六句修相而曰雖別增減而三諦無缺又如四三昧中歷事先修空假之文是亦不別而別即其相也若以會圓覺觀相似同數義則異彼有增減故三觀或虧此雖多少而三諦無缺以無缺故唯六句而已以增減異故則有單復具三之相必約二十五輪方盡其數則此略彼廣略固不足以攝廣而彼亦未可收此故知經教名相不必以此經出乎方等論其化事則正為二乘保證偏空兼為凡夫著有菩薩滯偏故使大士處處彈之意令回心引入圓極故知此經以彈呵折攝為本適機不一為宗漸引入實為所歸密示圓意為由致教既橫竪觀亦隨宜通別相成進退合準有異餘部於是乎明此其大略也更試詳言之夫彈呵所以折伏折伏而後慰喻慰喻而後攝受攝受而後可與至極至極則能事畢矣然若直彈呵祇應隨其所著以偏勝者斥之雖三觀從別可也惟其呵折意在攝受攝受宜無異途故得通以三教為斥此則已用攝受之意以觀準教豈得不通故曰此經以彈呵折攝為本若為一機以論攝受雖從圓極可也為其所攝之機不一有橫有竪如諸國王長者菩薩弟子衆機之別橫也而凡夫著有二乘住空菩薩滯偏淺深次第竪也惟其機緣雖橫而竪故通而復別論其斷證還從次第故曰以適機不一為宗抑又意其彈呵與攝受不同此彈呵與上異攝受與上有同有異故彈呵從通今其鄙耻而已不必徇機之所宜攝受從實故須論其所得則宜斷證以次夫斷證以次者竪攝也彈呵從通者橫被也橫被不妨竪攝竪攝不妨撗被此通相所以成也亦適機之相也經文通而意別室外之經文別而意通惟通別相有前後互成此其所以為通相耳然則一往據文大師從別而記主從通何也曰是亦師資相成顯之義也蓋大師正釋三觀通意已彰故明成上生下但從別說此則以三觀之通旨成上下之別文故也能成既通所成豈別故記主復以上下之文自相成顯則文與觀俱通雖則俱通而復宗明義還申別意故曰為存方等遍對諸土止及以別呵菩薩弟子即其意也要之或通或別進否異者並由未至今經開會故也故曰若至法華方純一味反顯爾前未宜一槩又曰依教準部進退消之無令失旨豈非正由方等部教法應爾故則向所謂聖意化源者信矣通相餘論上論通相者患大旨之不明大旨苟明小節不足論也雖不足論而不得不論者尚恐學者以小惑大故併以伸之夫通相一也而諸文或言屬圓或言屬別或言兼於圓別或示該於三教云云其所以異判何也曰蓋有由矣義亦難明是應先知其本始可定其文相何者良以其本方等部通四教圓帶方便故其能判之教雖云別圓而非常途所謂別圓乃通約四教三觀而論別圓言通亦爾至於所判通相亦復多途今以三義論之俾攝諸文盡亦使通相義明所謂以行相則屬圓分教則屬別依文則屬通且疏曰通相一心的屬於圓果屬於圓矣何容復通三教抑取何義云的屬耶此記固言之文曰行相無殊豈非正約行相與一心同故耶故曰行相屬圓雖屬於圓而不專於圓以其部旨兼通有異純獨之圓故疏復有約通論圓之揀夫既約通論圓此圓所以復通乎三教如記所謂從教前後又曰復以教分圓教永異空多屬通等皆其例也故曰分教屬別然而文曰若分教釋理其別圓何也今謂非指所從之教云具別圓蓋言行相本圓從教成別兼本言之是故云爾亦如記曰通相雖圓然帶方等乃成圓中之別相者是亦兼本從教言之以兼本故曰圓中以從教故曰別相則分教屬別之義深有旨哉若如舊說便見錯亂夫如是則圓不定圓圓方成別別不定別別不妨圓所以疏釋三觀並通諸教釋相然則別意則隨聞各解以通意則全成一空一切空等雖一一觀各通諸教而空但在空未涉假中餘二例然由是而言通於四教未必圓於三觀圓於三觀未必通於四教此其所以為帶方便之通相也然則圓而且通者其開顯之實教乎故曰依文屬通此通相之通非通教之通例知言圓亦二不同云云而此三句義必相由離雖乍分旨則本一本一故無非通相乍分故二釋之殊即初二義分教釋也後義依通釋也二釋雖殊旨亦不別復依之言良有以也其如二釋猶自難明故更申之今謂不出結示上文即文初至通屬別圓初義也從自此以下次義也但一往初釋從教雖通別圓義歸於別次釋從義雖亦云爾義歸於通此二釋所以異也惟其二釋皆約通論別圓若與疏所謂別圓異者故復料簡云若爾為定別圓則正問其所以對通論別圓者故答之以適機為宗祇一通相隨聞各解此其別圓之定者若然則文兼料簡三義而已謂名分義通隨機恆別是也所以文以三種三觀屬對別圓者名分也如向二釋者義通也隨機恆別雖不關二釋而亦不離乎二釋也由言是之雖有異文總不出此隨文斷義則可知也或者不究其所以然便以的屬等文作定別圓而解又以分教而混通釋曾不分二圓之殊亦不體二釋之旨而曰一是通相一非通相者致與一宗文旨乖違一何踈謬乎通相餘論下舊論通相之名或言通總或言對別名通或信解虗通之通雖皆有文若正名釋義當從初二義也然言總則總三歸一如對別則自一通三故二說皆通其虗通之義本非釋名因虗解而云爾如又曰虗解踈通是也若以虗解為名則遺實益矣其不可者此也然則通相之相其相如何曰是固如疏記已釋然不可不了其大旨今舉一義明之如入空則知三諦俱空雖空通三諦但以一空當名就觀除惑止斷見思而已故曰云云然就觀除惑者實益也餘二亦空者虗解也虗解則踈通而已未能除惑故曰虗解而能袪於假中二執是曰虗通然袪執與破惑異者是猶雖未除病而亦不執藥也自有因達中道空能實破無明者此復別途如曰信三諦空等云云文因對明例別耳或於此定約中邊論虗實者蓋不知三諦各論而偏據一文故也此特約空觀示而已學者要當以三隅反則假中可以類知云云或論機則曰通相被何機者是何言歟如向國王長者菩薩弟子正得彈呵攝受益者豈非通相所被機乎又如三教慰喻為信行人三觀調伏為法行人信法非所被機乎又曰別圓二人隨聞各解非所被機乎抑非唯佛世至於滅後此通相教若不被物成益則徒施耳云何更問被何機耶雖文有曰今明三教但慰喻菩薩不取二乘以其無慈永入滅故又曰此通相空不關二乘語似奪彼與此者蓋亦呵折二乘之意爾不然若別教慰喻從空入假觀調伏成上呵十弟子無為緣集者此復何乎或又論此觀門修不修者是亦論之太過今謂若有一法一行不可修入者則佛祖有空言徒法之失況此通相有機可被有益可論有惑可破有觀智可照何為不可修耶第弗思之其如前輩異論則存諸章藻此不暇辨勘以今說當自知耳境觀不二兼附餘義例七十七草七卅五卅八四十四四十五論曰立境立觀蓋修門入道之相不得不爾克論體性則其本一其歸不二惡有境觀之殊哉然則苟不明二何以會一若不明一何以泯二故先論二以為入道之門次述不二以致理性之極何者蓋境則起觀之所觀則照境之用是亦境者迷之始觀者悟之初觀極則與境為一與境為一則境無迷悟迷悟自觀耳故境不可無觀觀不可無境境而無觀則境不能顯境既不顯妄何由息觀而無境則觀無所成觀既不成理何由達故兩者相由而有亦相須而成此
