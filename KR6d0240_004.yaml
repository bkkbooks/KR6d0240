body:
  text: 壽量論第九總篇上論曰佛身無為不墮諸數則佛固不可以數量求也云云自彼於我何為而尚得以名相論乎夫是則佛本無身無壽無量而可説示也矧以凡地情量分別諸佛境界不可思議其不可論而得辨而知也亦明矣雖然此特佛本住法第一義諦不可説一途爾若乃全體起用普應群機隨順世間於無身壽現有身壽施於應迹寄諸名言亦何往而不可哉故一家壽量之説該於三身三身應於四教四教機別所見不同體同用殊身説亦異故三身有事理修性體用開合法相之別而壽量亦有通別進否名義之殊播諸章疏則六能四句文各異釋歷乎時教則五時教主相復殊品至於應相勝劣身土感應言迹既彰則辨論形焉辨論生於異見故宗途之説不齊雖不能齊而是是非非要有定論然則一宗説而歸至當者必藉夫論辨今試略以諸例論之別例中右壽量類文總八十有七言四佛身相機見體用同異者十六言三身壽量身説不同者二十言諸身開合者九言六能四句釋量無量者十五言應相勝劣者十言五時教主兼淨土應相者十一言身土感應者六凡七例四佛身相機見體用同異例一三五六七八九十三十四三十五三十六三十八三十九四十一四十二五十一論曰自佛言之由三身而應四教自機言之由四佛而見三身蓋三身乃如來圓證是為三德不縱不橫未起化前合為法身是也義須先明今從文始且以四佛而為首論夫佛本於無身故不可以身定原於無相故不可以相見尚無一法可取豈得以四佛而言乎特由機教相扣感應斯彰一期化迹故四教應相於是所以形焉如文明四佛成道自覺覺它以至轉法輪入涅槃相即八相之三或圓見一一皆八相者佛果之事備矣而文出四佛壽命常無常異及四教相好之別其所以異相亦明矣然則所見者應也能見者機也故復出四教機見不同大略文相不過如此今姑約六義四難以論之何謂六義曰機應曰揀判曰境本曰本迹曰當分跨節曰體用所以機應者然應本無殊機見自異機雖見異應相常同故以應從機應相亦別以機從應機見亦融故曰祇是一身四見不同此則機應之論也夫既約機四相有異教門揀判義乃多途謂小衍則相無相殊約偏圓則曲直之異如文云云準此以明則四教迭論次第勝劣真中事理見相差殊此則揀判之論也又以境本言之則四教之身雖皆三密約身從土本自同居則曰以三藏如來而為境本於色相上四見不同境本雖爾本迹不然故約應邊從實而論則本圓迹偏如曰前三權果本是圓佛垂為三迹此則境本本迹之辨也然則此皆當分之身故有四佛四見之別若約法華開顯跨節而言則三藏劣應尚是圓佛況通別乎故曰若開方便示真實相即向身是圓常之身雖然文示當分無非圓實猶是會偏歸圓之意若約實意而論體用則不唯體同一佛而亦用均四殊亦猶約法既開三教無非祕妙是則三佛亦皆妙權故曰若得實意方知四佛體同用殊此則六義之論也何謂四難曰四佛成道曰通教合身曰亦通佛收曰入見尊特所以初難者此由昔人嘗有難曰大小二始佛固各有成道之處敢問通佛何處成道云云彼因答曰祇一佛成道四見不同何必一一約處難邪彼作是答自謂獨拔之見殊不知其難猶在今應更問通機復於何地見成佛邪故知義猶未盡以今言之成道機見之説固不可易要知通機初見成道雖非二始顯教之數不妨此機於鹿苑時有密見者作此答之庶亦可矣其次難者出於通佛有所謂帶比丘像現尊特身又曰丈六尊特合身佛雙住真中故有合身之義因有兩宗論以須現不須現者今謂此義頗涉宗旨至下論宗始可究本今置其諸姑約合義折中其説則現不現自當知爾彼云合者蓋言一身雙現兩相非謂即劣是勝名之為合今則不然祇一佛身二見不同義之如合共義帶義亦然何必須現然後為合哉若如彼説是殆以兒戲論佛身相惟識者斷焉又其次難者蓋霅川嘗以輔行及觀經等亦通佛收以難四明淨土教主非尊特者四明以謂指四十八願經焉今謂四明凡所議論率皆正當白玉微瑕唯在指經一事不然則的指何經耶此唯憲章頗得指文之實委如彼文自昔共取今從之也至於入見尊特所以難者本二乘於方等被彈斥故轉藏成通既入衍門得見尊特有異一家真中義者今謂見有分見有非分見此蓋非分見者也以彈斥故須加被見以非分故出仍見劣故不應以真中分見者為妨二識進退委如後辨於此亦應論真中感應等相義在後例此得置之三身壽量身説不同例四二十草一二十二草五草六三十三十一三十二三十四六十五十八六十九六十一六十二六十七七十七十一七十三八十三論曰夫三身者壽量之本也故量非身無以極其致身非量無以盡其相然欲明壽量則必約三身以示大體但三身之義大有所關壽量之言名有通別故於是有體性焉有法相焉有所住理焉有壽量文焉有身相焉有説默焉有宗途論焉是不可不明之也何謂體性即文有曰二者從體三身相即無暫離時又曰若其相即俱説俱不説此皆約體性以言之故三身舉一即三全三是一不縱不橫不並不別也何謂法相不出事理修性體用等別即法身理也性也報應事也修也又法報為理應用屬事智合於法名為體勝劣兩應名為用體則為真用則為應故合唯二身三身既其體一法相亦不分而分一往雖然通論非例云云又報有自報有它報名雖通它實唯局自故文釋三身報但約智良有以也但智德勝應莫非實因所克故通得名報應由從機所現故復名它耳所以修性不妨體用體用不妨修性但觀報智合於何身以分二義非謂合自它為一報身離報身而為體用也若以它報定屬報身則應用唯劣遍應義不成若應兼勝劣則它報徒張其妨匪一又自昔謂報有上冥下契故兼自它者不然是亦祇約自報之智以論冥契故曰報身智慧上冥下契若也它報下契則局何由通應勝劣乎其非略爾但深窮它報根乎理智故未始敻殊也何謂為所住理即文有曰丈六身佛住真諦等是亦一往從教有四實唯三身住三諦理又以真中感應言之則所住唯二蓋以教從理亦從於應唯二應故也何謂為壽量文如妙疏等或直釋壽量而義通三身者或約三身以明身壽量三不同者或引三日喻以喻見佛壽有長短者或釋非滅唱滅通約三身以明義者或約修德三身與法性冥一故各有非常非無常義者或別從報身釋品通攝三身者或直言壽量意欲圓論三佛者今謂文雖異釋其明三身壽量一也但義有詳略喻有長短言偏義圓修性相對名義通別或通總等故文相不同以義帖釋略可知也云云然於名相不無進否大體無別亦會之可知而所當論者唯三日喻文霅川以謂別圓地住以前猶見劣應故以此文為的據也文曰於諸菩薩未登地住所見同前記云同前二乘豈非於見同劣應乎今謂經以三日喻三身則冬日一喻正喻應身約人雖局約喻實寬以勝劣兩應莫非冬日所喻故同前者同二乘所喻之冬日不同二乘所見之劣應是則地住以前乃見勝應耳若猶未悉更試以文中兩猶是勝應句進退與奪論之彼之初句即方便土二乘雖見勝應猶是冬日例知未登地住菩薩所見勝應明矣彼之後句即已破無明者奪而論之亦猶是勝應雖謂冬日可也但地住以上所見正喻春日故止以報應二名而論與奪不以冬日論與奪也此姑通文後當更論何謂身相即如光明文句凡兩出之前雖明身其相猶略蓋對壽量而説身故今獨明身故專以相好言之則三身各有相好文雖互見義必兩兼今但舉身則可以知壽量然相好之言本雖報應今於法身亦云者此則無身之身非相之相以諸法門莊嚴法身義云相好故曰無形第一體非莊嚴莊嚴即法身相好之謂也何謂説默此由記主斥近代譯者法報不分二三莫辨故委明三身説默以闢其非意言若以遮那為即舍那舍那有説則法身亦有説法身説者則衆生亦然是則進退皆非故曰若存三身等云云言存三身則相對之義亦從事義惟相對則有相即從事則有從理若事理相對亦應有事理相即今從略説故對祇是即所以從開有六約合但四委明其相云云然則一家大體必具即對等義文雖出此義必該通凡諸名相皆得約之以示通説何謂宗途論即四明霅川所議三身無不皆異故論法身則相無相別報身則現不現殊應身則即不即異宜其齟齬不相入也且夫法身相無相別者一往定宗謂法身有相者四明也謂無相者霅川也然則法身未始異而兩宗之説殊蓋霅川以法身為理故唯如如冥寂之體則無形質差別之相設論其法但具其性亦言即理還即無相才言即事而有相者便屬三土應用之事故寂光法身定無相也如是而已四明則不然雖亦以理為法身而言非無相者蓋理性之相即非相之相故曰但無隨情有相之三非無性具微妙身等然論即具未始相離故説性具之相不離依正色心雖即諸法而非諸法所謂即一切法離一切相以非諸法故則無隨情有相之三以不離諸法顯非相之相故則曰非無性具微妙身等是則終日常即終日常離即離俱時性具旨顯方曰妙達即具者也以此格彼得失可知雖然是猶分宗之説若夫大體論之則又有克體義焉即事義焉相對義焉克體則有寂有照即事則有即有離對義則有對有各莫不一有相而一無相膠於一端未免偏見一以貫之始曰大方然所以偏言者是非四明之言蓋佛祖之言也良以真寂性中本不可示亦不可見苟不可示而見者則如來教何所施機緣理何所入故於非身非土而説身土宜乎今示非相之相雖然偏言則可偏計則不可如霅川者則偏計矣彼又焉知大體哉而乃專以事中差別為難或直以依正色心等為相是皆厚誣四明非所謂善宗旨也要當於一切法識得此理始可與言法身之相所謂報身現不現殊應身即不即異此二相由故合而論之然以應身即故報身有不待現者四明之説也應身不即故報身須現者霅川之義也蓋各為説不同彼約身相大小而為勝劣故尊特有全現分現生身有但可即法不即尊特之説云云四明則異是不以身相論之克就真中感應而辨故有三雙六隻之義示現現起之相其建義若此何者為主當邪今試得以評之夫報應者法身之大用也然以法身為體則寂然不動故無現不現無即不即唯一大圓鏡體而隨緣赴感未始有窮惟其稱此體故起而為用亦無現無不現無即無不即但對機設化故或勝或劣或大或小千變萬化不可紀極然則尚不當即況言不即乎尚不當不現況言必現乎但四明即體示用且以即而不現言之霅川捨體論用故言不即而必須現也夫捨體而論用其用未必然即體而示用是用與體兼得之也彼徒見身相之迹文義之末區區求合而已殊不知佛身之本機教之正有不在是者餘如後論云云由是評之兩家得失較然可知此所謂宗途論也至於壽量名有通別者然身壽固各有實量名何所召乎蓋不出通別之義通則莫非詮量身壽故身量有大小壽量有長短是已別則壽之量故故言壽量是則量名為通身壽為別苟為通別則二實而已二實而三名何也曰實雖唯二三義何妨蓋非量無以詮量身壽故身壽必由量而定是則身壽者實之名也量者義之名也所以二實不妨三義亦猶十如本末之一其實則前九如而已要必由此一如而後得前九如之實所以諸文皆言十如者亦其義也諸身開合例二十一十二十九二十九四十三四十四七十二八十四論曰佛固不可以身數開合論也而經教法相言有廣略故廣則十身略唯二身處中而言則三身或四身雖有廣略體無增減但開合之異故於是論開合焉略論為二謂各論開合迭論開合各論復四初二身開合者如釋論明生法二身而一家約之大小兩乘各有生法二身生相又以教言四教不出勝劣兩應於兩應上各有生法二身離之則四若相望合説還同二身也二三身開合者如觀經疏有色相身法門身實相身金光明則合彼理智為法性身開彼應身為生身為尊特雖互開合三身不虧是也三四身開合者如止觀明法報應化四身為本一一能起四身又四身各入一身兼本共成三十六身俱法界故能起能入故合則四身開則三十六身四十身開合者如華嚴十身舍那謂於衆生身作己身具餘九身乃至虗空身作頭亦然故合則十身開則百身若次第迭論乃開一為二開二為三開三為四開四為十反而言之亦可十歸於四四歸於三三歸於二二歸於一次第互攝也所以論者二義一論十身通別彼難四明云若不現大便為尊特則別圓之人見猿猴鹿馬無非它受用報邪而四明解之有順有違如曰若中道感應名尊特者名多在佛等則違問答也又曰雖不立名非無其義乃用華嚴十身為説則順問答也然此違順二答即妙樂所謂通別二義如曰彼通云身故云十身舍那別釋如來故不應云業報佛等以彼會此文旨宛同安得隱其違問之文而專以別義為難以此考之霅川虗妄一皆如此檢文可知也二論四身起入者即法報應化互起互入勝劣相即皆不思議得有三十六身之旨而輔行釋此有曰從勝起劣即是施權從劣起勝即是開權等又曰理無起入約化緣明豈可從緣而亡於理據此一文可以格霅川之非者三一彼以生身但可即法不即尊特而此則四身互論起即二彼以法華教主唯是生身而此則曰從劣起勝即是開權三彼以用約從緣故勝劣不等而此則曰豈可從緣而亡其理其於此等文旨合乎不合當自知之如向四明即體示用則合之矣六能四句釋量無量例十八二十三二十四四十六四十七四十八四十九五十一五十七五十九六十三六十四六十五六十六七十七論曰文釋壽量一也而或約三身六能釋或作四句釋蓋各隨所釋文旨不同義勢各別或者乃疑此以此釋而彼以彼釋必求其元致者且以亦得互釋為問者是皆舊傳迃闊之論縱無來自其可彼此一律乎凡此等不急之論雖略之可也況不無所以且三身六能之釋是固一家建義當然蓋先通示三身而後依體起用以明六能則修性體用兼而有之抑有會於題品之義故也若妙疏四句則評古而作繼以文會義便之釋亦豈少三身哉況復四句義當三身開合之異且曰法報合故能應物者此即六能義備文略而已一往雖異大體無別而或者乃謂修性體用之義且甄部別者如向會通何異之有異苟不存部別何在以今言之談常過未本迹通局自足揀別安在其釋義異邪斯皆鑿説不足道也然於六能則又先達判能上下指身勝劣有異云云今詳定其説當以四明為正何者蓋六能者大用也大用起於寂體是必該乎四土乃極其所謂體用則宜曰常身無量通應三土無常有量但應同居而用必對體其説圓顯矣不如是則既非寂體無以垂三土之用非大用無以顯常寂之體又何足為圓極體用乎大體既正則有量二義任當如四明之説復何疑焉苟如彼釋則是以寂光理智之體而獨垂同居淨機之用方實報體用何歸但此考之一何疏矣指身之説固各有據其如名義要必精簡然彼以其説則曰依句之次第而此亦以其説曰唯義之是從是皆未足議其取舍今以二言折中之曰非身之身其身勝所非之身其身劣雖皆非身所以則異但以此義勘彼二説是否判然當不言而定也如四明所指可謂依義不依語者矣其於四句指身之説雖或異同皆可見之義無足言者唯觀經所謂八萬四千相者若以為尊特合屬第二句但題稱無量約此義便故屬第三況疏文明判為真法身然亦不失法身句義是則初後二句劣應生身也次句報身也第三句法身也所以四句三身義足而言量無量者兼彼諸文則又有雙非或四句之異今總論之其於量無量又有多義之別謂約勝劣兩應以説或生法二身分之或四句名實對辨或四喻法譬況釋或俱無量而有生法之異或祇約有量二義相望而言雖此不同要不過量無量耳但無量之言或兼法報有量之義復通長短故使諸文説之異爾雖復兼通捨通從別正以生身為有量尊特為無量此其常論也餘之同異會攝可知如釋論生法全同二應即指尊特為法身故四句之中初後二句生身有量也亦有量之二義第二句尊特無量也以兼第三法身無量故成四句亦由名實對辨故也山斤海滴譬兼能所故況有量有無量也所以光明疏以此同彌陀之壽能況有量也妙樂以此證光明之一義所況無量也或生身無量此則彌陀生身有量此則釋迦若約法則二佛皆無量也有量之無量義通二向或謂無量順題言也或謂有量克實論也約義雖通望彼無量還歸有量若加雙非則進取法身及自報智義當非量非無量故量無量者二應也又以有量等四句言之則退取有量一句屬凡故以應身義當雙亦餘不異上是則法身該乎二義非量非無量者理性法身雙非報應不偏屬故亦無量者乃以法身體常強名無量亦是非量非無量而偏言無量耳義雖進否實不相違應亦二義準説可知料揀如別記要知諸文各當其義不事煩委也應相勝劣例二十七二十八三十七四十五十三五十四五十五六十八八十八十一八十二論曰壽量雖廣三身而已矣應相雖殊勝劣而已矣勝應亦名報身亦名尊特劣應亦名生身亦名丈六然言三身則法報常同示應相則勝劣或異故宗途於是論焉如霅川專以身相為説故以華嚴藏塵相好為尊特以三十二相及八萬相為生身則是約現不現以論勝劣也不得已而有分現全現之義彼之建立如是而已四明則不然指身言之藏塵八萬固唯勝應而丈六四八不專劣身於是有示現現起之相故曰不定約相多少分之克就真中感應而辨云云所以然者蓋如來有定應而無定形惟其無定形故則不可以身相大小定其勝劣亦不可以現不現判其優降惟其有定應故則必以機教論之乃見如來所以應相未始差忒故有所謂真中感應之辨要其説不出有三謂真中二理即如來所住能應之本也事業二識即機緣所依能感之資也雖有是二苟不於中修以二觀則生佛懸隔何由感應道交乎是則空中二觀又為交感之道也故三者一不可減減則機教之義缺亦不可增增則感應之道贅以是知四明三雙六隻義門之功也夫如來之應有常而機或在亡者蓋佛所住理未始暫虧性識與觀或俱不俱故有是識而無是觀不見也如凡夫雖是事識而不見生身二乘雖當業識而不見尊特是也有是教而非是識不見也如別十信圓名字人雖稟別圓而見思尚熾事識彌隆故亦未見也惟三者備而後能見者分當見也三者不備而或亦見者非分見者也如向二類則佛以力加乃加於可加令其得見亦非見而見不在此類則凡夫人或示劣身或以勝身強之令見至於所見有示現現起能見有位次進否者亦由來共議是不得不論也昔論二現者或以藏塵八萬為現起三十二相為示現或亦通現起云云今謂此義亦難定論若約如來自其境本言之通謂示現可也自其高大言之通謂現起可也夫豈有意於示現現起哉然則二現所以異者亦約乎機教定之而已如華嚴藏塵帶別教道因於緣修唯大機所見不通於小者謂之現起可也又如方等雖小機在座為彰彈斥故令皆見大者亦現起也又如通教合身於被接者雖睹尊特然猶與小機同見謂之示現可也至於法華唯圓機所覩且為彰開顯絶待義故即劣辨勝者亦示現也由是言之相雖有四不出二義則二約機論二從教辨此其大體而已若乃應持不見其頂目連不窮其聲則又彰如來不思議應故令二聖始見丈六身聲及量之彌高窮之益遠始知高大有不可及者使驟見之則不復窮矣以是知其亦示現耳然則止觀等文以之示別佛現起相者蓋齊其末而言也若揣其本則異矣彼或以此而為分現蓋不知輔行有身聲既爾諸相例然之文也如光明所讚三十二相四明以為示現者亦約其方等機教不一祇一佛身而所見高大者謂之示現宜也於非分見者即加之令見然則方等別機見示現而華嚴不然被接之機見示現而別當教者不然何也曰非然也若直約機論大則見勝小則見劣又安知所謂示現現起哉但約機教合論故華嚴機教純大謂之現起方等通於大小謂之示現抑被接者始睹劣應後以機發受接還於劣身而見尊特庶幾乎知示現矣故與當教者異然終不可以此論其優劣又如八萬相謂之現起者此本淨土應相雖自一途亦豈外於機教哉後當更論所謂能見有進退者彼約別圓真似而論此以真中始終而見雖有兩説要之大體當以後説為正何者若使別圓似位猶見劣應則別佛不應單現尊特圓佛不應隱前三相往往彼必謂之加被也然別猶可爾祇如五品已能圓修三觀則觀行見十信似證即相似見而必須加被何抑之甚乎推此而言別亦應見但有淺深耳不然四明以三根按位接入者難之當何所逃抑彼之説乃以破無明方是業識故也殊不知二識之論本以教所詮惑所熏者言之所以別圓無問真似皆屬業識以莫非無明所熏起故況今不獨以業識論見必於業識而修中觀始能見耳若地住破無明正是分破業識以中觀見豈止業識而已由是明之則勝劣二應歸於真中明矣故妙樂曰藏通二身是劣應耳別圓二身是勝應也四明則曰生身本被藏通之機尊特身應別圓之衆即其義焉然則妙疏以二應為應利鈍兩根各有生法者而淨名疏則曰勝應為菩薩説大所現劣應為聲聞説小所示且曰尋應有得法身不得之義則並似約大小而説若與向義異者今謂文各有旨而終歸一致妙疏之文正明生法二身約大小始説故且以三藏對別圓言之舉藏可以兼通若淨名文者一往彼約部旨言也其實通佛乃在兩楹之間既有尋應得法之言還歸真中而已又如淨名云亦可劣身而説勝法者此約障邊故義與上異然亦應有勝身説劣法者此復一途姑置之耳又輔行示通佛神變而以勝應言者蓋約增勝而説故藏以劣應言通以勝應言別以報言圓以法言是也如曰各見世尊在其前是固通教合身之相其如淨名所謂如須彌山等豈直通佛故知一往云爾至於光明約弟子一多以見四佛同異者亦機應相顯之義故以機顯應則見四佛身有同異以應顯機還知弟子有常身應化之別而曰衆有一多者亦約四教機有三乘純雜而已教主應相例十十五二十七三十三五十五十二七十八七十九八十五八十六論曰苟得向勝劣義則五時教主與夫淨土應相當不言而定今所論者姑略言其大致然則教主之義一也而所以論之者四謂或以身土大體或以部教權實或以機教感應或以方土彼此蓋各隨其時宜與所當論者如何非直定其身相而已知此始可與議兩宗是否焉何者如華嚴應相既現華藏塵相之身其相則顯不待言其為舍那而所當論者五時之始必先正其身土大體故四明以華嚴是千百億應身所説又曰須是分段生滅之身然則藏塵相好之佛而特指為分段生身者蓋以其相雖是尊崇特勝之形然以其土則同居分段有色有心以其身則示同人法有生有滅又以始終大體求之則始有初或之文知其為補處應佛也又有脫著之義知其祇是一佛而示有勝劣也終有入滅之事驗其至於雙林還歸無常也故知相起之本元自生身謂指其體一也若夫辨相是亦舍那為教主爾故曰此身既被別圓之機見是尊特豈非以相則舍那乎今因為之説曰約應指體此體即身但對相立故以體言非體用之體也元是生身從機辨相乃為舍那義方盡耳或謂四明之説專在生身者亦誤矣而霅川以謂勝應尊特此身本是界外法性之色非同居應相現起者惡有是理彼據其相未必得其體今指其體抑得其相焉然則四明以華嚴應相為生身者約身土大體論也又如法華教主以其身雖是三十二相然以部旨言之謂是開顯絶待妙身可也夫既開顯矣則能説教主即圓佛相也夫既絶待矣則還指昔身不別有也故曰法華已前三佛離明隔偏小故來至今經從劣辨勝即三而一等良以今明法華須混一代以論開顯身有以驗乎説説有以驗乎身至於能説之人獨不然乎故亦必窮其始末而為之説何者且以在昔勝劣言之則華嚴藏塵瓔珞勝應尊特也鹿苑丈六垢衣劣應生身也雖有四教當分之身亦無出此二途而已然今法華於彼二身為何身邪曰俱非並是何也是必約開判論之可也謂以論判則藏塵尚非丈六安得是乎論開則垢衣尚是瓔珞那得非乎但華嚴雖是瓔珞而猶隔彼垢衣鹿苑但是垢衣而不即彼瓔珞然則開垢衣而即瓔珞者其為法華教主乎故曰開垢衣內身實是瓔珞長者記釋云云又曰今開方便門示真實相即向身是圓常之身等又如向所示二文皆其旨也所以淨名疏示四度現尊特唯法華最勝者以餘經皆非開顯絶待之身故也又曰若説法華但現尊勝是也所以四明以今經教主為尊特者約部教權實論也而霅川於此專以相言謂是生身者豈不乖於部旨乎如易置其説亦得以部教權實論華嚴則彼猶帶別相須現起故不若法華之最勝也若以身土大體論法華則此亦生身如曰住生身而顯一等是也但今從強耳至於方等般若能説教主教既不一機亦異見則宜以機教感應論之故方等凡二途若以大斥小如淨名等則有入見尊特出仍見劣之事雖約小衍而論出入不以加被還是真中感應義若逗大逗小則如光明等一佛異見有勝有劣或如藥師等唯尊特身諸方等經是例非一在般若則正現尊特以帶通機故或現劣如曰般若亦現門內尊特之身乃至云以衆生疑故現常身放常光等是亦約機異見之相非謂如來實爾現大現小也鹿苑唯小故佛亦劣身若約密論何容非大姑置之耳其如淨土應相則又二説不同如般舟等唯説三十二相觀經則説八萬四千相及丈六八赤雖有此異不出二身理而言之本唯一佛對機有異大小不同故使經教從緣異説如彼般舟三十二相丈六之身通大小機無不咸見故小則見劣大則見勝亦如此土三十二相而衆機異見是也若八萬相唯大機所睹以為圓人所緣勝境亦如此土藏塵等相是也故從丈六劣應言之則是有量之無量從八萬勝應言之則無量之無量二義雖異同名彌陀無量雖同名體別不可惑其名似遂乃混而不分是則彼此二土生身尊特其相攸同但此則身土斯劣故以丈六生身為本彼則依正殊勝故以八萬相好為正然則四明以彼土教主為勝應尊特者是約方土彼此論之也非謂彼土不兼生身若以常身常相言之是亦三十二相為教主焉隨緣異説逐物所宜則無在不在若如霅川併以八萬相為生身則彼土但有生身殊無尊特別圓大機何以應之若必以藏塵相好為尊特者一家教門淨土諸經曾不言之況彼於此三十二相尚有分現之義何不於彼八萬相上亦分現邪但此考之進退咸失雖彼有十義伸之之難與夫前諸應相文義之妨斯皆末節大體既正餘不足言亦當伸之於後也然則文以法華為報佛所説又曰凡四度現尊特唯法華最勝者是固定身相合部旨之言也而又以法華為垢衣者約所開説也疏示誡妙音之意對彼土不達者言也況文曰不可見卑小而忘其尊嚴正是即劣辨勝之旨故皆無所違其於方等言尊特者或示現或現起示現如上光明之文固無可疑者現起則如藥師巍巍堂堂之相淨名須彌映海之身皆其相也既唯大覩於藏通小機亦加被令見而已以其在應同一見故不同示現自見劣故又如觀疏引智論之文十疑論緣彌陀之相觀佛三昧經説八萬四千相皆言淨土教主正符四明之説如彼曲釋烏得合哉身土感應例十六四十五七十四七十五七十六八十七論曰三身依於四土四土本於三身身既即一而三土亦全四而一夫是則孰同孰異何通何局未始有定論也但教門分別有即有離其於離義對義如常云云或文有進否或義有通變不可一揆論也如曰常身無量通應三土等此則體用之義故理智屬體當乎寂光勝劣二用屬下三土但勝應二名亦名尊特亦名報身言報身者即他受用然與尊特同出異名故下三土通皆應之但劣應生身不通上二土此常論也又如文曰若從妙覺應為實報圓滿相好非餘界所堪者又於方便示勝應身圓滿相海如前實報者而記料揀云云此所謂文有進否也然言非餘界餘土所堪者約真奪似言之也而亦應之者取其勝應似彼報身也亦謂應其機宜實不應其土界也故曰云如前者稍似實報非謂全同又文有於方便土示勝劣二應者又曰方便有餘土起勝劣兩應者此所謂義有通變也所以初文則相望而言故方便土似道之機而有體析巧拙之異故所見應相有勝有劣雖云劣應實匪生身故曰更不示為種種諸身也其次文者則又兼彼同居言之如曰勝兼兩處劣唯鹿園是也又曰方便土通佛涅槃者既不同界內灰身之滅是亦法性勝應而已但方便有用通之説故約機息應轉義云入滅在文可見然而霅川有云華嚴勝應本是界外法性之色既不由生身現起有似彼土應來者而四明亦曰是實報身應同居土若為異邪曰不同也所以四明云者一往以土定身其實還自生身現起故有千百億應身所説之言義則無失也彼既不然則彼此乖隔故不可同日語也餘論下論曰後五百歲鬪諍堅固其於一家壽量見之始則孤山四明二大宗師角立於前加之霅川法師鼎分於後逮至于今異論不息由是壽量之道蓁莽蕪穢日以充塞而四明之説卓立乎其間久而愈明但雪謗之後會四明歸寂無得而伸後學不能無遺恨也故今因之以餘論焉或問彼雪謗中第一先論法華教主即劣辨勝之義以謂內體可即外用不可即以外不即故敝服宛然非謂開權便須脫敝若然則法華滅絶老比丘相世間相當如何解邪又若謂法華但現尊特全不現劣者如妙樂明示法華佛及弟子身俱是劣豈亦減謗邪以至備引諸文並難四明尊特不須現者云云此等文義若為伸之曰但得向來諸例明義此自可知不待伸也為未悉者略言之今謂彼作是難有不曉者三一不曉體用二不曉應相三不曉身土且夫圓論體用一而已矣體用既一用可異乎若但體即而用自不即者如妙用何抑今家有言良由理具方有事用亦一而已若一融一不融則不得為全理為事由事顯理也不知霅川何見輒以凡情度量聖境苟如彼説是全未曉即體之用也二不曉應相原夫如來應相本一妙體未始差別雖無差別而不得不別者由機緣感見之異也所以宜大則大宜小則小宜見勝則與之為勝宜見劣則與之為劣現不現等亦悉隨緣而未始定一非謂應小而見自大見勝而應自劣也然則法華應相雖曰即劣辨勝既見勝矣豈應尚劣乎既即尊特矣豈定不現乎而彼專以劣應不現為難是皆以局量而失大體豈如來應相之謂邪然言即劣辨勝此以今對昔言也垢衣瓔珞云者約施開大小以言也亦非猶存劣身謂之即劣定有脫著謂之弊衣理而言之尚不當著何脫之有彼又以世間相常為難是不唯不曉應相亦失相常之旨然既於世相達常住矣豈猶存生滅之見以彼例此一何昧哉三不曉身土彼據佛及弟子身俱是劣以為難者蓋不知是約土之言且對它方淨土云爾至於分二種相海之別例金錍二遍之義示二種尊特之異是皆不得已以彼直文順己曲見祇如二遍之説在事固有廣狹言遍豈得異乎以此考之其義壞矣或問彼論彌陀八萬相非它受用身文有總難別難總中先以劣身説勝法難之又據彌陀雖是生身大機所解其壽無量者又立圓教機應各有生身今以彌陀為生身是所託之境非所顯身者又問圓人觀丈六像還是觀生身否意顯生身四教俱有但隨大小機見不同其別難中凡約十義以伸八萬相好定是生身今為四明説者於其疑難何以通之曰理本自直何勞曲辨彼既妄難此亦謾伸之如總難以淨名劣身説勝法者正約障邊而論何中道感應之有又若彌陀元是生身小機固當見劣大機既見無量何得尚是生身正所謂壽量屬於尊特身相自屬生身進退皆非感應何在其又以生身是所託之境別有所顯身者豈所顯異於所託邪抑所顯託通局頓異乎況云假觀之中或有且見八萬相好此又以所託為所顯何邪未曾聞離此之外別顯藏塵若法若報者果如彼説則十六觀境外例別有所顯邪且謂生身通於四教機見不同者意如前詰云云其十義中一約相好伸者意以八萬相唯在彌陀故也今反質之若必以藏塵相為尊特亦應佛佛皆有何獨釋迦未必它佛皆藏塵故況以乎等意趣言之釋迦亦有清淨國土如彌陀安知不現八萬邪二約光明伸者然以光明比校它佛曰無量光者是亦悉檀隨宜攝受而已非謂餘佛有所不如也祇如舍那翻為光明遍照豈亦以彌陀較優劣乎若謂常光一尋不得名無量者彼土丈六之身當名何等又如光明云圓光一尋能照無量雖謂無量可也三約壽量伸者然壽斯長身斯大信固有之若直以此驗其大小是以世間報法論之而已豈佛土之化事乎殊不知彼土生身既唯化生非實段質大小長短初無定量況佛法界身變現自在又安得以壽命局其大小邪四約位次伸者由向明之尊特不唯地上能見故今上輩往生以圓信位見尊特身宜也所據大論乃向以真奪似之義非謂地前有所不見彼唯識文雖自一途以身對土未失大體皆不足證也五約華座伸者若以華座為願力所成故唯同居淨土之相者一何局哉彼意以此座若處丈六則太高以處尊特則不足故也是何見之陋歟殊不知丈六若升豈不身稱於座尊特若處何妨座容於身豈必大小廣狹之為礙邪六約菩薩伸者然今既以彌陀八萬相為尊特則二菩薩高大之身何須更問意以議書所謂中三品人見丈六身下三品人見二菩薩故以前後勝劣為難者今謂若許中輩見丈六者則下三品見菩薩常相亦復何疑若使九品皆見八萬則何以辨三輩之別彼謂見丈六者文無所憑而言皆見三勝相者復何所據若以八萬相例為生身則彼三輩全無見勝豈今頓觀所顯乎舍此別求勝復何有七約諸淨土身伸者據文既由大衆咸欲見諸世界清淨莊嚴故佛示現諸佛身相大於須彌何謂却以生身示之彼非生身則此為尊特明矣八約觀經疏伸者其文雖本釋題實非題下所指蓋是有量中二義即小彌陀經所明是也亦與妙疏四句中初句義同安得指為山毫海目無量之無量邪況據解謗池上丈六之身尚是無量之無量豈此八萬乃同有量乎九約十疑論伸者文既曰緣彌陀若法身若報身等金色光明正言即法報之勝應何嘗於法報外別指八萬相為生身謂之圓觀邪十約輔行伸者已如向示自見其非云云又義編十義則七約人天身伸之略無第九義今謂彼土人天所謂皆受自然虗無之身無極之體者即向謂化生非實段質是也何嘗定言高大乎然彼十義既皆虗張則此應相非生身必矣或問彼論圓教內外凡位不當以業識見尊特者凡約多義難之初以十身舍那通別為難又以起信隨所示現文明依報為難又據論中深信真如少分而見位在初住為難又以粗細等四句顯地住前猶依事識為難且引三日喻文證之又以加被用通被接難者兩家矢石孰當於理孰得於文邪曰當理者不競競文者不當如霅川之説所謂競文者也今以次論之彼以十身通別難者苟得向違順二答意此自釋然不足疑也其次隨所示現之文據論雖是正明依果然依必稱正二現豈得偏乎今於正報言現起於依果言示現亦影略互顯之義非謂示現專依報而已夫既曰隨所示現則無往不可始得云隨又何間於猿猴鹿馬邪彼謂唯在報土莊嚴何太局乎所謂深信真如之文疏釋固未足憑論文亦不易曉何者方以此為相似按下三種發心其信成就發心亦曰少分見於法身即初住八相之位以今家言之乃分真位也方以此為真證而又對後證發心位未名法身乃相似覺要之論以地向對分真似則似於別又以初住能現八相則似於圓而疏釋信成就發心文有所謂留惑益生之説又似於通故知途各自建立不應以彼律此定其淺深置之可也彼唯在初住能見乃向以真奪似之義亦不妨似見也其又以四句粗細為難者今謂二識之説略如向明蓋約教門大分言之而又須知有斷位進否及障不障當情不當情等義故不可一槩論也何者自有能熏雖亡所熏猶在在乎事業之間雖存事識而不為障以當業識故加被能見者二乘是也自有見已先盡而思有盡不盡雖有餘分亦不為障大分言之屬於業識者別似位是也又有見思全在以圓觀故事識被伏能以業識見尊特者圓五品是也若別十信圓名字人既非業識當情而又事障全在故須加被能見已見上論然則四句之難本不為妨彼自不明何關大旨祇如論句縱約粗細以分二識要知位次本自相當但境界有所知所離及所證之別所以粗中之粗凡夫境界二乘知而離之粗中之細似位菩薩所知境界亦當位菩薩離之細中之粗真位菩薩境界地住知而離之細中之細是佛所知境界究竟佛果離之但初句既末故以所著顯其能離後句既極故以所知彰其能證然則粗中之細既似位菩薩能離豈非業識邪彼雖唯取此句為難曾不知與第三句同是菩薩境界既不分異豈地住菩薩亦識邪故知彼槩難之非也然論疏不作此釋今何臆説曰理之所在義苟合焉何恤乎論疏同異也霅川此難既非三日喻文義當自失亦如向辨也其又以加被通被接難者然一等佛力何不加被當教之機亦令其見邪若謂加於可加祇如方等二乘尚可加之何得菩薩反為所棄霅川到此結舌可也或問彼論般舟三十二相乃隨機化現之身非淨土生身但真佛勝相初心難見故須先觀以為方便又以鼓音王經説有父母邪魔等事例同大論彌陀不淨國土者又以妙宗不須身大相多而此須身相逈拔非常為自語相違者又以華嚴及觀經對難有不當以舍那為劣應彌陀生身為尊特為彼此增減者更有不一之難擇其尤者請試疏決之曰言有似而却背理有當而反乖是皆偶中不明之過也如曰真佛難見高位可觀儻唯勝相曷被初心又曰但別教謂之修成圓教謂之性具以其言則近似而却反背以為難乃曰八萬相非尊特丈六像非生身既知別圓所見之別何得却以身相勝劣難之故考其實則非也又如曰安用細事而妨大途又曰無以片文而害大義以其理則頗當乃反蹈之而不知觀其所説率以文隻義與夫名相細事方害大途者多矣豈非究其説乃反乖乎然以鼓音王經為説不淨國土者考觀彼經雖土相斯劣要亦淨土爾何謂之不淨邪今準天竺之説則以謂因土焉至成佛時一切隨轉故無邪魔等事也然則解謗等文以彼依報之相驗其生身未必其然且以頓觀顯其非常斯有是理但霅川專以身土事相為言故四明亦因以格之未必意專在是也又四明所謂純雜不同勝劣可見者蓋言兩經機見之勝劣非謂其身相也安得固以身相難之而曰增觀經減華嚴邪或問彼又論生身即不即及法身相無相義者雖向已明然猶有文義未盡之論更試略釋之如曰若得金錍二遍之意終不將少為多以劣為勝今得以反之云若得二遍意終不將少為劣以多為勝蓋境雖廣狹遍無有異故也所波濕之喻理亦應然若於二波達濕性者終不見有大小之異縱約事論亦分喻耳又評解謗即一論三之義有可否者今謂以向四身互論起入言之亦何往不可又言若但云如來妙力示無分齊無乃太妙者然不言妙則已妙則無現不現無可不可千變萬化未始有極何有於過量乎又以大論三十二相是聲聞法中少相者此乃般若部中以衍斥小之意非所謂定論也又曰如來身密應現勝劣須分者今謂既言密矣則必一多大小自在無礙應現不窮苟勝劣定分大小確爾何密之有邪其又以四明與奪之斥因謂法身定無相等蓋本荊溪説默義以為之説殊不知記主政恐學者不盡圓意故特約此多義示之雖有諸義一以貫之方稱圓旨如彼之説膠於一端其與祖意合邪不合邪至於論性德三身具性不具相之説備引諸文無相之言且與應身對揀同異及據文云若唯法身應無垂世者今謂苟得一家即具之旨克論所以法身之相與夫四明所示有相無相之義則此等文義蓋不足言當自知之若彼三身壽量解等所有破立如妙宗料簡及解謗等文已伸之矣此不重示嗚呼凡是諍論其來已久敝已甚矣今求諍論者復不可得吾道其益衰乎四土論第十總篇上論曰統法界一圓覺性也湛乎其若海曠乎其若空罔痕能所之端倪詎形依正之眹迹方是時也孰為身乎孰為土乎洎一念迷妄世界爰立衆生起乎知覺國土由於想澄此依正所以相從而有故以十界之為身則有若干之依土依隨正轉雖一處而勝劣懸殊相以性融極十方而含容無礙是以華藏包遍塵剎該羅雖依正無窮而亦莫越乎自心體量此其大旨而已但諸經論及古今宗師明土義非一或一或二以至十數或二十七品至於無量雖多少開合各有其理要皆未見處中而要攝者唯吾一家以四攝諸舉無遺者可謂兩得之矣曰同居曰方便曰實報曰寂光其揀判士相則有事理體用法性分段界內外等義粲然殊流布在諸文是固不待論而知辨而明也其所尤難而當論者三焉曰寂光相曰淨穢曰橫竪蓋寂光相則宗旨之難淨穢則教門之難橫竪則文相之難至於通示四土則有身土名相即離等義論生方便則涉五種意生之名兼出餘義則復機教土相有殊是皆不可不論者故因而明之大槩苦明則文義可識也別例中右四土類文總四十有一通示四土名相即離等義者十一別示寂光體相者十言土教相對橫竪者六言四土各有淨穢者四明方便土涉意生身者五兼出土教餘義者六凡六例通示四土名相即離相攝例二三七十十三十四十五十八十五二十三十九論曰身無土不生土無身不立是則土者身之依身者土之趣蓋相因而有亦相從而成立也故今明四土以其能化必以三身而為應以其所化必以十界而為機舉土則可以攝其機應也然則四土誰知所為乎或云是衆生業感或云是諸佛化現或以衆生對佛共成國土或謂俱離無因而有今家評之以謂若定報其説則墮自生等性計是故須破究竟而言皆不可説破性執已悉檀赴緣不妨作上種種説也一家明義土必至四何也曰以其事理體用則以寂光對下三土以其分段法性界內外等則以同居對上三土以其小大純雜方便實道則須分於實報有餘以此等義合而明之此四土所以不可盈縮而無有餘不足之過也況以一家四教所配義門宛然符合略無增損如後橫竪所對也云云今更覽諸文旨總以四義論之一曰分別二曰即離三曰相攝四曰融會何謂分別如淨名疏約一異等三種四句揀四土之別而記又約淨質穢見以揀同居二土是雖各通四句其實異質一質者同居有餘之辨也有礙無礙者方便實報之辨也有質礙見無質礙見者寂光三土之辨也以此分別四土之相顯然可識何謂即離如妙玄文以分別而言則四土迭異以即事而真則體不相遠所以即事而真者即義也分別而言者離義也亦可離約竪論即約橫辨故成四土之橫竪也何謂相攝準淨名文一攝一切則上能攝下唯下不攝上若約義通理何隔異亦可上下彼此相攝何謂融會如不二門云界界轉見不出一念土土互生不出寂光又曰須知橫竪祇在一處處處者有事有理事一處者一念是也理一處者寂光是也雖有事理一處無別故知四明之文即荊溪之旨荊溪之旨即四明之文又曰若兼體同一切皆四當知四四祇是一四一四不出一處由是明之四土同異常同常異或非同異祇在一處豈不妙乎別論寂光體相例四六十二十六草三草四草五草六三十三三十四論曰寂光理土極智所照之境詎容言議於其間而自昔宗師競以有相無相更相矢石者因得以論之為三其一曰即寂理以示體相其二曰附宗途以論有無其三曰據文義以申疑難且初義者夫真常寂光本虗寂之理唯如來所證得故非身説身名曰清淨法身非土説土號曰常寂光土即名以求體則一法界三德之理性也以是為體遍一切處以是為相即空假中蓋融妙玄絶不可思議之體相也然則有所謂依正色心金寶華池者非歟曰固不離此而此亦非也要必於一切法即理顯妙是為毗盧身土爾故妙疏以之配乎四德至於妙宗所引誠證亦即事顯理或約理而説未聞直以事中依正為相也然而文曰三惑清淨依正色心究竟明顯者何邪曰斯言盡之矣夫既曰究竟清淨明顯豈非於依正色心處以三惑盡故清淨三智融故明顯三諦證故究竟可以之配三諦三觀也但於是六字求之寂光之相得矣所謂附宗途以論有無者寂光之説四明已前未聞異論也至妙宗設兩端以論之云云亦可謂至論矣然論至於此而亦變於此果有為山外説者攻之霅川始則扶之卒則背叛之建立如別云云由是宗途有無之説始判今先指體相以定之使彼不能異其説夫苟如向説豈特四明以是立清淨相雖霅川言無相亦不過謂此理但彼固迷圓旨離事説理故謂理無相而四明善談即義即事明理故理亦是相雖所見不同而寂光是三諦之理終不可異也而次立宗旨以闢之使彼不能逃其非夫三諦宗旨有亡照蕩立之義今舉一文格之可見如輔行曰三諦無形俱不可見此約理性俱亡則三諦皆無相又曰然即假法可寄事辨等乃約名相以辨則三諦皆有相是理通乎亡照也然則今論寂光四土之一必諸法建立是義局乎建立一邊雖謂寂光三諦有相可也然據霅川膠於一端故以寂光對空中有亦具俗諦者性而已矣故偏謂無相殊不知但可名言表示雖空中亦得是相何必森然差別者乃為相乎故其夫在不達寂光元意三諦宗旨所以為非也以四明計之則不然故亡則三諦俱亡雖無寂光可也照則三諦俱照謂寂光有相可也故曰言無相者乃是已盡染礙之相等又曰但無隨情有相之三等其得在情理亡照之旨身土建立之意所以為至論也又如淨名疏明國有事理云至理虗寂本無境智之殊等而荊溪有云理本絶待豈分二別説有事理已屬於事等是亦今亡照之意例論可知也云云所謂據文義以申疑難者觀彼所以難四明者專執事中依正之相為説而不知今所謂有相乃即事顯理三諦清淨之相也以此格之則彼所援文義當如拉杇矣雖然為未達者更申析之夫寂光一爾不容異趣也然則相所以有者義也文所以無者亦義也言雖似反理實相符焉其反之何也蓋義門偏屬所對進否故於是有事理修性淨穢等義所以言之或異其為三諦理相固自若也試以一二文旨言之如輔行曰常寂光土清淨法身無能莊嚴無所莊嚴往往或者據此等文便謂無相殊不知是以性泯修之義亦是修極復性不分能所故也然以非嚴而嚴何妨修性三法有離有合以論莊嚴豈以一無之言遂謂諸皆無相邪又如妙樂有端醜斯亡等言是亦以四土對説故寂光屬理所以端醜斯亡三土在事所以淨穢咸有故曰寂光所對咸有淨穢是則所亡者乃三土形相又凡言亡者即相而泯之之謂也非謂離三土外別有一處雙亡之理而為寂光故知雖有斯亡之文無妨有相之説又此特文相一端耳通途論之亦不一向有以寂光但言淨者有兼言淨穢者有雙亡淨穢者蓋各隨所對義門進否然則但言淨者九一義也兼言淨穢者分極義也雙亡淨穢者事理義也而四明於是則有所謂舍穢取淨淨穢平等則已當三義之二云云但據究竟以論故略分極義耳若四明者可謂統諸文而得大體者也與其守一偏以自蔽者霄壤有間矣土教相對橫竪例五八九十七二十二四十一論曰橫竪之義不一處出而惑者執為定論過矣然於四土橫竪之難者無它按止觀淨名俱有以土對諦橫竪之義故妙樂會之云云然而淨名文相不一故輔行指之文出九下云云但止觀文顯而直故人所不疑淨名之文隱而彰故由來共惑惑故有辨辨故云云之説泥而不通所以泥而不通者以其名言雖彰而隱故也苟不折諸同異之論析以義例之別其為惑也終莫能解況求文相之通乎今姑折而析諸曰然據向文所指謂是諸土説法文也必矣不可更它指也既而妙樂會之則不得不謂與止觀同然而淨名記文有曰俱得橫論又曰然約橫論據其例別則不得不謂與止觀異要之文則一耳所以同異敻殊者蓋淨名文兼二例止觀則唯一義而已所以二例者有約土論土之橫竪有約土對教之橫竪兩者其言雖同所以為例則敵反也然則以土對教者即文有曰若有餘中説通説別以對一實等豈非用教多少竪也然以一土對一教如説一實即寂光等豈非土體敵對橫也此固如止觀所明而妙樂以之會同也如此若約土論土者即如次文然約橫論已下文是玄文所謂約即離以示土相妙宗所示有橫有竪若此之例則宜與止觀異但淨名初例義顯而名隱次例名義俱顯妙樂會其隱者不會其顯者故使從來以顯而蔽其隱也若此申之不唯文旨彼此無違抑亦義例同異甄白雖然安知淨名然約橫論之文非約土對教邪曰以其次文知之繼而曰若兼體同一切皆四豈謂約土對教乎故知其例別也然則莫非約土橫竪也何以其例頓爾相反曰是乃祖師隨義而作固不可槩難以意求之非無所以祇由約土既無可對乃成土中自論而已對教者有諦可望故使橫竪義勢永別而自昔義學唯名相之求但見橫論之言便與止觀併為一説及其不同則又確守不知通變宜其齟齬而不相入也恐義難曉更以圖示之如後四土各有淨穢例三十五三十六三十七三十八論曰四土淨穢本無難者所難在於二三其説決擇去取耳何者蓋其文本出十六觀疏以心觀為宗乃有四土各論淨穢之義於是刊正妙宗各為之説霅川義編從而去取之由是學者惑於多歧率以規矩之説而蔽宗致之旨此其所以莫能定一也今直取諸文旨以斷之雖不曲辨是非而是非明矣然則此經教相唯屬圓頓且曰修心妙觀感四淨土為經宗致故此淨穢雖有四土之別教門言之宜槩以偏圓之論是則凡言穢土即偏教因果所生凡云淨土即圓頓凡聖所感惟其以圓觀感之故一教始終皆屬淨土隨其行位四土不同方彰一經宗致唯圓唯淨也是豈得復以小衍分極等義為説乎宜其四明所定諸義皆先存通而後趣別或先言實證而後約教道論之至於復宗莫不旨歸圓頓意成行人初心妙觀良有以也夫四明豈不知務直説而好迂闊哉特以宗致之旨有在故也況先存諸通義則規矩之説抑不失之雖欲無取得乎苟如二師所釋則小衍之義通偏分極之説乖圓既迷的旨縱有一二合於規矩亦無足言者雖欲無去之得乎故曰雖不曲辨是非而是非自明者斯言有當矣明方便土涉意生身例十八二十七二十八二十九三十論曰楞伽明三種意生身凡兩出其文初總示意生次別列三種文見輔行云云今按宋譯四卷行者亦有總別兩文文相大同而小異但初文以三種意生俱時而説若與對位文異又前二種則次第對地種類一種無別對位者云云經旨蘊奧信矣難明姑據一家教門隨文用義判位進否得以論之為三初經旨對位二用義進否三法喻所歸且初經旨者詳究彼文始以三種俱時此似約橫論至下文又以三種之初對三四五地覺法自性對第八地則似約竪説種類俱生雖不對地既云了佛證法即是入中屬佛種類今以意求當是第九十地但經文略耳亦可舉隅而知也所以前文三種云得無生忍住第八地者舉中以攝初後義之如橫若約位則前不攝後後必攝前義之如竪理而言之三種意生祇是三觀斷惑為因方便感報為果但得前前未必後後得後後者必攝前前故有橫竪之説也經文隱略義稍難見管窺如此未必其然次論引用進否者然經文本一而一家用義進否不同或唯在偏或專衍門或約通教兼被接者云云蓋經旨多含教門通變故也今先示本經之意次述用與之旨如向所論雖通橫辨文意實以竪義為正以約三種歷對諸地故也豈非自三四地去正當破見思位從趣後説有生方便土義故得約之以對也然則輔行正從通教兼被接言者本經之意餘文進否者用與之異也今詳其旨又有通有別通意者即輔行所謂以通諸教釋義是也所以通者二義一者部旨具四教故二者論生通諸乘故云云別意者如玄文則以順教道讓圓實故且判屬偏如輔行云六根淨位玄文不云攝入三者以觀勝故且置不論又意生之名宜在教道是也淨名則以示佛國因約菩薩説而三藏菩薩既不斷惑則非所論故判屬衍爾惟其文旨進否之異故使名相亦出沒不同所以玄文以前二名開為三種而沒種類無作者意以類種屬圓故不言也餘文若存種類則合前為二次約衍門釋義故也是則約義從開似如有四從文牙略還祇三種天台巧用雖有存略克論經文亦祇三種耳然則既以種類一種與自性同位則不應約教異論判若以種類屬圓則又妨輔行之釋以文中種類俱生屬別接通猶是教道故也曰文各有意不可槩論然以經文所對豈得不作同位釋之及示玄文出沒之意安得不以種類屬圓輔行既釋止觀文相何妨三種約通別説又如淨名疏亦以約別十地判三意生即生報土是等但可隨文而知變不應局義而害文苟知此理文何以難哉三論法喻所歸者舊據經云憶先所見又曰憶本願故生諸聖中以謂先曾生而作難者殊不知初文從喻正喻意去之疾次文合法乃以本願以合先見爾所以本願即期心欲生之意也若夫釋名辨相對位開合具在諸文此略論其大例耳兼出土教餘義例一十一二十一三十一三十二四十論曰世界以海言謂其廣而無際也國土以微塵言謂其多而非數也或以帝網言謂其參而不雜也只以華藏言謂其重重而無盡也至以虗空言謂其遍性無礙也況乎聖人之示現經教之詮量淨穢差品優降天殊浩乎其不可窮也於是有以土相而論勝劣者有以説教而辨高下者有於方便而論利鈍者有於實報而論華果者有以寂光對下三土而論遍等同異者推是以言其不可一槩論一途取也亦明矣如籤論淨土有無三界引無量壽經以證但無須彌非無三界也自有淨土亦有男女須彌者如無動世界準例以明亦有淨土無三界者故知同居淨穢上相優劣於是見矣又淨名疏記論淨土開漸有無云如香積佛國本不開漸亦無願可説故聞漸驚問自有因願説三乘如華光佛國自有無願而説者是安養人開羅漢樹説苦空既不云願驗土非高以是知無願不説者為上品也又如輔行等文論生方便土有雖破塵沙伏無明者猶屬空邊非妙果報有分破無明者生彼則利餘者皆鈍言分破者如記云云更有雖破無明生身得忍猶是華報未為果報如曇無竭所居云云至於三賢十聖皆住果報乃借別名圓之義又如淨名疏記論寂光理遍與下三土遍同理別所以遍同者三外虗通之有與太虗無殊所以理別者寂光之遍內外靈知遍而非遍然則寂光不異太虗以遍同故不同太虗以理別故至於曰法體恆遍常在性無但可推之不可思之等此尤妙極理致不可不知故今略例此等同異以開義端苟得其旨凡諸文義皆可觸類長之也餘論下論曰一家論三千必涉四土故今明四土宜會三千但三千有事理之殊而四土亦體用之別言其依正彼此該收然則若為攝會邪曰此亦多途不可槩論應先知異然可會同所以異者四土則十界竪論舉依攝正三千乃一念圓具依正互融又復四土偏圓對論有橫有竪三千唯約圓示無增無減故知法相異義非一此不必會也然而三千無可剩法四土豈有餘義故亦得以會通如義編凡數處出之義不一端可謂心疑辭枝也今直以大體論之且寂光既是三諦三千豈不即乎又寂光無非四德三千豈不具乎是則三千義當寂光矣又三千有事理之義舉理必攝於事而四土則曰界界轉見土土互生豈非事造乎既不出一念寂光豈非理造乎是則理有攝事之功而寂光亦有容土之理其若克就下三土説既約十界竪論則三千義疏所以先出異義良在此也以此較彼優劣如何或問方便用通信如輔行所揀其義已明但自來因此猶有可疑者二一疑皆習通門為顯為密顯則方於化意以二乘人在方等會止是密得通益那容顯習通門二疑在方便土説通教者為以何身勝應則真中感應義壞劣應則土無二身曰其初疑者前人已釋習有染習修習之異以二乘於方等中聞大覩勝內愧外耻有慕大之心是即染習通門之相而小執猶在還不妨密耳此粗可用不別為釋其次疑者若據彼土唯有勝應更不須餘身餘法化也如觀音疏記及妙樂勝兼兩處劣唯鹿園之説明矣云云縱為未習通門之機為知故學而説通法其既已斷通惑則已不同此土通機亦何妨以尊特身説其真中感應自是同居機教之相何關方便邪然則有餘感應莫是小衍論否曰彼既無小乘三藏可對亦何必然或問若云方便用通何以觀音義疏等文嗔説次不次法邪曰此有常説不常説故也云云或問實報用別雖記有約教道説證道必無之言猶自難見曰自來有言方便用通未為難實報用別姑是難今亦例云方便用通猶有説實報用別定無説而言約教道者但是約此土別教教道有破無明生實報之義故擬之云爾其實實報既唯圓聖所居豈復用別邪或問寂光既論三品實報亦得論否曰若以實報對寂光則寂光唯究極實報乃分證今於寂光而論三品則約事準理亦得論之如四明曰以復本時名無上報事以復本時名常寂光即其義也或問疏約即義以示寂光不離三土記釋之文凡數徵難用意頗深向雖略論更試詳釋之記云答中意者正帖釋疏文可知若爾三尚遍有者此徵因上答生意言三土質礙寂光尚遍況三外虗通何得非寂光邪文似徵而不答然意已顯不復別答故更領上再徵後答文曰若爾虗通之有等及答中不即便釋乃以反質顯非同異然乃結釋云內外靈知意言雖非同異俱遍內外當處靈知靈知即寂故遍而非遍亦應更推為亦遍亦不遍非遍非不遍故曰四句推檢如是明之則可以融通言教可以究顯真實也論至於此理雖顯然其於上問猶未決答故復宗上問以遍同理別示之夫言遍同則不離太虗夫言理別則不即太虗不即不離常寂之理於是可知因復問以為常遍邪為有在無在邪而答中曰常在性無者亦猶所謂雖一一遍亦無所在是也雖然猶恐學者滯言壅理故復更以八句遮遣示之亦猶義例不思議境智後説照八句之意云云古人所謂但可作此示不可作此會亦其意也或問楞嚴空生大覺中如海一漚發有漏微塵國皆依空所生此於今四土屬何土耶曰經意正明從真起妄祇應以大覺一性對同居剎土言之特云有漏良有以也若方便實報及反妄歸真者所趣故經無及焉或問西方淨土與唯心淨土同異云何謂同則求不求生無生別謂異則理復不可曰此二一致方曰圓談何者蓋西方淨土者事也唯心淨土者理也苟以一家圓旨言之則全理立事舉法界以示西方由事達理即西方而統法界此所以唯心淨土不礙求生同居西方不異法性也而或者才説西方便須求生一聞唯心便謂即是是皆偏僻之見非所以達道者也今謂苟得其道無可不可苟失其道無一而可難以言辨要須自得云云
