body:
  text: 句推撿而後入故次之以二空二空亦觀法也直藥病之加者耳故曰佛世當機何勞設此雖宜於滅後而亦通佛世故有通教四性無生之幻夫四性無生者即空也以即空故含中含中為被接之本故次之以被接然被接者教道之所有也故曰今前六重仍存教道於法華前逗彼權機權機宜乎教道也教道必至於證道故次之以教證教證者自權而趣實也至實則教道可捨唯一圓實真因之始也而因必有果故次之以壽量壽量蓋果人之事而必依於身身必有土故次之以四土以三身必依四土故也四土之極本乎寂光寂光理性復宗經體是則十類雖異循環宛轉逆順生起相為始終一道而已矣一道者何道也蓋究竟出生死一清淨之道也道果何在乎即心是已則又見諸法不離我心也知諸法不離我心而習斯文者殆庶幾焉不然費日力於此吾未見其有得也旨哉敘論其可不先知而審思乎經體論第一論各為三總篇上論曰夫一言盡諸法之本一理極衆妙之源者其唯經體乎故經體之說良未易言然則言之者必其絶心路泯思議以無言之言者為能耳蓋其為體性一切法非造作所得詮之在經匪名言可到不得已強而目之其唯中道一實相印以此一印印定諸教非魔外之所得同尚不得而同況得而異且壞乎故經之有體猶人有心而民有主文書有符印治化有禮法為百川之東海實衆星之北辰宗之極之一而已矣故曰體者一部之旨歸衆義之都會又曰法界實相乃至法身竝法性異名通為諸經作體所以經得是體故名有實而言有旨教得是體故解有詣而行有歸凡聖以之同遵諸法以之歸趣究竟還源亦一而已矣然言理猶通體唯一性性不徒性性必有德抑顯有宗證有用詮則為名判則為教故一言於體必關諸五章三法以明之極此理者雖在於佛而不專於佛則又約十界諸法以言之於是有修性焉有離合焉有開廢取體之義有諸經異指之文而莫能一之故說者所以異也異故宗極之道不著此論所由述也然則論之如何必曰取天台荊溪四明一家正傳之說合乎文理當然者以格彼異端俾卒歸於至當是亦今十類大體也別例中右經體類文總三十有五注釋文下者合為一下去例爾言法華開廢取體兼出餘義者十二言今昔離合辨體者十傍出涅槃五章者五言諸經取體者八凡四例法華開廢取體例一二三六七九十十一十二十三十四十五論曰實相之體遍於諸法離一切相無在不在未始開廢之異尚何取捨之有然則開廢之說本乎法華經旨有權實之義此取捨所以異也今論之為三其一曰借義釋訓然經體之言一而文或以禮釋體或以體訓禮先達釋之以謂今昔部旨融別不同二釋甄分無宜一混也四明則曰彼此互釋不必求異但於昔則取禮別尊卑意崇君父之義或者謂有同異釋訓雖同用義則異今謂互釋之說然也異釋之義不然也縱論同異亦不一向禮同體別如禮有君臣撙節之分豈非禮亦異乎體有所依實體之旨豈非體亦同乎所依體同則與同遵禮一禮別尊卑則與貴賤體等其旨本同孰云有異然而部旨言之不妨取兩同義以釋今約兩異義以申昔則釋義部旨兼得之矣同異之說為近其二曰開廢取體舊或據一切不出法性之文與今取佛所見為實相正體以謂開廢相違者且曰義不兩立文何為而竝取乎文苟雙存復何為而偏指乎曰各當其義本不相違所以竝取則部旨當然偏指則文相所自何者良以十界權實之法一也而有克從法體言者如謂權實雖異而十界理同故皆得為體雖不當開廢實亦能開之妙有以此體對佛極智言者則有通有局如四明所謂法性之體雖通一切如來所遊義局果證是也而其說猶通雖昔部亦得言之有正約眼智權實明者如以四眼二智如異等境即九界法屬於偏權非今經體者廢權義也若即彼如異當處無非佛之知見指權即實皆得為體者開權義也然不約開權無以見妙體遍通一切不約廢權無以顯此理妙極諸法故兼明之方彰法華體絶餘經是不唯部旨義明抑知文旨不異如向二文雖非開廢正意一往言之亦不相違所以一切不出法性豈非體遍一切乎今取佛所見豈非妙極諸法乎夫惟妙極諸法則局極之謂也體遍一切則通盛之謂也通盛則反局局極而皆通雖彰二義共顯一意耳但自昔離而為二所以開廢俱非其三曰被接可否然今經之體固非被接中道但須混一代以申部旨故亦得約之以論揀取而有進否焉如文取圓接中道得為今體而但中非者此偏圓義以理從教也或不分圓但皆得為體取中道理同故以教從理義也或二皆非體由竝帶方便故以教從部義也亦可以部從教如上偏圓之義故使揀取進否不同抑圓接通別則能入是也所入非也但揀所入而能入盡妙別接通則能所俱非故俱揀也所以籤文則曰今經體者但是中即空假取圓接通別約能入言也尚揀假空即中揀別接通則能所俱非也或謂此文與下離合取體義反蓋不得今文旨故也後當更明然則歷妙揀體之文取五中道等雖似通取而其意則非以彼諸境法相相關故從寬向狹次第度入至諸一諦中取中道一諦揀方盡耳故籤釋曰今取權實相對的示體相則知約廢權揀明矣雖有諸異義不出此離合法相辨體例四五八十六十七草九卅一卅二卅三卅五論曰一性之極罔涉枝岐諸法所宗統該衆義夫惟罔涉枝歧雖不當離合可也或者據此不論離合彼特見其一意耳殊不知統該衆義一性既融無適不可雖於經體明離合可也今論之亦三其一曰文旨源流如光明觀經二疏始約三法釋體至於宗用乃各一釋似一法而已或者於是疑焉今會彼諸文不出上下相成彼此互顯義歸一揆離合方成所以二疏釋體約三法者直離義耳以顯宗用即離之合還將宗用各一以顯體三即合之離今故謂之上下相成也然此特偏顯未見互通之旨故涅槃玄文復立宗本等名而沒體禮之稱意則圓顯俱離並合今故謂之彼此互顯也抑彼玄文兼有餘意故也云云至於法華玄義據名直釋似各一法而約義亦各開三籤釋引論證體蘊離合之義又約三喻釋體記文復各開三皆其旨也故玄文曰正顯體者直辨真性等云云然則莫不為成離合義也其二曰法相大體夫體者性也性必有修性者體也體必有用是則性與體一也修用各二也舉一法則二法從之離合之義蘊乎是矣然則今明經體是為約離乎約合乎於其法相若何而揀取邪曰離合義不可偏揀取理無異轍如是而已矣何謂也如向示離合之文有曰空假即中等雖是離義合在其中而四明則曰祇為單說圓義不成作此融談方彰妙體是知一家正途於經體明離合不可偏取明矣今以意斷之曰離彰體遍合顯性極離念妙契於是為至何以言之即文有曰若但云中是經體等豈非彰體遍乎又曰若不於三各揀等豈非顯性極乎至於結示則曰思議泯淨又曰心路絶處豈非離念而妙契乎此雖明文知者蓋寡明斷其說益以少也然此特大旨耳至於文相結密有不易疏理者因復為之說曰離須各論合宜對辨離合相即旨不可分何也蓋離本正明空假即體彰體遍之義故須各論對辨則非也合明修性不濫顯性極之旨故須對辨各論則非也所以相即者亦以其文理然也如曰三諦無非經體即合論離也以即合故但云三諦由論離故無非經體以皆具中故又曰若不於三各揀空假即離論合也以即離故各三九由論合故揀二取中是則凡言揀處雖是九法其義已合凡言通處雖是三法其義已離故知不定九三而論離合實以揀取論之此則離合之說也若夫揀取則其說常定所以若離若合竝揀二修取中為體記主所謂皆取法身四明則曰各揀空假蓋左右相顯也夫言皆取法身豈非從性取三法身乎既言各揀空假豈非於九揀餘六法乎若以類從約合言之則三體祇是一體三宗三用亦各合一不然何謂皆取而各揀乎所以爾者蓋體為主質為君父而體唯一極不兼餘義餘義則其修也用也或理性之德或修顯之事非克體性一之謂也至於衆生性源諸佛理本亦唯一性而已矣非謂離則兼修合唯取性此則揀取之說也若合而明之則離合從義揀取從體義雖進否之殊體無增減之別故以義從體則揀取之理恆同以體從義則離合之相宛別抑又體得義融故不即不離義以體定故有揀有取是則揀與不揀旨歸一轍或離或合妙在其中圓活若此豈執一局論而能盡經體之大全乎或者偏取便致乖違其三曰宗途辨論然則大旨已明復何論乎特由四明二記釋體禮底達之文有曰此是法身中三未明餘二各三又以實相般若真性解脫釋底達則三皆是性若與上揀取不合者此宗途所以異論也於是南屏一派始以七義難其離合不成文見精微自是扶宗者有之異論者有之今皆置而不辨姑就四明宗旨以正之曰禮底達三本離中名相亦一性二修對下宗用則各三成九論揀取如前云云夫是則法身中三之文正當結性指修意在以修例性各明三法亦離義而已而不爾者蓋有向相成之意故也是則離合善成何不成之有抑圓論離合本於非離非合而卒歸於不定離合雖謂離合不成亦可也彼尚不知善成之義況達不成之旨既通其一餘難可了無勞曲辨也然其次文者本亦無難特是㳂襲蔽之爾今以義斷之曰約即中義以所顯能何也蓋底達之言義有能所故能窮能達者智也用也所窮所達者性也體也帖文正釋雖從能以得名然不約所窮無以顯能窮之深不約所達無以顯能達之廣故以實相體顯甚深之智德復以能窮智彰法性之甚深以所達顯能達例爾云云兩者交相為顯則底達義彰法性亦彰故曰空即中故故般若德是諸法底雖通能所正顯能窮則又曰觀照文字二般若也是則底達雖曰性三不失一性二修之義雖曰修二不妨真性實相之名故從能窮達以言之還成體家之宗用從所窮達以言之則是宗之所顯用之所依三體既祇一體宗用豈復異途離合之旨無偏揀取之義何失文旨明白孰得而違無謂此是通論而非的揀不可見其或濫輒斥為非請試對彼研詳自見臧否也或又於是論起修不起修者須知性德圓具法爾而然何必言起然後為修故以起修而攝宗用者尚非以不起修而揀宗用者尤未為得然由性德應於起修雖論之可也但彼未善離合如南屏廣智之說或專離而失合或以離中名相約合言之為未可耳是應兼取之皆不失為全性起修之義若彼全不許論起修者則孤然一性敻在宗用之外抑修外於性將何以為不即不離耶由是言之起愈不起其失性德圓具之旨一也今例無取焉旁出涅槃五章例十八十九二十草一草二論曰因經體而有五章因五章而廣二十五章此文所以旁出涅槃五章蓋其類也疑者曰諸經玄義皆明五章而已何獨至於涅槃必章章結成五義其故何也說者曰順題故也又曰何直順題兼順文也非特順文抑經旨也良以此經專唱祕藏具足三德不縱不橫微妙祕密是為如來究竟安住故曰直法身非法身等又曰法身亦非等一部始終莫非此理故覽而為題則曰大般涅槃即大滅度三法之名也雖然此知結成異於它文而已若曰二十五章則未之敢聞何也蓋其名數未正故也今先核而非之凡五不當且凡五章之法必曰名總三法教判前四體宗用三別論三法信如其言苟例為五章則總別不便一不當也若例各開五合引當科之文而釋名五章乃引玄序及辨體中文驗是牽強遷就二不當也況所引玄序既亦結成而非釋名之五當何所屬三不當也至如辨體章中既約五法釋體一一結成是則體中自具爾許四不當也又若歷而數之恐不止此通總而言一五可也進退皆非五不當也然則不許二十五章其一一結成之文當何所名以今言之謂之圓具五章可也蓋其義從容既足揀異餘文而又不失通理如離三成九豈非圓具乎但結不結異耳試更以一義例之如彼明離合之義亦異常途乃准經有兩番遣非之文云云則曰今作三番九義淺深別異乃至云法身亦非那可單作三身釋大等據此以明既未為盡理似不止於三九法相而已是亦符順經旨彰究極玄祕名融體即故也玄文曰三法具足名大涅槃三法即三智三智即三點三法即九法九法即三法縱使圓融妙極克實言之不過三九耳若如先達因之加至二十七法者有三不便一者空增名數二者反劣常途三者還成定法正同其失也故今不取蓋得中焉諸經指體同異例草三草四草五草六草七草八三十三十四論曰性不得不至至則盡矣理不得不極極則一矣是故諸經明體雖或名言之殊其為至極一也然而異指者則隨文用與故復以四例論之謂約教有通局約名有單復約法有一多約義有進否今會之卒歸於同而已矣如維摩玄疏對古釋義以不思議真性解脫為體是固順其題旨從用彰名而體歸一性不違常論也至於約教示體則又取三種真諦者蓋彼部旨以彈呵為本義須通釋故也故曰此經猶帶通別二種方便故理內三種真諦皆得為體而有傍正焉旁義雖通正唯局圓也然則光明亦帶三教而就圓釋體何也蓋取經中如來遊於法性之言故揀因取果以尊極為體文各有意不可槩論故曰約教有通局也何謂約名有單復如請觀音疏以靈知寂照法身為體別行玄義以靈智合法身為體此竝約於觀音化用從題得名而觀音之號名從智立二身明義此當真身故特從智兼合法身似有單復之異其實還取所照所合法身為體故靈智之言即寂照異名大體無別也而闡義鈔乃謂以所從能取照義為體者非也應云以能從所為體以所帶能得名其說方圓彼又論普門合義謂之以報合法作共合義釋者亦非今謂當如四明玄記以契合釋之故文云云義方盡理則無二體之失也何謂約法有一多如涅槃玄以五法釋體異乎諸文者蓋顯經體遍通一部雖名言不同而體義無別然亦不出三德之旨如玄及鈔釋云云准此而言凡諸經有體同名異者皆得作此推廣釋之亦隨作者之意非謂體有增減也何謂約義有進否如教有小衍真中偏圓開廢之義法有因果九一迷悟之殊而法相則有修性離合寂照體用之異故使諸文取體各隨義別進否不同至於所揀亦未始有定法故或約法相義門或揀其教或揀其情或揀其智若夫體性則尚不當取況得論揀是則揀者揀無所揀取亦無所取無揀無取常揀常取故取無不周揀無不盡非揀非取其理圓通議或有窮旨不可盡餘論下論曰別例既明固可總知諸文大旨但文未必盡通理未必盡究意義未必盡彰宗途未必盡判故於是申之以餘論焉或問一切不出法性又曰一切法皆佛法是則十界三諦通對別對揀則俱揀否則俱取今何故以開權論則九界無所揀約三諦而必揀二取中何也曰各當其義理不相違何者蓋開顯則其理猶通所以十界無非妙境論體則其旨甚局所以必須揀二取中是則雖揀而法無所遺還依十界而顯經體雖取而體必究極不約三諦無以明性故一切法即空即假但是經之宗用要必十界即中始彰一性之體然則十界三諦互有通別無得據橫而難竪也或問一切不出法性之文舊不以此而為開權今何取之曰縱非正論開廢其如文旨非廢耶開豈全不可定邪既示十界通依又曰咸歸實體非開而何或問所引一經二論以證經體之文謂之引同考其文旨則能所義別觀智非性其同義何在曰同異之說初無定論因其所同而同之則文莫不同惟異義亦然今取同義以證則壽量正取所見為體二論例之可以意曉然則亦有異乎曰異義非無然非文意或問辭異意同之言為二論對說為當偈自明曰後義為善也至云此亦與中論意同方會二論耳或問籤云應以畢竟空不思議假相對應以之言何謂乎曰亦此難曉當作伏疑釋之可也蓋四句中後二三諦顯然前之二句直空假耳那成圓融三諦故釋云云又從而揀之亦因上二句通示三諦圓融爾或問此空假即中等雖與下被接義別其如名言一同何以甄別曰名言雖同文旨各異今就圓中自論故得三諦互即而並揀二取中後約共位而說兼於二接故得一據一取然則二接以能接莫非中道所接莫非空假至於能即所即何偏言之邪曰通義則然今約淺深對形而說故一約能即一約所即云爾是則二接之釋其義益明或問開權釋體之文為約何義以論權實自它而所顯之實猶帶權名何邪曰若且約當文明之當是真中以論自它權實則隨義而辨所以化它權實就當分為實對自行名權自它權實則相望而論自行權實約別圓揀云云其次意者直文相次第相望義耳至自行文中方權實的顯然則文曰況自行之實而非實邪此為指今為指昔乎曰祇由昔圓帶權故須況釋今圓本實何須況之人不見此直讀而已或問玄有廢權顯實如前所用之言而籤有曰通論開權顯實亦如後揀舊皆疑其所指未決若為定之曰前用之文義已顯然但以私謂有妨未為然耳殊不知筆由章安故前後無在也若使大師自指餘文合云前說何用之云邪後揀之言按文本以前後文為問祇應答中仍以二文為釋而指言後揀者即通論下二句已酬前文之意而相猶未明故復指下就偏揀中最後文是云云然則開文何以言揀邪曰揀是通指開乃別文況若得初問答意開揀本不相妨或問法華明體每以三軌為言何也曰今以意求既以三軌為三法妙即果人所證之法今明此體亦極果所證故得約之以明焉或謂順題軌則為義者其義稍踈或問章安片古引證之文雖籤文反覆釋之而義猶難曉其說如何曰若釋茲文應先知單復之義單言則實相為體因果為宗古師既以因果證體所以非也若復言之則因果皆指實相是體家之宗實相不離因果是宗家之體據經祇是體家之宗云何反證之邪若如古師所證乃將實相證於因果也義既反經引證何在或問玄籤釋三譬之文有通別旁正等義與今離合帖釋如何曰玄固顯然但釋籤有以通揀別之問至答中則曰正顯體已者領上三義皆體之文此離義也復順此三者復以三譬用對三法即合義也故曰皆取法身以為經體豈非離乎恐體濫故故約三德揀出二德豈非合乎若據顯體亦祇應是法身德者豈非離亦揀修取性乎故知立理既當無適而不合矣或問光明疏記二文向以離念妙契示之為復同耶亦有異乎曰此可意知難以言示若言同異大約少殊所以一就中道示於心路絶處一約不即不離則曰思議泯淨至於所彰經體則二處無別祇此二文便知四明經體無非從悟處說出豈彼尋文相者所及然則文曰良以經體未始離文而文不到者復何謂乎曰此亦不可容易而談若欲言者祇由理性虗通無法不在直從事說文不及理若約即真文字解脫何不到之有然猶心路之說絶則不容擬議矣或問所引十不二門不出修性離合故類見於此與今所論同異如何曰大旨無別但今約揀取以論離合故當如向示若約離合以論揀取則如常所明耳如曰法身攝一切法等文曰合彼性三為一法身是也或問據向所明離合揀取似濫南屏之說皆已非之義今何反同邪曰苟同先達何幸如之如其不然豈可見其少濫而例弗取乎且彼還有即合論離等義乎有今對論各論之義乎有以所顯能申彼難文之旨乎有離合竝須揀修取性之說乎有以體從義等意乎既皆無之不為濫矣或問廣智諸師皆四明直下扶宗者莫不取之今曾無一言及之何邪曰直下親傳而已差失此殆不可曉者祇如霅川未背宗時親傳不少何失意之多雖欲取之可乎今但以理論而不以情故也經王論第二總編上論曰教莫備於方等理莫極於三諦此金光明所以特彰經王之號也蓋王者尊極也自在也統王也故曰天無二日國無二王又曰貫三為王又曰王者王去聲也往也云云夫世之帝王其位號力用尚猶若此況乎出世法門至備至極之教理者又焉得不即之以彰其德用乎故有是理而無是教不名也有是教而非是理亦不名也惟其此經既詮圓極之一理復兼所王之諸教故曰是金光明諸經之王良有以也非謂以部望部而得稱王如三藏所謂亦非各有所的而為第一如昔人所明云云是皆不善教部輒於諸經起優劣之論混言經旨無今昔之辨所以進退咸非未免偏失惟吾天台申明厥旨則不然若以理通論則經經皆得有是經王之義故曰經王是一隨緣設教名字不同但於教理未必兼備如方等者所以從文的指則正出此經故曰若取文為經三種俗諦乃至曰若作此解上不違佛經王之旨下不令衆生起慢即其義也但所謂三俗三真三中法相未易輒定故不免異論至於望法華則彼有王中王之說對經體則有通局同異之辨是皆常論之如後也別例中右經王類文總十有四言法華釋王涉部教者四言光明經旨該三三法相者八言王體同異者二凡三例法華釋王部教例一二三四論曰文固有言同而旨別者如法華云或是王或是王等此約小機對勝應身故以長者譬之長者即表報佛故見是王等報等於法故也又曰聚集國王長者此以法華開顯通會諸教故譬之以聚集國王示無二化也又曰如佛為諸法王此經亦復如是諸經中王此又藥王十譬歎教之文也在昔則曰是金光明諸經之王此以三諦妙理為王也如是文義雖復殊途而疏記莫不以經王釋之則又見其文異而理一也所以文異者謂約身則以法身為王約理則以教所詮處為王約部則部中尊極教則部內教主若從教分別則有大有小或約部以判則曰是王中王雖有此異要不出人法而已然人必約法法必稱人終歸一致也然復須知同異之旨又不出今昔部教之義所以彼此理同經王是一者約教義也今昔相望此王非彼王者約部義也又在昔經王如光明之類各當其教以論統攝縱望它部亦不出偏圓相對而已所以部教俱屬教義唯有法華統彼諸經若教若部獨得稱王亦可部教俱屬部義此部教之論也故曰世人不了者此知有教而不知有部也又曰今謂乳及二酥等此方以部區別之也故知一家部教善判異同其相略爾然則今經既部無餘教而復須並明何邪蓋對昔部昔教約同異以明之所謂部即部中尊極為王等此猶仍前部教以說未為法華部教也故部義既以尊極為王尊極即圓矣豈於教義復取圓乎故以教主為王以別部義非無以也而曰故部內教通別二轍者蓋是施開之意亦當分跨節之義也至曰故知部教俱須會通此方示今經教部耳而又曰在昔未會者此復追示昔化以顯今經開會之極則曰若會已後等所謂但兼部中圓極主弱正如春秋之時周室既衰而列國各據是也至今經法華方為一統耳所以自爾已前或歸不歸歸者即法華已前三教菩薩顯入兩教二乘密入者是其不入者猶各於當教稟益而已故曰不歸仍是小王被輔小王蓋權教果頭也然則前三權果本是圓佛垂為三迹故無背長之意使未入者圓機若熟堪預開會則何處別有四教主即向身是圓常之身故曰民若歸從王本一統也以此會法義可比知即會法之義如此光明經王文旨例五六七八九十十一十二論曰經王之旨非悟莫通蓋與經體相為一致固非言論所及其所以論之難者無它特以大師疏釋有所謂三俗三真三種中道之說其於一家教門諦理法相未見所自故莫得而定者雖舊多解釋如孤山等諸師或對金光明三字以為三者或以承上斥古文後作三部釋者或約五三諦等解者或指如上玄文別有所謂三者云云莫不各矜所長而㸦譏其短然終未為盡善之說今固不暇委辨也姑取四明記文七種二諦之釋而申明之然始余竊嘗疑焉且夫疏文直明經王故有三三諦之義安得遠取七種二諦為釋若果大師束彼七二成今三三者不亦迂闊乎不然法相更多何獨取此由是持疑在懷存而不論者久矣及欲成此書是不得不決其可否於是深研之乃始得其說然後知四明不我欺也因為之說曰一代通論則文旨法相理當該攝故其以七二諦會釋宜也若當部別示則偏圓理教自足疏通雖不用此釋可也何者良以疏文正由斥古而來彼以三部不得稱王而光明獨稱之是以大師不與其說通取一代能詮所詮與夫文理合不合者以建三三法相之說意彰一代通得稱王蓋不止於光明而已此雖通示意實正顯法性經王所以文示一代之後則曰若作此解上不違佛經王之旨正顯光明也下不令衆生起慢王通諸部也故得記文通用七二以釋蓋法相該攝有正有接莫過於此故也苟非斯義何以示一代諸經經王乎故曰如此明經收於一化罄無不盡又曰一代教部若諸部內等故知通示別在其中由是明之則今以一代通論取七二諦之說蓋有力焉雖然祇應一往泛爾會通非必三三法相全同七二諦也若定泯齊者祇如後三不名中道復遺別接通義雖記文料揀順問而答終是難通則又曰況復文中不顯標云七種二諦良在於此此則一代通論之說也若當部別示如方等部內備有偏前三教若文若理豈非三俗三真乎又詮圓融三諦空假即中文理既合豈非三種中道乎不以此三而為經王更指何乎如此消釋自可疏通豈須定以七二捨其簡易而反取迂闊支離耶而必爾者蓋有向通論之意故也然亦應云此雖別示通在其中以方等既該四教任運攝彼諸部偏圓是則光明所王諸經即諸部所王之經諸部所王不異光明之所王也但未至法華彼此能所未純一化耳得斯通別之論方知四明取與法相蓋不苟然也王體同異例十三十四論曰凡諸同異義不一途或本非同異而言同異者或直言同異者於其同異則又有真妄事理名實約義等對論是不可不辨也如常論云云今此王體論同異者不以名名則定異故也不以體體則理同亦不當同異故也獨於文義之上既彼此㸦釋矣如曰疏以經王敘體而又指法通局不同如曰豈獨體是經王宗用亦王然則為同乎為異乎曰既不以名體論之當是論文義同異爾此亦不可一槩蓋王之義通有體有用體之義局唯取一性若俱約體則是同若亦兼用則成異所以指法不同不妨㸦釋理一同異之義明矣餘論下論曰教以詮理理以成教故一家教門唯明文理而已如藏通詮真別圓詮中是也何獨至於經王而於文理之外復明所謂文理合與不合者邪曰若論能詮所詮文理常定但彼明詮理故以三諦竝屬所詮是則真中約竪而說此為顯經王彰自在之義故以文理對論真俗圓既真俗不二義當中道是則三諦約橫而說若合明之即彼所詮之中是今真諦但今約圓論顯自在義合文理以為中耳各有其致不可槩論然則前三文理不合藏別可爾其如通教俗既即真為何亦不合邪曰通教雖云即真終須滅俗故合義不成或問文引維摩疏文箋於文句題下意彰何旨曰此有通別二意通則法相隨宜示無定說以顯今文三俗三真之義亦是一途別則正引隨情智二諦即俗諦是教真諦是理以類今文文是俗諦理是真諦其義大同故也或問疏釋經王之文先言若取次云若說其義如何曰非無所以先言其取是以文理定其三諦也取謂取與之取蓋凡一法必有文有理有合不合隨義取與故云若取也次言其說是復以三諦結判經之與王也而言說者謂說所取之義亦各隨諸部之所說也或問其有一說釋若取之言謂取解也蓋於金光明三字之題而有四教機緣取解不同若於三字作能詮名字解者即三種俗諦若作所詮諦理解者即三種真諦文理不合即偏人取解之相是經而非王也若作文理合解即圓人所解三種中道是經是王也然亦不違向偏圓之義作此解者不但於三三之義近而且直亦不失一音異解之旨其說為如何曰是亦一說但未可與諸家議其優劣雖存之可也然則據向一說正同孤山之義已為今記所破何謂未可與諸家議其優劣曰是全不同也彼以一取字作兩向釋之所以非也況全不言偏圓所歸則成金光明全無所王故為所破爾若如向說則偏人所解金光明三字文理不合全歸偏教三真三俗豈非所王乎今取為王者正以圓解三字圓融名實為是經王不然祇如題中三字還通四機取解否若果通之當如向釋可也頗似有理故存之耳如曰不然去亦何吝唯在審其是而已矣或問如向論七二之說以承上斥古來意申之將不與彼破古消王之說濫邪曰法相不同安得為濫彼以三部釋三故餘部非王此約七二成三則凡三中皆得為王故全不同也或問七二後三不名中道等記主既皆釋通今何而言一往順問未為盡理曰若盡理者直釋已足又何假云文不顯標七種二諦可以意得或問三種中道於九自在若有十二法何也雖記文已揀不出通別之義所以於三中即成異名於六即如王於臣愈彰自在然猶未見經復是王之意曰所以是經者但是詮理之說莫非經故而復是王者在中則能融攝餘二諦故既中兼二義故得云於九自在也或問記揀此經體屬何王若以體定就圓釋體當是圓教中道可也何以記文反從判教屬通而釋乃云義當圓教入通中道為王邪曰此乃王體相從之意故義不可偏定若以王從體則俱局於圓以體從王乃通三種然今以王義當圓教入通中道者蓋附判教屬通之意其實通於三種所以言接則圓正可知入通則接別自攝是亦取文號經王教攝衆典之意故得經王附判教釋也或問妙玄有云諸經或於俗諦自在或於真諦自在或於中道自在但是歷別自在非大自在今經三諦圓融最是自在此與光明論王同異如何曰今昔之異㸦有通局如玄文雖通而局以通則三諦皆與自在之名而局則歷別中道猶為所揀光明雖局而通以局則唯中得自在之名而實通於兼帶接正豈若法華純獨圓融為王先示其大略云別例中右隨緣類文總四十有二言一家通明隨緣生法大體者六兼出二論立識生法不同者三示隨緣文義出起信論疏者十五約今別圓通明隨緣者九因生法而言無住本者九義涉性類二種者二凡六例隨緣生法大體例一二三十二草二草六論曰一真法界本絶端倪大總相門無法不具由具故即熏而變由變故全具而生惟生具兩融故事理不二此則一家明隨緣大體論生法根源莫過於此也但隨緣有染淨之異而生法亦真妄之殊隨緣染淨者固教理同然其生法真妄則由來異論如地攝諸師立識則八九不同生法計真妄有異天台斥之以謂若定執性實墮冥初生覺有自它性計之過云云若夫今家明義則不然如以性體亡泯約自行離執言之則曰今明無明之心不從自生則不當真生一切法不它生故非妄不共生故非真妄和合不無因故非離三外別有所謂生也雖不當自它等生而以教門隨宜約化它無妨四說則曰若有四悉檀因緣亦可得說所以或作自生說或作它生說或共說或離說若作自生說則言法性生一切法也若作它生說則言無明生一切法也若作共生說則言無明法性和合而生也若作離生說則言非無明非法性亦非和合而自爾生一切法也如此說者上不違諸法亡離之旨下不墮冥初性過之失而亦不乖悉檀被物之說此其通意而已抑又有別意焉所以諸文或言從法性生諸法則是一家真中之義以別圓詮於真如變造故也或言無明生法則是別教無明強法性弱之意如曰真如在迷能生九界又曰覆理無明為九界因即其文也若言單真不立獨妄難成必和合而後生者則是教門大體之論若言無因而生者無因本是理性是亦義當順於理性也但執之成性過耳離然此皆約義隨文分別以其理則不然所以言無明處不少法性言法性處非無無明言真不隔俗言俗不乖真言理性不妨緣起言緣起不礙理性言真如不隔諸法諸法不離真如皆其旨也故不二門曰若識無始即法性為無明等又妙樂曰無始時來奚嘗非真等斯皆理惑相即真俗不二故能相興造於染淨而一法二諦不相妨礙也又曰位據理性等又曰萬法是真如等是則圓詮諸法事理體一故不唯理性是同而緣起亦同不但相位俱皆常住而情無情亦皆有性矣所以三文並舉波水為喻而意大同不無小別也云云由是言之則一家所明隨緣生法望於古師則彼唯性過而此則有遮有用也論其旨意則有通有別也示於事理則有離有即也言乎文相則有同有異也但以此意往貫諸文無不懸會者若委明諸論立識生法則如次論之兼出二論立識生法不同例二三四論曰夫心為立識之源識為生法之本但識有染淨故生法不同由論計殊途故是非互諍謂是者以強而助弱知非者翻劣而歸勝故於立識生法又有所謂翻宗助計者焉今以次明之如昔弘地論師分於南北譯攝論者有乎梁唐皆隨其所計立識不同故或立九識菴摩羅梁真諦或但立八識黎耶謂九識者異名耳唐三藏若地論所計則同依八識而有真妄之異並如文云云惟其立識不同故計生法有異有約立識而論生法者有唯依八識而計真妄者有以地攝二論對論生法者是皆隨文用與非謂文相有乖互也何者如文曰真諦所譯則依菴摩羅後代諸譯並依黎耶此約立識而論生法故一往梁攝依真唐攝依妄若據八識則真諦非不依妄蓋亦計黎耶是無記無明生諸法故唐攝非不依真或於八識計法性生諸法故由是而知二論立識則別以有八九增減不同生法則通以各計真妄生法故也又文曰弘地論師二處不同相州北道計黎耶以為依持相州南道計真如以為依持此並自就八識計於真妄何者以南地所計之真還依黎耶故文曰若地人明阿黎耶是真常淨識則其計妄者可知故與舊譯攝論異矣然而文例之者例其各計似同非例立識也若乃玄文偏約地攝對論者蓋大師唯見梁攝故文無及唐論者至荊溪文中始言之耳而特取南地者乃一往對梁譯示各計之相故略不言北道非謂地論唯真攝論專妄而已所以翻宗助計之難者無它蓋難者曰文云加復攝大乘興謂梁攝也梁攝本依菴摩而曰亦計黎邪以助北道何也又曰攝大乘明十勝相義咸謂深極是固梁攝也而曰使地論翻宗果何地論耶或南或北未免疑妨云云今釋之曰苟得向用與意與夫通別之說無足難者姑以一言斷之使翻宗助計兩皆曉然何者是皆以立識混於生法故致斯惑也若知立識是別生法是通何妨梁攝亦計黎耶助同北道然則亦計云者蓋對北地言之既同北地則計勝南道使南地翻宗而向攝也又可知矣人不見此往往膠擾於文相者不知其幾夫如今之說復何難哉示隨緣文義所出論疏例草七草八草九三十三十一三十二三十三三十四三十五三十六三十七三十八三十九四十四十一論曰隨緣之體原由心法隨緣之用出乎理性隨緣之義本諸起信隨緣之文申於藏疏若夫隨緣之旨極其理致盡善盡美者至吾一家而大備矣今本諸起信藏疏以明之則餘當可了按文有總有別有合而言者總則二門通說如論立義分中說有二種一者法二者義所言法者謂衆生心是心則攝一切世間出世間法依於此心顯示摩訶衍義云云又顯示正義文云依一心法有二種門一者心真如門二者心生滅門二種門皆各總攝一切法以是二門不相離故又如藏疏釋此識有二種義總括上下文意關諸義門云者文相稍廣今以圖示之令易見別謂二門各示如論曰心真如者即一法界大總相法門體所謂心性不生不滅乃至依言說分別有二種義謂一者如實空以能究竟顯實故二者如實不空以有自體具足無量性功德故云云心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿黎邪識此識有二種義能攝一切法生一切法一者覺義二者不覺義等云云至於依不覺故生三細以境界緣故起六粗之相言意識則有五種名示生滅相則有粗細等四句明熏習則有四種法判唯識則止齊業相等此皆自生滅門不覺義中出也又其次合明文者如疏釋不變隨緣以波濕喻其不二又引楞伽明如來藏通為諸法之本而有七八識不同者又明二門各攝諸法而有通相別顯之義者又明如來藏本非生滅而以無明風動隨作生滅體元不二者又約四句辨諸識緣起不出生滅不生滅等者略指文相大率如此今論之曰論示一心具攝一切世間出世間法以今言之祇是一心本具百界千如三千世間如摩訶止觀妙境所說始得顯示摩訶衍三大之義不然何謂一心攝一切法而疏不以是釋之故知未盡其理然則離一心為二門道所以散也自二門而出一切法妄所由生也妄之所由生教之所以始也故論以是而立宗焉夫一心之源本自不動尚何二門之有然而真如生滅所以異門者蓋因其動故不動之名立因其不覺故性覺之義彰因其生滅故不生不滅之相顯因其染淨故非染非淨之理殊故以其動者言之謂之生滅門以其不動等言之謂之真如門其實本一心也惟其本一心故各總攝一切法而體不相離所以真如中有隨緣之義生滅門有本覺之名據理本覺祇是真如隨緣無非生滅名雖有四義唯二耳惟其分二門故則有對各先後之異所以對言則二門敵立各言則真妄㸦兼以名言所因則先妄而後真以體用本末則先真而後妄在真如則不變為體隨緣為用此用在體謂之體用俱體可也在生滅則真為所依妄為能起此體在用謂之體用俱用可也各當其義理不可混雖不可混體元不二然則心源之與真如理一而名異名相有彰未彰耳縱於心源亦云不生不滅等者乃以其既變名其理一爾古人所謂喚作如如早已變了是也由是明之則極真妄之端究起滅之際者其唯二門矣所以祇一如來藏自性清淨心於真如門則有如實空不空二義空則離諸妄染不空則性具一切即所謂空不空如來藏是也既於不空如來藏明具諸法故知起信其理本圓但申之異爾其於生滅門則有覺不覺二義若據生滅祇合明妄染不覺而兼明覺義者蓋不先明本覺無以成不覺不明不覺無以成始覺故始覺由不覺而得不覺由本覺而有而此始覺覺心源時還同本覺既同本覺則無覺不覺之異也雖通二義其實生滅一門正從不覺而立所以依不覺故生三細三細即無明業苦之相由境界緣故起六粗六粗即見愛等相故以識言之即事業二識也於是復立五種意識之名所謂業轉現三則名相全同後二亦不異六粗中二但名相盈縮意以相續兼之故略後四粗耳餘諸名相大同小異會之可知至於判唯識止齊業相以彼不明真妄和合同一心源故生法之本止齊於業相而已若彼所明真如則凝然不變不許隨緣故一家明別理有隨緣義者正以不同彼所明故後例當更示之其所以合明文者凡二義一以二門合論二以隨緣不變二義合論二門合論則為通以各有二義故也二義合論則為別如波濕等文並約生滅門說從變起言之故一往則別也究言大旨則真如門雖有隨緣併名不變生滅門雖有不變併名隨緣故二門之與二義亦得是同也故曰真如門是染淨通相云云又曰一約體絶相義等此並約二門明二義也而曰二門通相別顯異者蓋真如門染淨約理故但示於通相生滅門染淨約事故別顯於二途然則事理雖殊染淨無別總攝之理同也餘文可了不復別論約今別圓通示隨緣例七八九十四十五草一草三草四草五論曰經論名相一也而申明之家有得其深者有得其淺者有以理通淺深而兼明者固莫得而一也如一家論隨緣之義按其名相本出起信論疏而一家諸文頗多用之若各自其宗途夫復何論惟其以彼此教限旨趣用與而格量之則彼有所未至而或謂之深極此論所以辨也今先示彼五教之相謂一小乘教二大乘始教三終四頓五圓云云而隨緣之義出彼終教如疏曰三終教亦名實教說如來藏隨緣成阿賴耶識緣起無性一切皆如又曰不變性而緣起染淨恆殊不捨緣而即真聖凡致一又曰用則波騰鼎沸全真體而運行體則鏡淨水澄舉全體而會寂亦如前例之所出也然於彼宗雖曰至極之說而猶有餘頓圓二教是果得為至極乎況以彼會此則彼終教適當今別教爾雖彼宗途亦作此會其文見玄籤補注彼之頓圓尚不階今圓豈得以終教齊之乎故四明於是有所謂不談理具單說隨緣仍是別義此則通言隨緣該於圓別也又曰它宗明一理隨緣作差別法等此乃別判彼宗但至別教而已今因得以論之所以通言隨緣該於圓別者蓋一家四教明所詮理及所造法於藏通詮真真即空也既無造法之用故六凡法界皆自業惑所造不論隨緣之義其於別圓詮中中即佛性佛性即真如有熏變之德由變故造十界諸法此別圓所以通得論隨緣義蓋教理當然非因彼立也故止觀明別教一念心起為迷解本而輔行引楞伽如來藏為善不善因及大論珠象入池喻以釋之又四念處明別教觀無明法性生法不同引攝論地有金土染淨譬以會之然彼二文皆它宗引用以證隨緣義者今既證別教乃於別明隨緣之的據也又如金錍約隨緣不變顯佛性義斯圓意也所以指要明別圓皆有中實之性俱得名變造者良在於此但隨教詮旨有即不即具不具異故約之以揀教別如前二文所明亦如後示故知其義本通明矣而判彼宗途所以唯至別教者非謂抑彼也亦以其理之所在今還約向意申之不出即具之旨有偏有兼兼則為圓偏則成別故即而不具非圓也具而不即亦非圓也唯即具兼明然後為圓爾故曰即具唯圓及別後住是也由是經教有時言具而不言即有時言即而不言具然約經旨通明與夫得意者固已盡之不然則別教教道教權理實之說故以理實言之亦得言即以教權故不談具耳既不談具則非全體而造雖曰相即非性具之即還成離義言具而不言即者理實教權例亦應爾是皆偏教教旨非圓詮也按彼所明雖有隨緣不變相即之語義似濫圓曾無一言及於性具者故判之屬別蓋深得教門楷定綱格之論但舊或以為未然如永嘉齊嘉禾玄天台穎則難而非之霅川則析而扶之近代竹庵雖宗四明而獨於此信所不及余因議之曰彼難而非者其於宗教固未嘗及門是不足與議也委析如彼十門其扶之者固嘗及門而未至堂奧也所以始則承之終則自畔其說故雖辨析而不達深旨終成迂闊之論亦不暇委究也其信所不及者雖亦登堂奧矣而以出入彼此感於它家之說故信之不及爾且謂凡今所據皆生法之文非所謂隨緣者余當評之矣藏通生法可非隨緣其別圓生法必由真如變造而得未有不本隨緣而自生法者是則隨緣乃生法之本生法乃隨緣之末彼以生法而非隨緣此知其末而不知其本但此考之自見可否或固以為不然更試以一二文旨格量而表發之一如彼藏疏明識有二種義總括上下文義作種種義門釋者以真如無明各有二義言之豈非隨緣且是真如門中能隨之性而已尚非所隨無明況得為所成九界之法乎若即此是所隨所成者則無明中二義便為煩長乃成徒列也況以真妄一異生滅不生滅等考之與今別教相去幾何又如真如門違自順它有隱自真體顯現妄法之義豈非同今真如在迷能生九界之說乎及生滅門違它順自有覆真理成妄心之義豈非同今覆理無明為九界因之說乎又有翻對妄染顯自真德等義豈非始終常淨唯不徒覆之說乎是則彼疏大節與今別教更無少異何謂非邪二如輔行料揀華嚴地生種種芽之譬而別圓引用不同有云地為能生能所不同故成別義豈非地性不變體是能生能生即隨緣性也若望隨緣之事及所生法則能所體別豈非別義乎亦即金錍所謂能造心是所造法非是也至於永圓教則曰今明圓教地體生性一切具足豈非隨緣不變皆具三千即指要所謂今家明三千之體隨緣起三千之用不隨緣時三千宛爾是也又曰況復芽堅全是地堅能生所生無非法界豈非隨緣之事與隨緣之性其體不別故能所皆法界也由是言之兩教之旨判然可識是不唯知彼隨緣同於別教亦見四明之說符於圓宗也三如妙宗因明別教覆義有曰應知覆義不同泥土覆彼頑石乃自舉譬云如淳善人等且別詮理惑各住正同泥石之義而特去彼取此者豈非正以理實故體即不同泥石之覆而以教權故非具故以善人作惡喻之雖然惡非所能其實還從人造夫惡非所能者不明性具之譬也還從人造者理實體即之譬也故知教權必兼理實理實必附教權始是別義以此例彼其旨符契孰得非之由是而知四明中興之道如揭日月自昔扶宗者莫能明之使別理隨緣之說晦而不明惜乎因生法言無住本例五六十三十六十七十八十九二十四十二論曰論有窮妄源而極實際者如淨名無住本法即其文也由二大士對揚道妙設六番問答以窮衆生源至於曰無住則無本又曰從無住本立一切法斯可謂窮妄源之劇談極實際之至論也夫妄源既窮則惑本虗惑本虗則情自泯情泯故諸法畢竟平等亦無真妄可得極其理際如是而已道至於此夫何言哉後代學敝不務本而務末匪從直而從迃乃始疑於名言滯於文相故無住本法之道於是乎始枝而二大士對揚之妙或幾乎息也今之所論豈得已哉蓋其論有三謂名義也文相也教旨也名義者何即無住本之名或從無依義釋或作性不定住釋二孰為正說曰皆是也但從窮源則無依義為正疏解出四重即其意也然則所對雖異能對不殊蓋不出一迷中實相夫迷中實相云者無明法性合而言之也是亦無明為本亦法性為本法性為本者即無明之法性也無明為本者即法性之無明也但無明為本有逆有順法性為本或通或別別唯局悟通亦該迷但隨義強亦不一向所謂法相離合者要知兩家得失煩審所釋進否即向文旨之說夫既該於四重未可會以一轍要必事理迷悟各論本法知此始可與議其法相何者蓋四明所示有本有會本者本其文而言也既以迷中實相對乎四重則宜各論之可也由各論故所對有異故實相之理有開有合是則約理為理性本法即修二性一合也約事為修中本法即修性各三開也約迷約悟莫不敵對以成其義非若修性一轍之意才言對修便須合性況復離合亦不恆爾此如別論云云所謂會者以此會彼之義也如光明玄會兩番生起如前云云又如指要會兩重總別云云惟其以四從二所以後三合而明之故曰云云雖復合明其意還別即三因果用須修也三道流轉逆修也各對性德為無住本非謂併將逆順二修為一所對立法而已霅川錯解便爾輒評往往扶四明者亦同此見故終不能解其紛苟如霅川所謂云者是以一轍而會四重也豈記主之意乎教旨者何即別圓二教俱談無住而有依自依它及即不即以辨兩教之殊此如淨名疏記及妙樂記示之明矣云云而所以論者於是四明則有所謂體性具九起修九用之釋而霅川評之以謂體用枝本雜者今論之為二先明自他次論體用明自他者據夫疏記所釋不以理惑而分自他實以即離而為自它蓋理惑自他別圓皆得言之今以理惑各住為自此則自他俱自以理惑相即為他此則自他俱他如此自他方彰圓別之的旨也即指要所謂語簡意高是也雖有記釋若非四明亦何由知之而霅川於此曾不言之特掩其所長是誠何心哉論體用者義亦多塗今此所云體用俱本彼以無明法性體可相即而用不相即便致差殊四明則不然體用俱即方彰圓旨所以體用俱本者且如無明而有二義謂體空義體也成事義用也此之體用俱無住本由用故能造於九界即所立法也然則四明所謂云者正言能造之用何嘗是所立法只如本文以無明為無住豈祇體空而不兼於成事之用耶又如三道流轉併以無明為所立法則又何耶故知文義進否各有所以雖然此猶分別之說若全體起用性外無修何妨無住即所立法及以三千俱本俱法皆不失為得旨之說然則名義也文相也教旨也既皆無所疑則合反諸本文求其所謂無住則無本與夫從無住本立一切法之旨而後殆庶幾焉義涉性類二種例十十一論曰經言佛種示一切衆生皆可以成佛之謂也知衆生之所以成佛者其唯一家教門性類之說乎是故知其說者可以見性可以立修可以示迷可以顯德可以資種智而開覺藏者何莫由斯道也故不輕禮四衆以下種一用是道也陳如述智願以領解知是種之不亡也夫惟佛種之說如是其可不務而知之乎要其說大略有三一曰釋名有通別二曰指法有進否三曰論文有同異何謂釋名有通別蓋一家疏記推明其說則有性者焉有類者焉性言其本指三道也類言其修即三因也夫三因所以言類者謂與果上之德類也三道所以言性者謂與三德之性一而不改者也抑性所同十界無二也類所獨者唯佛之因也而性亦曰對者乃約迷悟縛脫等法敵體相翻而始終理一之義也惟其敵番而理一故則異所不能異異所不能異者同不得而同也反顯類種是同其所同同其所同者則異得以異也此義至要深可思之類亦曰修者蓋言是其修德也而並能生三德之果故曰種譬諸草木均有能生之性性也而一草一木各有種別類也有如波水之喻亦其義也今從顯要略言性類然則三道與三德亦各類從三德與三因性亦不改故通言莫非性莫非類也但從義強性對修類耳何謂指法有進否即向名下之法說者不一或約十界進退明之或約六即通局示之或通約十界為說者云云且種義則一何衆說之紛如是皆不以今昔部旨橫竪法相論之故也何則蓋一言性類而有今昔不同所以在昔約圓通論則迷為三道為九界為理即性種也悟為三因為佛界為名字等四即類種也但淨名為彰彈斥故性種不及二乘如經曰凡夫於生死有反復二乘無也無則佛種斷矣以未開顯故類種不即九界約九界因行不約人也則宜約十界竪論可也三教可否此復別途云云若約今經開顯以論則若性若類俱通十界既俱十界何以辨性類之別是應取十界之善淨為類如開五乘四惡以至一毫種類皆歸佛道是也性則直指三道迷染之事而已故曰對生死邊名為相對理體本淨名為類種是宜約六即橫論可也然則在昔雖有六即為對偏故約界仍竪今經雖論十界以唯圓故約即仍橫此皆分別之說若夫約體則不然如以理淨類於已淨則類亦通迷迷中三道亦曰理性三因則性亦通類生時此種純變為修修性一如無復別體豈非修性不可敻別是則三道三德三因性也類也離也合也體一而已矣何謂論文有同異亦由諸文言之異也如或約三道或約十界或約中道無性以言之而記者曰前文不約十界釋者以對三德義便故也推此而言是故各隨其文義而已而獨於記有所謂性家之種若與今種義異者今論之曰凡諸名義同異不必同不必不同必同則害義必不同則傷體顧其文理如何然今文者本不難通但蔽者必於同異耳今謂理本一致釋義則殊所以釋義殊者蓋疏約二釋明佛種義此即釋初理性文也而曰性家之種者謂性所具種異乎緣起之種故特揀示之也然此二者雖異而相因異故約理即事之別而相因者即性具中以緣起為種緣起復以此性為種此其所以相因而起也但性家緣起雖具緣起之用而未始緣起若望事中緣起此猶在性而已至於由迷解緣全性起為染淨十界即此便是性種無別有也而次約三因釋者蓋對上文為明機應生佛各有性類故也故疏云云以義帖文則可知矣云云由此而言非獨此文為然凡圓宗大體莫不然也如四句本法之義鏡像修性之喻四明所謂今家明三千之體隨緣起三千之用等皆可類通也夫如是不唯性類義明抑亦圓旨斯顯了則遍了何獨昧茲乎其如相之離合教之通局則祖有格言舊有成說得以置之存要義也餘論下論曰隨緣所以餘論者蓋其說有三一則教旨二則宗途三則文義所涉凡向所未明與夫言而未盡者今得以論之或問玄文明別教生法有云𦘕師即無明心也無明正當它生那得與自併遣云不自不它等抑若理惑俱遣圓離四性是即不思議意又何以為別曰文明因心造法故偏從無明言而曰不自它生者謂若必從無明等生則成性過故也今為彰性離故若理若惑俱須離四亦如四念處推觀無明云為從無明生等皆通言爾又可推無明則無明為自法性為它推法性可知故理惑常定而自它互論所以俱遣也然俱離性而猶屬別者則又約解惑相翻而言故當別教不思議生滅也如文云云若夫不自生等其言雖同所以離性則隨教有異至後二空示之或問玄文始明地攝各計不同則㸦諍不融也及大師以八識含藏而融會之還引攝論金土染淨為證何也曰論本自融弘者偏執由文本融故得引之以和諍計而偏執者出於弘論師故曰攝大乘人云者是也然則攝論其文一也而或以和諍計或以示偏執如念處云云何其無定論歟曰各有用與不可槩論玄文明之如上而念處則引彼通文以證別義如曰依染如土依淨如金亦如玄文所謂染譬六識金譬淨識豈非其文本通以文通故不妨偏取依染一句以證別義則曰黎耶依業識生故言依它依它即無明也但文疑多上故言依它也一句致隔絶難曉或問妙樂云真如在迷能生九界則真生一切法也又曰覆理無明為九界因則妄生一切法也何當文之相戾耶曰苟得向例意斯謂相成非相戾也但法有強弱言有主賓異爾其實㸦相資待以成造法之用然以無明造九界斷猶可爾若真如所造而斷九者莫亦斷真如否況別住行所修空假即是緣了二因若次第斷九應緣了亦斷耶緣了斷則何以顯正而又曰九盡方名緣了具足何耶曰此皆以圓難別故於教門為難若得向權實意復何難哉蓋以教權故九界非性有可斷義而以理實故無可斷之理不同圓詮指修惡即性無明九界皆不可斷也然則在別斷九而非緣了者蓋九界即迷染能覆之惑緣了即佛界能顯之因以不即故謂之別修以是佛因故而能破於九界還因破九而顯緣了故曰九盡方名緣了具足此記固言之矣如曰以別教中無性德九故自他斷可釋初難也又曰別修緣了而嚴本有常住法身可釋次難也更引妙宗會釋彌顯云云惜乎惑者莫能用耳然而九界果破否耶曰克體而論九界初無定法而言有破否者但依教詮旨情解如何非謂如器之破而不復全至於破已還顯亦其理也人多迷此故略示之或問文於別教立三種佛界云云與圓同異如何曰不同也在圓則六即皆佛豈特三種而已況所以理性佛等尤復不同或問四種緣了其二見於妙宗餘二復依何文曰在它文則有之今雖無顯名亦可以種種二因兼之而又曰或初緣次了或初了次緣者還是指上中邊空假然則今明別修於四的屬何種曰正取中邊通亦兼四在文可知或問玄明事理本迹正當事理二重本法而籤約無明法性釋之何耶曰彼之事理對後教行等五則並屬理性故約性中事理以說如曰無住之本既通通於無明法性皆得為本故也是則真諦指理之言不唯指於法性亦指無明即理之本所以三千為其森羅者即所謂三千在理同名無明是也或問今引玄文明別教所觀境意彰何旨曰此有二意一彰別教真如亦具諸法但以教權不即九界故唯云有真實法等二顯別理隨緣之義故曰從是妙有出生諸法但生而不即與圓異耳或問妙記料揀相位同異本明世相常住如指要節釋妙宗揀顯亦已明矣而情猶未曉今請置諸文相之說直示其旨曰世相所以常住者無它直明諸法本一而已以本一故不見代謝流動之異亦不可分性相事理之別是皆偏漸情見何關開顯至一至妙之談乎要知其理試以一近事喻正如一氣貫乎四時全一氣而生全一氣而長至於凋謝亦全一氣在凋謝處故無適而非一氣則無適而非常住也法華據此直示謂之理一謂之究竟等皆其旨也了此方知妙宗唯生唯住之說起信所謂四相俱時而有古德云壞則隨它去先賢又曰壞則隨它壞所以長不壞此全與古德意同但加注腳耳莫非此理也或問輔行引楞伽大論之文無非為顯隨緣意者然亦有異義乎曰有之不出因緣之義所以楞伽因自內出也大論緣自外入也因緣既具彌顯隨緣抑知引證尤不徒爾或問逆順二修與兩番生起同異云何謂異則名同謂同則對異曰亦不一向也二修約迷悟而言故別唯二種生起約教行為次故各通十種三法此則異也亦可彼此會通而有進否故亦同亦異今應作四句分別謂是逆修非逆生起第三句是逆生起非逆修第四句是順修是順生起第二句非逆修非逆生起第一句所以續遺會之若此指要會之如彼然皆不及初句竝不出四句意對會可知也或問指要云今家明三千之體等因此一文難者有三一難理有差別二難不隨緣時三難除無明有差別云云然則今為四明說者若為釋通曰苟得向即具意此亦不難要之指要所以云者蓋顯一家性具體用不二之旨故無間隨與不隨亦不論迷悟之異始終常即常具故三千法法法宛然也更以一文表發其說方知文理有憑如不二門曰三千在理同名無明三千並常俱體俱用豈非所謂三千之體隨緣起三千之用乎又曰三千果成咸稱常樂常樂則果德還源者矣豈非不隨緣時三千宛然乎又曰三千無改無明即明既即明矣則無復無明豈非除無明有差別乎而此差別即無差別但對彼淳一無差故以無差而差格之然則文曰理體無差等又曰地具桃李等又曰始終無改者今謂總不出三義謂形對義相即義體性義云云雖有三義理非異途一以貫之共顯圓旨而彼專以事理形奪為難者固非至於析者直約三諦分別為說亦未為得也是不唯不足以析彼之難亦以見背宗之僻蓋兆於此矣或問妙記有云以即不即而分教殊則別教正當不即向何於別亦許言即而論隨緣邪又指要云應知不談理具等是必以具顯即方成圓義若但即而非具亦別義而已是則併與妙記之文違耶抑又既許以具顯即何妨以即顯具使隨緣屬於圓耶曰別不言即者是以圓形別對揀之說也就別自論約理實邊非無是義今應與奪明之故與之得即失具指要之文是也奪之即具皆非妙記之文是也亦可半與半奪全與全奪在別雖無全與之義餘文亦應有之但不併出一文如曰中雖不具九界依正非無佛界妙色妙心豈非亦得言具乎若更具論即具之旨亦不出三義一者互非二者相顯三者相即云云如彼隨緣知即而不知具但是互非而已約何以論以即顯具若其次二義在今家則可在經論則可以先存諸大體故也如彼申釋苟不明言惡得有之或問十不二門云濁水清水波濕無殊此與藏疏所釋不變隨緣義云無變之性不礙起浪浪雖萬動不礙一濕是故動靜無二法有何異耶謂異則何以區別謂不異則隨緣非別矣曰要知異相當取指要之文格之如曰波喻三千俱用濕喻三千俱體須知染中其水雖濁亦全濕為波清時豈別有波濕故曰無殊以此格彼方知論疏未盡其旨又如指要云故知它宗圓極祇云性起不云性具深可思量惟其不云性具故性一事異及即理時須破差別歸乎一性不能法法宛然此其與圓不同爾或問指要又云若不談體具者隨緣與不隨緣皆屬別教莫也別教亦有不隨緣義那得定謂別理隨緣耶曰此且一往據文偏明故黎耶生法非真如隨緣二往言之妄識生法不少真如故教旨則同也或問十門析難既是扶宗之說今何不取至於明宗析難而自立說耶曰惟其扶宗人莫不以為然究其所說或乖於道理謬於是非者亦多矣但以今意格之其是否可知也或問隨緣二十問為誰出耶抑所謂安國師問者為與今家同耶異耶既設此問為須答否曰此問之出有通有別通為不信別理隨緣義者別則專擬齊師而問析難云師嘗有二十問擬於齊公已破此難是也其安國師者雖是齊師所稟至於立問之意實與四明意合如問文云云文非不顯但彼此立宗各見一邊耳若欲答者正如金錍所設四十六問一答即足今此但受別理隨緣之義是即已答二十問也不然其一一問灼須疏理或問據融會一章起信該通三教藏疏唯局別門其文理明矣奈何說者猶以四明破起信為別教何耶曰此有由也蓋孤山嘗謂四明有鯨吞起信之說自是傳為口實殊不知隨緣名相本出藏疏豈以能解之失而使所釋例受破邪然則所判既定則彼隨緣屬別明矣
