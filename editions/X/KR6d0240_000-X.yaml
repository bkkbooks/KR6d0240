body:
  text: 台宗十類因革論目次卷第一經體論第一總論篇上別例中法華開廢取體例離合法相辨體例旁出涅槃五章例諸經指體同異例餘論下經王論第二總篇上別例中法華釋王部教例光明經王文旨例王體同異例餘論下別例中隨緣生法大體例兼出二論立識生法不同例示隨緣文義所出論疏例約今別圓通示隨緣例因生法言無住本例義涉性類二種例餘論下卷第二習氣論第四總篇上別例中三惑正使名相例約大小乘言習氣不同例圓位斷習進否有無例文指結習通別同異例示正習斷破文涉餘義例餘論下觀法論第五總篇上別例中三千大旨例上三千論文例中三千釋疑例下三種觀法例十乘觀相例四種三昧行法例事理二觀例觀心觀佛例勝別三觀兼餘觀相例通相餘論上通相餘論下境觀不二兼附餘義例卷第三觀法餘論下二空論第六總篇上別例中示性相生法觀相通別例對教明觀進否例約觀對諦破顯不同例圓論性相兼涉三境例總明二空餘義例餘論下被接論第七總篇上別例中通示接義有含中點示發習例言接不接并接會同異例對明玄及止觀三接一接例因辨涅槃被接可否例兼出被接餘義例餘論下教證論第八總篇上別例中教證大體例四種教證例初心知中例圓修橫學例六種性習文涉教證例散出諸文明教證餘義例餘論下卷第四壽量論第九總篇上別例中四佛身相機見體用同異例三身壽量身說不同例諸身開合例六能四句釋量無量例應相勝劣例教主應相例身土感應例餘論下四土論第十總篇上別例中通示四土名相即離相攝例別論寂光體相例土教相對橫竪例四土各有淨穢例明方便土意生身例兼出土教餘義例餘論下台宗十類因革論終
